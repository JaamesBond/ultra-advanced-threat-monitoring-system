name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - "new-infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy specific environment (or 'all')"
        required: false
        default: "all"
        type: choice
        options: [all, tgw, xdr, ctrl, prd]

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.5.7"
  AWS_REGION: "eu-central-1"
  AWS_ROLE_ARN: "arn:aws:iam::286439316079:role/GitHubActionsDeployRole"

jobs:
  # ---------------------------------------------------------------
  # Step 1: Transit Gateway (must run first)
  # ---------------------------------------------------------------
  deploy-tgw:
    name: "Deploy — Transit Gateway"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == 'tgw' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: new-infra/shared/transit-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------
  # Step 2: XDR VPC (depends on TGW — creates spoke default route)
  # ---------------------------------------------------------------
  deploy-xdr:
    name: "Deploy — bc-xdr"
    runs-on: ubuntu-latest
    needs: deploy-tgw
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'xdr' || github.event_name == 'push') }}
    defaults:
      run:
        working-directory: new-infra/environments/bc-xdr/eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------
  # Steps 3 + 4: ctrl and prd in parallel (both depend on xdr)
  #
  # IMPORTANT: these two jobs run on the self-hosted runner inside
  # bc-ctrl VPC (label: [self-hosted, bc-ctrl]).  The Helm and
  # Kubernetes Terraform providers in flux.tf / helm-security.tf
  # must reach the private EKS API endpoint (10.0.x.x).  Public
  # GitHub-hosted runners cannot reach a private-endpoint-only
  # cluster — hence the runner switch here.
  #
  # The runner EC2 is defined in:
  #   new-infra/environments/bc-ctrl/eu-central-1/github-runner.tf
  # It assumes GitHubActionsDeployRole via sts:AssumeRole so the
  # credential step works identically to the hosted-runner jobs.
  # ---------------------------------------------------------------
  deploy-ctrl:
    name: "Deploy — bc-ctrl"
    runs-on: [self-hosted, bc-ctrl]
    needs: deploy-xdr
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'ctrl' || github.event_name == 'push') }}
    defaults:
      run:
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig (bc-ctrl)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name bc-ctrl-eks
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan

  deploy-prd:
    name: "Deploy — bc-prd"
    runs-on: [self-hosted, bc-ctrl]
    needs: deploy-xdr
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prd' || github.event_name == 'push') }}
    defaults:
      run:
        working-directory: new-infra/environments/bc-prd/eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig (bc-prd)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name bc-prd-eks
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan
