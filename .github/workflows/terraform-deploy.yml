name: Terraform Deploy (v8)

on:
  push:
    branches: [main]
    paths:
      - "new-infra/**"
  workflow_dispatch:

env:
  AWS_ACCOUNT_ID: "286439316079"
  AWS_REGION: "eu-central-1"

jobs:
  # ---------------------------------------------------------------
  # Step 1: bc-ctrl (The Brain) — VPC + EKS + runner VM
  # Runs on ubuntu-latest because bc-ctrl EKS has public endpoint.
  # K8s manifests (Wazuh manager/indexer/dashboard) applied here.
  # ---------------------------------------------------------------
  ctrl-plane:
    name: Deploy Control Plane (The Brain)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::286439316079:role/GitHubActionsDeployRole
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply (Ctrl)
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
        run: |
          terraform init
          terraform apply -auto-approve
      # NOTE: Wazuh Manager/Indexer/Dashboard run on the security_tools Docker EC2,
      # not on EKS. bc-ctrl has no EKS cluster. Docker Compose deployment is handled
      # via SSM/user_data on the security_tools instance (see vm.tf).

  # ---------------------------------------------------------------
  # Step 2: bc-prd (The Data) — EKS + security stack + sensors
  # Runs on self-hosted runner in bc-ctrl VPC (reaches private
  # bc-prd EKS endpoint via VPC peering).
  # K8s manifests (Wazuh agent, Zeek, Suricata) applied here.
  # ---------------------------------------------------------------
  production-plane:
    name: Deploy Production Plane (The Data)
    needs: ctrl-plane
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::286439316079:role/GitHubActionsDeployRole
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply (Prd)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Configure kubectl (bc-prd-eks)
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name bc-uatms-prd-eks

      # Bootstrap Cilium CRDs before applying Wazuh/Zeek/Suricata so
      # NetworkPolicy resources can be validated against the live API.
      - name: Bootstrap CRDs (Helm)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          terraform apply -auto-approve \
            -target=helm_release.cilium \
            -target=helm_release.falco \
            -target=helm_release.tetragon

      - name: Wait for CRDs to propagate
        run: sleep 60

      - name: Deploy Wazuh Agent (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/wazuh/agent \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -

      - name: Deploy Zeek (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/zeek \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -

      - name: Deploy Suricata (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/suricata \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -
