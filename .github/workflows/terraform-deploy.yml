name: Terraform Deploy (v8)

on:
  push:
    branches: [main]
    paths:
      - "new-infra/**"
  workflow_dispatch:

jobs:
  ctrl-plane:
    name: Deploy Control Plane (The Brain)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::286439316079:role/GitHubActionsDeployRole
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Apply (Ctrl)
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Wait for GitHub Runner to bootstrap
        run: sleep 120

  production-plane:
    name: Deploy Production Plane (The Data)
    needs: ctrl-plane
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::286439316079:role/GitHubActionsDeployRole
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply (Prd)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          terraform init
          terraform apply -auto-approve
