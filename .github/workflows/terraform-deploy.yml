name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - "new-infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy specific environment (or 'all')"
        required: false
        default: "all"
        type: choice
        options: [all, ctrl, prd]

permissions:
  contents: read
  id-token: write
  actions: read

env:
  TF_VERSION: "1.5.7"
  AWS_REGION: "eu-central-1"
  AWS_ROLE_ARN: "arn:aws:iam::286439316079:role/GitHubActionsDeployRole"

jobs:
  # ---------------------------------------------------------------
  # Step 1a: bc-ctrl infrastructure (VPC + peering + IAM)
  # Pure AWS API — no K8s, runs on ubuntu-latest.
  # ---------------------------------------------------------------
  deploy-ctrl:
    name: "Deploy — bc-ctrl"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == 'ctrl' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------
  # Step 2: Wait for runner VM (created by deploy-ctrl) to boot
  # and register with GitHub Actions.
  # ---------------------------------------------------------------
  wait-for-runners:
    name: "Wait — runner online"
    runs-on: ubuntu-latest
    needs: deploy-ctrl
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prd' || github.event_name == 'push') }}
    steps:
      - name: Wait for runner agent to boot and register
        run: sleep 240

  # ---------------------------------------------------------------
  # Step 3: bc-prd (EKS + Cilium + policies)
  # Runs on self-hosted runner in bc-ctrl VPC.
  # Reaches bc-prd EKS private endpoint via VPC peering.
  # ---------------------------------------------------------------
  deploy-prd:
    name: "Deploy — bc-prd"
    runs-on: [self-hosted, linux, bc-prd]
    needs: [deploy-ctrl, wait-for-runners]
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prd' || github.event_name == 'push') }}
    defaults:
      run:
        working-directory: new-infra/environments/bc-prd/eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      # Step 1: Remove any stale TGW routes that conflict with VPC peering routes.
      # The old Transit Gateway attachments were destroyed; these orphaned routes
      # prevent Terraform from creating the replacement peering routes (duplicate CIDR).
      - name: Remove stale TGW routes from bc-prd private route tables
        run: |
          RTB_IDS=$(aws ec2 describe-route-tables \
            --region ${{ env.AWS_REGION }} \
            --filters \
              "Name=vpc-id,Values=$(terraform output -raw vpc_id)" \
              "Name=route.destination-cidr-block,Values=10.0.0.0/16" \
            --query 'RouteTables[?Routes[?TransitGatewayId!=null && DestinationCidrBlock==`10.0.0.0/16`]].RouteTableId' \
            --output text)
          for RTB in $RTB_IDS; do
            aws ec2 delete-route \
              --route-table-id "$RTB" \
              --destination-cidr-block 10.0.0.0/16 \
              --region ${{ env.AWS_REGION }} \
              && echo "Removed stale TGW route from $RTB" \
              || echo "No stale route in $RTB"
          done

      # Step 2: Accept VPC peering from bc-ctrl and wire up return routes + SG rule.
      # Peering must be ACTIVE before the Helm/k8s provider can dial the private
      # EKS endpoint. Routes must exist so return traffic from EKS ENIs reaches runner.
      - name: Accept VPC peering and apply connectivity prerequisites
        run: |
          terraform apply -auto-approve -no-color \
            -target=aws_vpc_peering_connection_accepter.prd_accepts_ctrl \
            -target=aws_route.private_to_ctrl \
            -target=aws_vpc_security_group_ingress_rule.eks_runner_api

      # Step 3: Bootstrap CRDs — install Helm charts so that
      # kubernetes_manifest resources (CiliumClusterwideNetworkPolicy,
      # TracingPolicy) can be validated against the live API.
      - name: Bootstrap CRDs (Helm charts only)
        run: |
          terraform apply -auto-approve -no-color \
            -target=helm_release.cilium \
            -target=helm_release.tetragon \
            -target=helm_release.falco
      - name: Wait for CRDs to propagate
        run: sleep 60
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan
