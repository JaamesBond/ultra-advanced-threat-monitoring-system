name: Terraform Deploy (v8)

on:
  push:
    branches: [main]
    paths:
      - "new-infra/**"
  workflow_dispatch:

concurrency:
  group: terraform-deploy
  # Queue concurrent runs instead of cancelling — cancelling mid-`terraform apply`
  # corrupts the S3 state file (partial write erases tracking for resources still
  # in AWS, causing AlreadyExistsException cascades on the next run).
  cancel-in-progress: false

env:
  AWS_ACCOUNT_ID: "845517756853"
  AWS_REGION: "eu-central-1"

jobs:
  # ---------------------------------------------------------------
  # Step 1: bc-ctrl (The Brain) — VPC + EC2 infra only (no EKS)
  # Runs on ubuntu-latest (public AWS APIs only).
  # Manages: VPC, peering, fck-nat, github runner VM, wazuh EC2
  # instances, MISP EC2 instance, Route53.
  # ---------------------------------------------------------------
  ctrl-plane:
    name: Deploy Control Plane (The Brain)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::845517756853:role/GitHubActionsDeployRole
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3

      - name: "Terraform Apply (Ctrl) — Stage 1: Network"
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
        run: |
          terraform init
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=aws_security_group.fck_nat \
            -target=aws_iam_role.fck_nat \
            -target=aws_iam_role_policy_attachment.fck_nat_ssm \
            -target=aws_iam_instance_profile.fck_nat \
            -target=aws_instance.fck_nat \
            -target=aws_route.private_nat \
            -target=aws_route53_zone.bc_ctrl_internal \
            -target=aws_security_group.github_runner \
            -target=aws_iam_role.github_runner \
            -target=aws_iam_role_policy_attachment.runner_admin \
            -target=aws_iam_instance_profile.github_runner \
            -target=aws_instance.github_runner

      - name: "Terraform Apply (Ctrl) — Stage 2: Reconcile"
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
        run: |
          terraform apply -auto-approve

      - name: Wait for EC2 instances to reach running state
        run: |
          echo "Waiting for bc-ctrl EC2 instances to enter 'running' state..."
          for tag in wazuh-ctrl misp-ctrl; do
            echo "  Checking instance with tag Name=${tag}..."
            instance_id=$(aws ec2 describe-instances \
              --region ${{ env.AWS_REGION }} \
              --filters "Name=tag:Name,Values=${tag}" "Name=instance-state-name,Values=pending,running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text)
            if [ "${instance_id}" = "None" ] || [ -z "${instance_id}" ]; then
              echo "  ERROR: No instance found for tag Name=${tag}"
              exit 1
            fi
            echo "  Found ${tag} => ${instance_id}. Waiting for running state..."
            aws ec2 wait instance-running \
              --region ${{ env.AWS_REGION }} \
              --instance-ids "${instance_id}"
            echo "  ${tag} (${instance_id}) is running."
          done

      - name: Wait for EC2 instances to be SSM-reachable
        run: |
          echo "Waiting for bc-ctrl EC2 instances to register with SSM..."
          for tag in wazuh-ctrl misp-ctrl; do
            instance_id=$(aws ec2 describe-instances \
              --region ${{ env.AWS_REGION }} \
              --filters "Name=tag:Name,Values=${tag}" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text)
            echo "  Polling SSM for ${tag} (${instance_id})..."
            for attempt in $(seq 1 30); do
              ssm_status=$(aws ssm describe-instance-information \
                --region ${{ env.AWS_REGION }} \
                --filters "Key=InstanceIds,Values=${instance_id}" \
                --query "InstanceInformationList[0].PingStatus" \
                --output text 2>/dev/null || echo "None")
              if [ "${ssm_status}" = "Online" ]; then
                echo "  ${tag} (${instance_id}) is SSM-reachable (attempt ${attempt})."
                break
              fi
              if [ "${attempt}" -eq 30 ]; then
                echo "  ERROR: ${tag} (${instance_id}) did not become SSM-reachable after 150s."
                exit 1
              fi
              echo "  ${tag} SSM status: ${ssm_status} — waiting 5s (attempt ${attempt}/30)..."
              sleep 5
            done
          done

  # ---------------------------------------------------------------
  # Step 2: bc-prd (The Data) — EKS + security stack + sensors
  # Runs on self-hosted runner in bc-ctrl VPC (reaches private
  # bc-prd EKS endpoint via VPC peering).
  # K8s manifests (Wazuh agent, Zeek, Suricata) applied here.
  # ---------------------------------------------------------------
  production-plane:
    name: Deploy Production Plane (The Data)
    needs: ctrl-plane
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::845517756853:role/GitHubActionsDeployRole
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3

      - name: Resolve Shuffle Helm dependencies
        run: helm dependency update new-infra/k8s/shuffle

      # ---------------------------------------------------------------
      # State-drift recovery via S3 object versioning.
      #
      # A cancelled terraform apply can leave a partial state in S3 that
      # is missing key managed resources (EKS cluster, routes, endpoints)
      # while those resources still exist in AWS — causing cascading
      # AlreadyExistsException on the next apply.
      #
      # Health check: after terraform init, check if the EKS cluster
      # resource is present in state. A partial/drifted state often has
      # the IAM/SG prep resources but is missing the cluster itself.
      #
      # If drifted: delete current bad S3 version(s) in a loop until the
      # cluster appears in the promoted version. Up to 5 deletions.
      # ---------------------------------------------------------------
      - name: Recover Terraform state from S3 object versioning (if drifted)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        env:
          STATE_BUCKET: bc-uatms-terraform-state
          STATE_KEY: v8/environments/bc-prd/terraform.tfstate
        run: |
          set -euo pipefail
          REGION="${{ env.AWS_REGION }}"
          SENTINEL="module.eks.aws_eks_cluster.this[0]"

          echo "Checking versioning on s3://$STATE_BUCKET ..."
          VERSIONING=$(aws s3api get-bucket-versioning \
            --bucket "$STATE_BUCKET" --region "$REGION" \
            --query 'Status' --output text 2>/dev/null || echo "None")
          if [ "$VERSIONING" != "Enabled" ]; then
            echo "ERROR: bucket not versioned — cannot auto-recover. Enable versioning first."
            exit 1
          fi

          # Init terraform so we can query state.
          terraform init -reconfigure

          for attempt in $(seq 1 5); do
            echo ""
            echo "=== State health check (attempt $attempt/5) ==="
            if terraform state list 2>/dev/null | grep -qF "$SENTINEL"; then
              echo "EKS cluster found in state — state looks healthy."
              break
            fi

            echo "EKS cluster NOT found in state — state is drifted."
            # Get the current bad version.
            BAD_VERSION=$(aws s3api head-object \
              --bucket "$STATE_BUCKET" --key "$STATE_KEY" --region "$REGION" \
              --query 'VersionId' --output text)
            echo "Deleting bad version $BAD_VERSION to promote prior version..."
            aws s3api delete-object \
              --bucket "$STATE_BUCKET" --key "$STATE_KEY" \
              --version-id "$BAD_VERSION" --region "$REGION"

            # Re-init to pull the newly promoted state version.
            terraform init -reconfigure

            if [ "$attempt" -eq 5 ]; then
              echo "ERROR: EKS cluster still missing after 5 version rollbacks."
              echo "Manual recovery required."
              exit 1
            fi
          done

      # Surface what's now in state so the next step's plan is auditable.
      - name: Show terraform state inventory
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          echo "=== terraform state list (post-recovery) ==="
          terraform state list || true

      - name: "Terraform Apply (Prd) — Stage 1: Infra (VPC + EKS)"
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          terraform init
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.vpc_endpoints \
            -target=aws_security_group.fck_nat_prd \
            -target=aws_iam_role.fck_nat_prd \
            -target=aws_iam_role_policy_attachment.fck_nat_prd_ssm \
            -target=aws_iam_instance_profile.fck_nat_prd \
            -target=aws_instance.fck_nat_prd \
            -target=aws_route.private_nat_prd \
            -target=module.peering_requester \
            -target=module.peering_accepter \
            -target=aws_route53_zone_association.bc_ctrl_internal_prd \
            -target=module.eks

      - name: Configure kubectl (bc-prd-eks)
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name bc-uatms-prd-eks --kubeconfig /tmp/kubeconfig-prd
          echo "KUBECONFIG=/tmp/kubeconfig-prd" >> $GITHUB_ENV

      - name: Verify kubectl config (bc-prd-eks)
        run: |
          echo "KUBECONFIG=$KUBECONFIG"
          kubectl config view --minify
          kubectl config current-context
          kubectl get nodes --request-timeout=10s

      # Bootstrap Cilium CRDs before applying Wazuh/Zeek/Suricata so
      # NetworkPolicy resources can be validated against the live API.
      - name: Bootstrap CRDs (Helm)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          terraform apply -auto-approve \
            -target=helm_release.cilium \
            -target=helm_release.falco \
            -target=helm_release.tetragon \
            -target=helm_release.external_secrets \
            -target=aws_iam_role.external_secrets \
            -target=aws_iam_role_policy.external_secrets_secrets_manager

      - name: Wait for CRDs to propagate
        run: |
          # kubectl wait returns NotFound immediately if CRD doesn't exist yet.
          # Cilium CRDs are written ~1-3s after Helm returns. Retry until ready.
          for i in $(seq 1 30); do
            kubectl wait --for condition=established --timeout=30s \
              crd/ciliumnetworkpolicies.cilium.io \
              crd/tracingpolicies.cilium.io \
              crd/externalsecrets.external-secrets.io 2>&1 && break
            echo "CRDs not ready yet (attempt $i/30), retrying in 10s..."
            sleep 10
          done

      - name: Verify security stack (bc-prd)
        continue-on-error: true
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide
          echo "=== Falco pods ==="
          kubectl -n falco get pods -o wide
          kubectl -n falco rollout status daemonset/falco --timeout=120s || true
          echo "=== Tetragon pods ==="
          kubectl -n kube-system get pods -l app.kubernetes.io/name=tetragon -o wide

      - name: Deploy Zeek (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/zeek \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -

      - name: Deploy Suricata (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/suricata \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -


      - name: Build and push wazuh-agent image to ECR
        run: |
          ECR_REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ECR_REPO="wazuh-agent"
          IMAGE_TAG="4.14.4"
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
          docker build \
            --build-arg WAZUH_VERSION="${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}" \
            new-infra/docker/wazuh-agent/
          docker push "${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

      - name: Apply system network policies (bc-prd)
        run: kubectl kustomize new-infra/k8s/system-netpols | kubectl apply -f -

      - name: Deploy Wazuh agent (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/wazuh-agent \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -
