name: Terraform Deploy (v8)

on:
  push:
    branches: [main]
    paths:
      - "new-infra/**"
  workflow_dispatch:

concurrency:
  group: terraform-deploy
  # Queue concurrent runs instead of cancelling — cancelling mid-`terraform apply`
  # corrupts the S3 state file (partial write erases tracking for resources still
  # in AWS, causing AlreadyExistsException cascades on the next run).
  cancel-in-progress: false

env:
  AWS_ACCOUNT_ID: "845517756853"
  AWS_REGION: "eu-central-1"

jobs:
  # ---------------------------------------------------------------
  # Step 1: bc-ctrl (The Brain) — VPC + EC2 infra only (no EKS)
  # Runs on ubuntu-latest (public AWS APIs only).
  # Manages: VPC, peering, fck-nat, github runner VM, wazuh EC2
  # instances, MISP EC2 instance, Route53.
  # ---------------------------------------------------------------
  ctrl-plane:
    name: Deploy Control Plane (The Brain)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::845517756853:role/GitHubActionsDeployRole
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3

      - name: "Terraform Apply (Ctrl) — Stage 1: Network"
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
        run: |
          terraform init
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=aws_security_group.fck_nat \
            -target=aws_iam_role.fck_nat \
            -target=aws_iam_role_policy_attachment.fck_nat_ssm \
            -target=aws_iam_instance_profile.fck_nat \
            -target=aws_instance.fck_nat \
            -target=aws_route.private_nat \
            -target=aws_route53_zone.bc_ctrl_internal \
            -target=aws_security_group.github_runner \
            -target=aws_iam_role.github_runner \
            -target=aws_iam_role_policy_attachment.runner_admin \
            -target=aws_iam_instance_profile.github_runner \
            -target=aws_instance.github_runner

      - name: "Terraform Apply (Ctrl) — Stage 2: Reconcile"
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
        run: |
          terraform apply -auto-approve

      - name: Wait for EC2 instances to reach running state
        run: |
          echo "Waiting for bc-ctrl EC2 instances to enter 'running' state..."
          for tag in wazuh-ctrl misp-ctrl; do
            echo "  Checking instance with tag Name=${tag}..."
            instance_id=$(aws ec2 describe-instances \
              --region ${{ env.AWS_REGION }} \
              --filters "Name=tag:Name,Values=${tag}" "Name=instance-state-name,Values=pending,running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text)
            if [ "${instance_id}" = "None" ] || [ -z "${instance_id}" ]; then
              echo "  ERROR: No instance found for tag Name=${tag}"
              exit 1
            fi
            echo "  Found ${tag} => ${instance_id}. Waiting for running state..."
            aws ec2 wait instance-running \
              --region ${{ env.AWS_REGION }} \
              --instance-ids "${instance_id}"
            echo "  ${tag} (${instance_id}) is running."
          done

      - name: Wait for EC2 instances to be SSM-reachable
        run: |
          echo "Waiting for bc-ctrl EC2 instances to register with SSM..."
          for tag in wazuh-ctrl misp-ctrl; do
            instance_id=$(aws ec2 describe-instances \
              --region ${{ env.AWS_REGION }} \
              --filters "Name=tag:Name,Values=${tag}" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text)
            echo "  Polling SSM for ${tag} (${instance_id})..."
            for attempt in $(seq 1 30); do
              ssm_status=$(aws ssm describe-instance-information \
                --region ${{ env.AWS_REGION }} \
                --filters "Key=InstanceIds,Values=${instance_id}" \
                --query "InstanceInformationList[0].PingStatus" \
                --output text 2>/dev/null || echo "None")
              if [ "${ssm_status}" = "Online" ]; then
                echo "  ${tag} (${instance_id}) is SSM-reachable (attempt ${attempt})."
                break
              fi
              if [ "${attempt}" -eq 30 ]; then
                echo "  ERROR: ${tag} (${instance_id}) did not become SSM-reachable after 150s."
                exit 1
              fi
              echo "  ${tag} SSM status: ${ssm_status} — waiting 5s (attempt ${attempt}/30)..."
              sleep 5
            done
          done

  # ---------------------------------------------------------------
  # Step 2: bc-prd (The Data) — EKS + security stack + sensors
  # Runs on self-hosted runner in bc-ctrl VPC (reaches private
  # bc-prd EKS endpoint via VPC peering).
  # K8s manifests (Wazuh agent, Zeek, Suricata) applied here.
  # ---------------------------------------------------------------
  production-plane:
    name: Deploy Production Plane (The Data)
    needs: ctrl-plane
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::845517756853:role/GitHubActionsDeployRole
          aws-region: eu-central-1

      - uses: hashicorp/setup-terraform@v3

      - name: Resolve Shuffle Helm dependencies
        run: helm dependency update new-infra/k8s/shuffle

      # ---------------------------------------------------------------
      # PRE-STAGE-1: Apply system CiliumNetworkPolicies early.
      #
      # policyEnforcementMode=always means every pod is deny-by-default the
      # moment Cilium is active. EKS managed addons (aws-ebs-csi-driver,
      # aws-efs-csi-driver) and the ALB controller start during Stage 1
      # Terraform and have a 20-min wait_for_active timeout. Without egress
      # CNPs those pods CrashLoopBackOff (STS i/o timeout) and the addon
      # CREATE times out — exactly what happened in run 25606334520.
      #
      # Fix: lay down system netpols NOW, before Stage 1, so addon pods have
      # egress permission from first-start. On a true cold-start the
      # CiliumNetworkPolicy CRD does not yet exist (Cilium Helm runs in Stage 2),
      # so this step is continue-on-error: true. A second authoritative apply
      # runs AFTER Stage 2 (see "Apply system network policies — authoritative"
      # below) with continue-on-error: false to guarantee convergence.
      # ---------------------------------------------------------------
      - name: Apply system network policies -- early (pre-Stage-1, best-effort)
        continue-on-error: true
        run: |
          # Self-contained: kubectl is not yet configured at this point in the
          # pipeline. update-kubeconfig fails harmlessly on true cold-start when
          # the cluster doesn't exist yet, which is fine -- continue-on-error
          # catches it and the authoritative apply after Stage 2 covers that case.
          aws eks update-kubeconfig --region eu-central-1 --name bc-uatms-prd-eks
          kubectl kustomize new-infra/k8s/system-netpols | kubectl apply -f -

      # ---------------------------------------------------------------
      # State drift detection — FAIL LOUD, do NOT mutate state.
      #
      # A cancelled terraform apply can leave bc-prd state missing key
      # managed resources (EKS cluster, routes, endpoints) while those
      # resources still exist in AWS, causing cascading AlreadyExists on
      # the next apply.
      #
      # Three-way logic (sentinel = module.eks.aws_eks_cluster.this[0]):
      #
      #   Case 1 — sentinel IN state:
      #     Healthy, proceed.
      #
      #   Case 2 — sentinel NOT in state AND cluster NOT in AWS:
      #     True cold-start (empty state + empty AWS). Proceed.
      #     This is the expected resting state between teardowns.
      #
      #   Case 3 — sentinel NOT in state AND cluster EXISTS in AWS:
      #     State drift from a cancelled apply. Fail loud.
      #     Manual recovery required before this pipeline can run:
      #       1. terraform state pull > backup.tfstate
      #       2. providers.override.tf with empty helm { kubernetes {} }
      #       3. terraform import <addr> <id> for each missing resource
      #       4. terraform plan to verify no unexpected destroys
      #       5. Remove providers.override.tf, commit — state is healthy
      # ---------------------------------------------------------------
      - name: Check Terraform state health (fail-loud, no mutations)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          set -euo pipefail
          SENTINEL="module.eks.aws_eks_cluster.this[0]"
          CLUSTER_NAME="bc-uatms-prd-eks"
          REGION="eu-central-1"

          terraform init -reconfigure

          echo "=== State health check ==="
          # Capture state list in a variable to decouple grep from terraform's exit code.
          # With pipefail, if `terraform state list` exits non-zero (provider init failure)
          # the pipeline exit code is non-zero even if grep finds the sentinel — giving a
          # false "not found". Using a variable + `|| true` absorbs the provider error and
          # lets grep operate only on the text.
          STATE_LIST=$(terraform state list 2>/dev/null || true)

          if echo "$STATE_LIST" | grep -qF "$SENTINEL"; then
            # Case 1: sentinel present — state is healthy.
            echo "Case 1: EKS cluster found in state — state is healthy, proceeding."
          else
            # Sentinel not in state. Probe AWS to distinguish cold-start from drift.
            echo "Sentinel not found in state. Probing AWS for cluster existence..."
            if aws eks describe-cluster \
                --name "$CLUSTER_NAME" \
                --region "$REGION" \
                --output text \
                --query "cluster.status" \
                > /dev/null 2>&1; then
              # Case 3: cluster exists in AWS but not in state — drift from cancelled apply.
              echo ""
              echo "ERROR: EKS cluster '$CLUSTER_NAME' exists in AWS but is NOT tracked in Terraform state."
              echo "State is drifted — likely caused by a cancelled apply."
              echo ""
              echo "Manual recovery required before this pipeline can run:"
              echo "  1. terraform state pull > backup.tfstate"
              echo "  2. providers.override.tf with empty helm { kubernetes {} }"
              echo "  3. terraform import <addr> <id> for each missing resource"
              echo "  4. terraform plan to verify no unexpected destroys"
              echo "  5. Remove providers.override.tf, commit — state is healthy"
              echo ""
              echo "Current state contents (first 40 lines):"
              echo "$STATE_LIST" | head -40
              exit 1
            else
              # Case 2: cluster absent in both state and AWS — true cold-start.
              echo "Case 2: Cold-start detected — cluster absent from state and AWS. Proceeding."
            fi
          fi

      # Surface what's now in state so the next step's plan is auditable.
      - name: Show terraform state inventory
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          echo "=== terraform state list (post-recovery) ==="
          terraform state list || true

      # MAINTENANCE RULE: Every kubernetes_* resource declared in bc-prd Terraform
      # MUST appear in this -target= list (Stage 1) or in the Stage 2 -target=
      # list below. Targeted applies skip resources not listed — they are silently
      # omitted and PVCs/pods that depend on them stay Pending forever.
      # New kubernetes_* resources: add here unless they require Cilium/CRD CRDs
      # (which don't exist until Stage 2 Helm runs). New helm_release resources:
      # add to Stage 2 unless they are AWS-only prerequisites.
      - name: "Terraform Apply (Prd) — Stage 1: Infra (VPC + EKS)"
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          terraform init
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.vpc_endpoints \
            -target=aws_security_group.fck_nat_prd \
            -target=aws_iam_role.fck_nat_prd \
            -target=aws_iam_role_policy_attachment.fck_nat_prd_ssm \
            -target=aws_iam_instance_profile.fck_nat_prd \
            -target=aws_instance.fck_nat_prd \
            -target=aws_route.private_nat_prd \
            -target=module.peering_requester \
            -target=module.peering_accepter \
            -target=aws_route53_zone_association.bc_ctrl_internal_prd \
            -target=module.eks \
            -target=aws_iam_role.ebs_csi \
            -target=aws_iam_role_policy_attachment.ebs_csi \
            -target=aws_iam_role.efs_csi \
            -target=aws_iam_role_policy_attachment.efs_csi \
            -target=aws_efs_file_system.nomad_oasis \
            -target=aws_security_group.nomad_efs \
            -target=aws_efs_mount_target.nomad_oasis \
            -target=aws_secretsmanager_secret.nomad_api \
            -target=aws_secretsmanager_secret.nomad_mongo \
            -target=aws_secretsmanager_secret.nomad_keycloak \
            -target=aws_secretsmanager_secret.nomad_north \
            -target=aws_secretsmanager_secret.nomad_datacite \
            -target=kubernetes_storage_class.gp3 \
            -target=aws_iam_role.alb_controller \
            -target=aws_iam_role_policy.alb_controller \
            -target=aws_iam_role.cilium_operator \
            -target=aws_iam_role_policy.cilium_operator_eni

      - name: Configure kubectl (bc-prd-eks)
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name bc-uatms-prd-eks --kubeconfig /tmp/kubeconfig-prd
          echo "KUBECONFIG=/tmp/kubeconfig-prd" >> $GITHUB_ENV

      - name: Verify kubectl config (bc-prd-eks)
        run: |
          echo "KUBECONFIG=$KUBECONFIG"
          kubectl config view --minify
          kubectl config current-context
          kubectl get nodes --request-timeout=10s

      # Wait for both EKS managed node groups to reach Active status before
      # any Helm apply. The workload group serves XDR DaemonSets; the nomad
      # group must be Active so the NOMAD Helm release can schedule pods.
      # The EKS API returns Active once the ASG has launched instances and
      # they have joined the cluster — typically 90–180s on a cold start.
      - name: Wait for EKS node groups to be Active
        run: |
          set -euo pipefail
          CLUSTER="bc-uatms-prd-eks"
          for ng in workload nomad; do
            echo "Waiting for node group '${ng}' to reach ACTIVE status..."
            # The EKS module appends a random suffix (e.g. workload-20260509141029562900000003).
            # Discover the real name by listing and filtering by prefix — do NOT construct it.
            nodegroup_name=$(aws eks list-nodegroups \
              --region ${{ env.AWS_REGION }} \
              --cluster-name "$CLUSTER" \
              --query "nodegroups[?starts_with(@, '${ng}')]|[0]" \
              --output text 2>/dev/null || echo "")
            if [ -z "$nodegroup_name" ] || [ "$nodegroup_name" = "None" ]; then
              echo "  ERROR: No node group found with prefix '${ng}' in cluster $CLUSTER"
              exit 1
            fi
            echo "  Resolved: '${ng}' -> '$nodegroup_name'"
            for attempt in $(seq 1 40); do
              status=$(aws eks describe-nodegroup \
                --region ${{ env.AWS_REGION }} \
                --cluster-name "$CLUSTER" \
                --nodegroup-name "$nodegroup_name" \
                --query 'nodegroup.status' \
                --output text 2>/dev/null || echo "NOT_FOUND")
              if [ "$status" = "ACTIVE" ]; then
                echo "  Node group '$nodegroup_name' is ACTIVE (attempt ${attempt})."
                break
              fi
              if [ "$attempt" -eq 40 ]; then
                echo "  ERROR: Node group '$nodegroup_name' did not reach ACTIVE after 200s."
                exit 1
              fi
              echo "  '$nodegroup_name' status: ${status} — waiting 5s (attempt ${attempt}/40)..."
              sleep 5
            done
          done

      # Seed NOMAD Oasis credentials from GitHub repo secrets into AWS SM.
      #
      # This step MUST run after Stage 1 terraform apply (which creates the
      # aws_secretsmanager_secret shells) and BEFORE Stage 2 (which applies
      # the NOMAD Helm release that triggers ExternalSecret sync).
      #
      # Missing GitHub secrets: if any secret is not set in repo settings,
      # its env var is empty and the script writes the placeholder "unused".
      # This keeps AWS SM secret content valid JSON so ESO can sync without
      # error. Subsystems that use "unused" credentials (Keycloak, NORTH,
      # DataCite) are disabled in the NOMAD Helm values for v1 anyway.
      #
      # Idempotency: the script compares sha256 hashes before writing — no
      # new secret version is created if the value has not changed.
      - name: Seed NOMAD secrets from GitHub to AWS Secrets Manager
        env:
          NOMAD_OASIS_API_SECRET:            ${{ secrets.NOMAD_OASIS_API_SECRET || '' }}
          NOMAD_OASIS_MONGO_ROOT_PASSWORD:   ${{ secrets.NOMAD_OASIS_MONGO_ROOT_PASSWORD || '' }}
          NOMAD_OASIS_KEYCLOAK_PASSWORD:     ${{ secrets.NOMAD_OASIS_KEYCLOAK_PASSWORD || '' }}
          NOMAD_OASIS_KEYCLOAK_CLIENT_SECRET: ${{ secrets.NOMAD_OASIS_KEYCLOAK_CLIENT_SECRET || '' }}
          NOMAD_OASIS_NORTH_HUB_TOKEN:       ${{ secrets.NOMAD_OASIS_NORTH_HUB_TOKEN || '' }}
          NOMAD_OASIS_DATACITE_USERNAME:     ${{ secrets.NOMAD_OASIS_DATACITE_USERNAME || '' }}
          NOMAD_OASIS_DATACITE_PASSWORD:     ${{ secrets.NOMAD_OASIS_DATACITE_PASSWORD || '' }}
        run: bash new-infra/scripts/seed-nomad-secrets.sh

      # Bootstrap Cilium CRDs before applying Wazuh/Zeek/Suricata so
      # NetworkPolicy resources can be validated against the live API.
      # NOMAD Helm release is also applied here because it depends on the
      # EFS StorageClass (efs-nomad-sc) and ExternalSecret CRDs being ready.
      # Stage 2a: Install Cilium only — establishes CiliumNetworkPolicy CRD and
      # starts policy enforcement. Must run alone so CNPs can be applied before
      # any other Helm releases start (they are deny-by-default under always-enforce).
      - name: Install Cilium (Stage 2a)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: terraform apply -auto-approve -target=helm_release.cilium

      # Heal kube-system pods after Cilium install (cold-start IPAM bounce).
      #
      # EKS-managed addons (CoreDNS, EBS CSI, EFS CSI) boot BEFORE Cilium is
      # installed — they start with kube-proxy and the cluster bootstrap. On a
      # cold-start their pods may hold IPs that Cilium's IPAM doesn't know about,
      # causing black-holed return traffic. Even after Cilium stabilizes, these
      # pods keep their stale IPs and broken DNS resolver state until restarted.
      #
      # Wait for cilium-operator to be Ready first (confirms IRSA is live and
      # the operator can actually manage ENI assignments), then bounce the
      # affected kube-system workloads so they re-acquire clean IPs.
      # EFS CSI may not be installed — tolerate its absence with || true.
      - name: Heal kube-system pods after Cilium install (cold-start IPAM bounce)
        run: |
          kubectl -n kube-system rollout status deploy/cilium-operator --timeout=60s
          kubectl -n kube-system rollout restart deploy/coredns
          kubectl -n kube-system rollout restart deploy/ebs-csi-controller
          kubectl -n kube-system rollout restart ds/ebs-csi-node
          kubectl get ds -n kube-system efs-csi-node >/dev/null 2>&1 \
            && kubectl -n kube-system rollout restart ds/efs-csi-node \
            || echo "efs-csi-node not present, skipping"
          kubectl get deploy -n kube-system efs-csi-controller >/dev/null 2>&1 \
            && kubectl -n kube-system rollout restart deploy/efs-csi-controller \
            || echo "efs-csi-controller not present, skipping"
          kubectl -n kube-system rollout status deploy/coredns --timeout=300s
          kubectl -n kube-system rollout status deploy/ebs-csi-controller --timeout=300s
          kubectl -n kube-system rollout status ds/ebs-csi-node --timeout=300s

      # Wait for Cilium CRDs before applying network policies. tracingpolicies
      # CRD is from Tetragon (Stage 2b) so only wait for Cilium's own CRDs here.
      - name: Wait for Cilium CRDs (Stage 2a)
        run: |
          for i in $(seq 1 30); do
            kubectl wait --for condition=established --timeout=30s \
              crd/ciliumnetworkpolicies.cilium.io 2>&1 && break
            echo "CRDs not ready yet (attempt $i/30), retrying in 10s..."
            sleep 10
          done

      # Stage 2b: Deploy security stack + ESO + ALB controller — but NOT NOMAD yet.
      # NOMAD's helm chart hard-codes a `lookup` of K8s Secret "{release}-mongodb"
      # at template-render time to embed the mongo password into its configmap.
      # The Secret only exists after ESO syncs the ExternalSecret in stage 2c, so
      # NOMAD's helm release MUST run after the ExternalSecret has been applied
      # AND ESO has reconciled it. Splitting Stage 2b around this avoids the
      # cold-start broken-mongo-URI condition.
      - name: Deploy security stack + ESO + ALB (Stage 2b)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          terraform apply -auto-approve \
            -target=helm_release.falco \
            -target=helm_release.tetragon \
            -target=helm_release.external_secrets \
            -target=aws_iam_role.external_secrets \
            -target=aws_iam_role_policy.external_secrets_secrets_manager \
            -target=kubernetes_storage_class.efs_nomad \
            -target=helm_release.aws_load_balancer_controller

      # Heal external-secrets after Stage 2b (cold-start DNS bounce).
      #
      # ESO pods created by the Helm release above inherit whatever DNS resolver
      # state CoreDNS had at that moment. If CoreDNS was bounced in the IPAM heal
      # step above but ESO started mid-restart, its pods may hold a stale
      # /etc/resolv.conf or cached NXDOMAIN for STS/Secrets Manager endpoints.
      # Restarting ESO here guarantees it picks up fresh DNS state before Stage 2c
      # creates ExternalSecrets that depend on STS IRSA auth working end-to-end.
      - name: Heal external-secrets after Stage 2b (cold-start DNS bounce)
        run: |
          kubectl -n external-secrets rollout restart \
            deploy/external-secrets \
            deploy/external-secrets-cert-controller
          kubectl -n external-secrets rollout status \
            deploy/external-secrets --timeout=300s
          kubectl -n external-secrets rollout status \
            deploy/external-secrets-cert-controller --timeout=300s

      # Apply system network policies after Stage 2b (post-Helm namespace creation).
      #
      # Under policyEnforcementMode=default (in effect since the 2026-05-10 recovery,
      # confirmed in CLAUDE.md), endpoints without a selecting CNP are NOT denied by
      # default — policy enforcement only activates for endpoints that a CNP explicitly
      # selects. There is therefore no urgency to place CNPs before Helm releases start;
      # CNPs only need to exist before the workloads they select begin running.
      #
      # The previous position (Stage 2a, before any Helm releases) caused a hard failure:
      # the `external-secrets` and `falco` namespaces are created by Stage 2b Helm
      # releases; applying the CNPs before Stage 2b meant `kubectl apply` returned
      # `namespaces "external-secrets" not found` and `namespaces "falco" not found`
      # (run 25672627928). Moving this step to after Stage 2b guarantees all target
      # namespaces exist.
      #
      # The early best-effort apply (pre-Stage-1, continue-on-error: true) still runs
      # on warm-start as a harmless no-op. The authoritative apply below (post-Stage-2)
      # is the convergence guarantee for both warm and cold starts.
      - name: Apply system network policies (post-Stage-2b)
        run: kubectl kustomize new-infra/k8s/system-netpols | kubectl apply -f -

      # Apply the shared ClusterSecretStore before any ExternalSecret consumer.
      # The store "aws-secrets-manager" is cluster-scoped and used by NOMAD,
      # suricata, and zeek. It was previously co-located in the suricata
      # kustomize (Stage 3), causing NOMAD's Stage 2c ExternalSecrets to fail
      # with "ClusterSecretStore not found". Moving the apply here — after ESO
      # is confirmed running (Stage 2b) and before Stage 2c — fixes the race.
      - name: Apply shared ClusterSecretStore (post-Stage-2b)
        run: |
          # Wait for the ClusterSecretStore CRD (installed by ESO in Stage 2b).
          for i in $(seq 1 30); do
            kubectl wait --for condition=established --timeout=30s \
              crd/clustersecretstores.external-secrets.io 2>&1 && break
            echo "ClusterSecretStore CRD not ready yet (attempt $i/30), retrying in 10s..."
            sleep 10
          done
          kubectl kustomize new-infra/k8s/system-secretstore | kubectl apply -f -
          # Best-effort readiness check — don't block indefinitely on IRSA warm-up.
          for i in $(seq 1 12); do
            STATUS=$(kubectl get clustersecretstore aws-secrets-manager \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            if [ "$STATUS" = "True" ]; then
              echo "ClusterSecretStore aws-secrets-manager is Ready"
              break
            fi
            echo "Waiting for ClusterSecretStore Ready (attempt $i/12, status=${STATUS:-unknown})..."
            sleep 10
          done

      # Stage 2c: Apply NOMAD ExternalSecrets and wait for ESO to sync them
      # BEFORE deploying the NOMAD helm release. The chart's lookup of
      # "nomad-oasis-mongodb" only works if the K8s Secret already exists.
      - name: Pre-create NOMAD ExternalSecrets (Stage 2c — pre-Helm)
        run: |
          # CRDs from ESO must be ready before applying ExternalSecret resources
          for i in $(seq 1 30); do
            kubectl wait --for condition=established --timeout=30s \
              crd/externalsecrets.external-secrets.io 2>&1 && break
            sleep 5
          done
          # Apply only the namespace + ExternalSecrets (NOT cilium-netpol which
          # depends on the helm release for some Cilium identity stuff).
          kubectl apply -f new-infra/k8s/nomad-oasis/namespace.yaml
          kubectl apply -f new-infra/k8s/nomad-oasis/external-secrets/
          # Wait for ESO to sync the mongo secret specifically — NOMAD chart's
          # configmap lookup needs nomad-oasis-mongodb in place before render.
          for i in $(seq 1 30); do
            if kubectl -n nomad-oasis get secret nomad-oasis-mongodb >/dev/null 2>&1; then
              echo "nomad-oasis-mongodb K8s Secret synced after ${i}x10s"
              break
            fi
            echo "Waiting for ESO to sync nomad-oasis-mongodb (attempt $i/30)..."
            sleep 10
          done
          kubectl -n nomad-oasis get secret nomad-oasis-mongodb \
            || (echo "FATAL: nomad-oasis-mongodb never synced — NOMAD will deploy with empty mongo password" && exit 1)

      # Stage 2d: NOMAD helm release — chart's lookup now finds the mongo secret.
      - name: Deploy NOMAD helm release (Stage 2d)
        working-directory: new-infra/environments/bc-prd/eu-central-1
        run: |
          terraform apply -auto-approve \
            -target=helm_release.nomad_oasis

      # Heal Temporal services after NOMAD install (schema-race recovery).
      #
      # Temporal frontend/history/matching/worker boot the moment the Helm
      # release lands and race against the temporal-schema Job which runs the
      # SQL migrations (0.0 → 1.18 visibility / 1.1 → 1.9 default). On a
      # cold-start the services usually win the race, cache the old schema
      # version, and then loop-crash or silently refuse to process workflows
      # once the migrations finish. A restart after the schema Job has had
      # 60s to make initial progress forces them to re-read the version table
      # and come up clean against the fully migrated schema.
      - name: Heal Temporal services after NOMAD install (schema-race recovery)
        run: |
          sleep 60
          kubectl -n nomad-oasis rollout restart \
            deploy/nomad-oasis-temporal-frontend \
            deploy/nomad-oasis-temporal-history \
            deploy/nomad-oasis-temporal-matching \
            deploy/nomad-oasis-temporal-worker
          kubectl -n nomad-oasis rollout status \
            deploy/nomad-oasis-temporal-frontend --timeout=300s
          kubectl -n nomad-oasis rollout status \
            deploy/nomad-oasis-temporal-history --timeout=300s
          kubectl -n nomad-oasis rollout status \
            deploy/nomad-oasis-temporal-matching --timeout=300s
          kubectl -n nomad-oasis rollout status \
            deploy/nomad-oasis-temporal-worker --timeout=300s

      - name: Wait for CRDs to propagate
        run: |
          # kubectl wait returns NotFound immediately if CRD doesn't exist yet.
          # Cilium CRDs are written ~1-3s after Helm returns. Retry until ready.
          for i in $(seq 1 30); do
            kubectl wait --for condition=established --timeout=30s \
              crd/ciliumnetworkpolicies.cilium.io \
              crd/tracingpolicies.cilium.io \
              crd/externalsecrets.external-secrets.io 2>&1 && break
            echo "CRDs not ready yet (attempt $i/30), retrying in 10s..."
            sleep 10
          done

      - name: Verify security stack (bc-prd)
        continue-on-error: true
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide
          echo "=== Falco pods ==="
          kubectl -n falco get pods -o wide
          kubectl -n falco rollout status daemonset/falco --timeout=120s || true
          echo "=== Tetragon pods ==="
          kubectl -n kube-system get pods -l app.kubernetes.io/name=tetragon -o wide

      # Authoritative apply of system CNPs — Cilium is now guaranteed up
      # (Stage 2 Helm completed + CRDs propagated). This is an idempotent
      # reapply that covers two cases:
      #   1. Warm-start: the early apply (pre-Stage-1) already landed these;
      #      this is a no-op.
      #   2. Cold-start: the CiliumNetworkPolicy CRD did not exist pre-Stage-1
      #      so the early apply was skipped (continue-on-error: true). This
      #      step is the real apply and MUST succeed before sensor pods start.
      # continue-on-error: false (default) — hard failure here is correct.
      - name: Apply system network policies — authoritative (post-Stage-2)
        run: kubectl kustomize new-infra/k8s/system-netpols | kubectl apply -f -

      - name: Deploy Zeek (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/zeek \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -

      - name: Deploy Suricata (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/suricata \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -


      - name: Build and push wazuh-agent image to ECR
        run: |
          ECR_REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ECR_REPO="wazuh-agent"
          IMAGE_TAG="4.14.4"
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
          docker build \
            --build-arg WAZUH_VERSION="${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}" \
            new-infra/docker/wazuh-agent/
          docker push "${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

      - name: Deploy Wazuh agent (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/wazuh-agent \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -

      # Apply NOMAD Oasis K8s manifests (namespace, ExternalSecrets, CNPs).
      # The Helm release (applied in Stage 2 Terraform above) creates the
      # NOMAD Deployments/Services; these manifests add:
      #   - nomad-oasis namespace (idempotent — may already exist from Helm)
      #   - ExternalSecret CRs pointing to bc/nomad-oasis/* SM paths
      #   - CiliumNetworkPolicies restricting NOMAD egress
      # They are applied AFTER CRD propagation so ExternalSecret and
      # CiliumNetworkPolicy types are guaranteed registered.
      - name: Deploy NOMAD Oasis K8s manifests (bc-prd)
        run: |
          kubectl kustomize new-infra/k8s/nomad-oasis \
            | sed "s/\${AWS_ACCOUNT_ID}/${{ env.AWS_ACCOUNT_ID }}/g" \
            | kubectl apply -f -

      # Post-deploy readiness check — confirms NOMAD pods scheduled and
      # healthy on the nomad node group within 30 minutes. Uses
      # continue-on-error: false (default) so the job fails loudly if
      # the deployment never becomes ready, rather than silently green.
      #
      # Cold-start budget (observed 2026-05-10):
      #   - EFS PVC access point creation:           ~2 min
      #   - gitlab.mpcdf.mpg.de:v1.4.2 image pull:   ~3-5 min (1.3 GB)
      #   - MongoDB/Postgres/ES init + readiness:    ~3-5 min
      #   - OPTIMADE module + test data load:        ~5 min
      #   - FastAPI startup hooks (ES connect):      ~3-5 min
      #   - Worker connects to Temporal:             ~1-2 min
      # Total observed end-to-end: ~18-20 min on a fresh cluster. 900s
      # was too tight; bumped to 1800s with margin. Liveness probe inside
      # the chart already has its own 80x15s budget (~20 min) so this
      # wait is the slowest of the two.
      - name: Verify NOMAD Oasis pods ready (bc-prd)
        run: |
          kubectl -n nomad-oasis wait \
            --for=condition=ready pod \
            -l app.kubernetes.io/name=nomad \
            --timeout=1800s
