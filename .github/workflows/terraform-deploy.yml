name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - "new-infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy specific environment (or 'all')"
        required: false
        default: "all"
        type: choice
        options: [all, tgw, xdr, ctrl, prd, runner]

permissions:
  contents: read
  id-token: write
  actions: read

env:
  TF_VERSION: "1.5.7"
  AWS_REGION: "eu-central-1"
  AWS_ROLE_ARN: "arn:aws:iam::286439316079:role/GitHubActionsDeployRole"

jobs:
  # ---------------------------------------------------------------
  # Step 1a: Transit Gateway (must run first)
  # ---------------------------------------------------------------
  deploy-tgw:
    name: "Deploy — Transit Gateway"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == 'tgw' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: new-infra/shared/transit-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------
  # Step 1b: GitHub Actions runners (parallel with TGW)
  # Pure AWS API — runs on ubuntu-latest, no K8s access needed.
  # ---------------------------------------------------------------
  deploy-runner:
    name: "Deploy — GitHub Runner"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == 'runner' || github.event_name == 'push' }}
    defaults:
      run:
        working-directory: new-infra/shared/github-runner
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------
  # Step 2: XDR VPC (depends on TGW — creates spoke default route)
  # No EKS, no K8s API — runs on ubuntu-latest.
  # ---------------------------------------------------------------
  deploy-xdr:
    name: "Deploy — bc-xdr"
    runs-on: ubuntu-latest
    needs: deploy-tgw
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'xdr' || github.event_name == 'push') }}
    defaults:
      run:
        working-directory: new-infra/environments/bc-xdr/eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan

  # ---------------------------------------------------------------
  # Step 2.5: Wait for self-hosted runners to register
  # deploy-runner creates/replaces EC2 instances via Terraform but
  # returns before the runner agent finishes booting. This job
  # polls the GitHub API (up to 10 min) until bc-ctrl and bc-prd
  # runners report as online so deploy-ctrl/prd don't queue forever.
  # ---------------------------------------------------------------
  wait-for-runners:
    name: "Wait — self-hosted runners online"
    runs-on: ubuntu-latest
    needs: deploy-runner
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'ctrl' || github.event.inputs.environment == 'prd' || github.event_name == 'push') }}
    steps:
      - name: Poll until bc-ctrl + bc-prd runners are online
        uses: actions/github-script@v7
        with:
          script: |
            const required = ['bc-ctrl', 'bc-prd'];
            const maxSeconds = 600;
            const pollInterval = 15;

            for (let elapsed = 0; elapsed < maxSeconds; elapsed += pollInterval) {
              const { data } = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              const onlineLabels = data.runners
                .filter(r => r.status === 'online')
                .flatMap(r => r.labels.map(l => l.name));

              const missing = required.filter(l => !onlineLabels.includes(l));
              if (missing.length === 0) {
                core.info('All runners online: ' + required.join(', '));
                return;
              }

              core.info(`[${elapsed}s] Still waiting for: ${missing.join(', ')}`);
              await new Promise(r => setTimeout(r, pollInterval * 1000));
            }

            core.setFailed('Self-hosted runners did not come online within 10 minutes');

  # ---------------------------------------------------------------
  # Steps 3 + 4: ctrl and prd in parallel
  # Runs on self-hosted runners inside each VPC — can reach
  # private EKS endpoints for Helm + Kubernetes resources.
  # ---------------------------------------------------------------
  deploy-ctrl:
    name: "Deploy — bc-ctrl"
    runs-on: [self-hosted, linux, bc-ctrl]
    needs: [deploy-xdr, wait-for-runners]
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'ctrl' || github.event_name == 'push') }}
    defaults:
      run:
        working-directory: new-infra/environments/bc-ctrl/eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan

  deploy-prd:
    name: "Deploy — bc-prd"
    runs-on: [self-hosted, linux, bc-prd]
    needs: [deploy-xdr, wait-for-runners]
    if: ${{ always() && !failure() && !cancelled() && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prd' || github.event_name == 'push') }}
    defaults:
      run:
        working-directory: new-infra/environments/bc-prd/eu-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan -no-color
      - run: terraform apply -auto-approve tfplan
