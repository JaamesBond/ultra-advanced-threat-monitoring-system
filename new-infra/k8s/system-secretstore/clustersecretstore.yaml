#--------------------------------------------------------------
# ClusterSecretStore — shared cluster-scoped store for all
# ExternalSecret consumers (NOMAD, suricata, zeek, wazuh-agent).
#
# DEPLOYED TO: bc-prd EKS cluster
#
# This resource is cluster-scoped (no namespace). It MUST be
# applied after the External Secrets Operator is running (Stage 2b)
# and BEFORE any ExternalSecret consumer is created. The workflow
# step "Apply shared ClusterSecretStore (post-Stage-2b)" in
# terraform-deploy.yml owns this ordering guarantee.
#
# Previously this was co-located in k8s/suricata/external-secrets.yaml,
# which caused NOMAD's Stage 2c ExternalSecrets to fail with:
#   could not get ClusterSecretStore "aws-secrets-manager"
# because the suricata kustomize runs at Stage 3, after NOMAD.
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: xdr-platform
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
