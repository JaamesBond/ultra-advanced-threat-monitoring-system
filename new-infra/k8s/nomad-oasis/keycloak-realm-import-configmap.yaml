#--------------------------------------------------------------
# Keycloak realm import ConfigMap
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# Mounted at /opt/keycloak/data/import inside the Keycloak pod.
# Keycloak processes --import-realm at startup and imports all JSON
# files in that directory. If the realm already exists (warm-restart),
# Keycloak skips the import silently — fully idempotent.
#
# Realm: nomad-oasis
#   - Public client:     nomad_public (no client secret required)
#   - Admin client:      admin-cli (direct access, for NOMAD backend admin API)
#   - Redirect URIs:     http://localhost/* (covers port-forward on any port)
#   - Web origins:       http://localhost  (CORS — same origin as redirect)
#   - Test user:         testuser / testpass123 (dev/test only)
#
# Admin user (nomad-oasis realm) — NOT in this ConfigMap (contains a secret
# password). Created by the "Setup Keycloak nomad-oasis admin user" pipeline
# step (Step A2) which reads the password from nomad-keycloak-secret and
# calls the Keycloak admin API. Required so NOMAD's KeycloakAdmin client
# (which authenticates against realm_name=nomad-oasis, not master) can call
# the KC admin API for user lookups. Without it every authenticated NOMAD
# request fails with "unknown user (403)".
#
# testuser.createdTimestamp — users imported without createdTimestamp in the
# realm JSON have the field absent from the KC admin API response, which
# causes KeyError in NOMAD's __user_from_keycloak_user. Use any epoch ms
# value here; Keycloak normalises it on import.
#
# Cold-restart safety: this ConfigMap is git-tracked and applied via
# kustomize on every pipeline run — the realm is always re-importable
# on a fresh cluster with no persistent Keycloak state.
#--------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
data:
  nomad-oasis-realm.json: |
    {
      "id": "nomad-oasis",
      "realm": "nomad-oasis",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": false,
      "editUsernameAllowed": false,
      "bruteForceProtected": false,
      "clients": [
        {
          "clientId": "nomad_public",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            "http://localhost/*"
          ],
          "webOrigins": [
            "http://localhost"
          ],
          "protocol": "openid-connect",
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        },
        {
          "clientId": "admin-cli",
          "enabled": true,
          "publicClient": true,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "protocol": "openid-connect"
        }
      ],
      "users": [
        {
          "username": "testuser",
          "enabled": true,
          "emailVerified": true,
          "email": "testuser@nomad-oasis.local",
          "firstName": "Test",
          "lastName": "User",
          "createdTimestamp": 1000000000000,
          "credentials": [
            {
              "type": "password",
              "value": "testpass123",
              "temporary": false
            }
          ],
          "realmRoles": [
            "default-roles-nomad-oasis"
          ]
        }
      ]
    }
