#--------------------------------------------------------------
# NOMAD proxy nginx ConfigMap overlay
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# Patches the chart-generated ConfigMap "nomad-oasis-configmap-proxy"
# to add an /auth/ location block that proxies browser Keycloak requests
# to the local Keycloak ClusterIP Service.
#
# Pipeline self-heals this after every Helm release:
#   kubectl apply -f nomad-proxy-configmap-patch.yaml
#   kubectl -n nomad-oasis rollout restart deploy/nomad-oasis-proxy
#   kubectl -n nomad-oasis rollout status deploy/nomad-oasis-proxy --timeout=120s
#
# STRUCTURE NOTE:
#   The chart's nginx ConfigMap contains ONLY a `server { ... }` block,
#   no outer `http {}` or `events {}`. The image's base nginx.conf
#   includes this snippet inside its existing http context. The content
#   below mirrors the chart-generated nginx.conf byte-for-byte (captured
#   from the running cluster on 2026-05-11 via kubectl get cm) and adds
#   one new location block for `/auth/`. Any drift from the chart
#   nginx.conf will silently break NOMAD GUI routing — keep this file
#   in lock-step with the chart's template.
#
# PORTS:
#   Service nomad-oasis-keycloak exposes :80 (chart default), which the
#   keycloakx Deployment maps to pod port 8080 (Keycloak default).
#   The proxy_pass below uses port 80 (the Service port).
#--------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: nomad-oasis-configmap-proxy
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
data:
  nginx.conf: |
    server {
      listen        80;
      server_name   nomad.bc-ctrl.internal;
      proxy_set_header Host $host;

      proxy_connect_timeout 10;
      proxy_read_timeout 60;
      proxy_pass_request_headers      on;
      underscores_in_headers          on;
      gzip_min_length     1000;
      gzip_buffers        4 8k;
      gzip_http_version   1.0;
      gzip_disable        "msie6";
      gzip_vary           on;
      gzip on;
      gzip_proxied any;
      gzip_types
          text/css
          text/javascript
          text/xml
          text/plain
          application/javascript
          application/x-javascript
          application/json;

      location / {
        proxy_pass http://nomad-oasis-app:8000;
      }

      location ~ /nomad-oasis\/?(gui)?$ {
        rewrite ^ /nomad-oasis/gui/ permanent;
      }

      location /nomad-oasis/gui/ {
        proxy_intercept_errors on;
        error_page 404 = @redirect_to_index;
        proxy_pass http://nomad-oasis-app:8000;
      }

      location @redirect_to_index {
        rewrite ^ /nomad-oasis/gui/index.html break;
        proxy_pass http://nomad-oasis-app:8000;
      }

      location /nomad-oasis/docs/ {
        proxy_intercept_errors on;
        error_page 404 = @redirect_to_index_docs;
        proxy_pass http://nomad-oasis-app:8000;
      }

      location @redirect_to_index_docs {
        rewrite ^ /nomad-oasis/docs/index.html break;
        proxy_pass http://nomad-oasis-app:8000;
      }

      location ~ \/gui\/(service-worker\.js|meta\.json)$ {
        add_header Last-Modified $date_gmt;
        add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
        if_modified_since off;
        expires off;
        etag off;
        proxy_pass http://nomad-oasis-app:8000;
      }

      location ~ /api/v1/uploads(/?$|.*/raw|.*/bundle?$)  {
        client_max_body_size 35g;
        proxy_request_buffering off;
        proxy_pass http://nomad-oasis-app:8000;
      }

      location ~ /api/v1/.*/download {
        proxy_buffering off;
        proxy_pass http://nomad-oasis-app:8000;
      }

      location ~ /api/v1/entries/edit {
        proxy_buffering off;
        proxy_read_timeout 60;
        proxy_pass http://nomad-oasis-app:8000;
      }

      # ---------------------------------------------------------------
      # Keycloak — local IdP for browser login (NET-NEW vs chart default)
      #
      # Forwards /auth/* to the in-cluster Keycloak Service. Keycloak
      # listens on its --http-relative-path=/auth so the trailing slash
      # on proxy_pass preserves the path (no rewrite needed).
      #
      # TLS terminates at the ALB. The proxy → Keycloak hop is plain HTTP,
      # but Keycloak must believe the original request was HTTPS so that:
      #   1. OIDC issuer in tokens is https://nomad.bc-ctrl.internal/auth/...
      #   2. Keycloak sets SameSite=None; Secure on session cookies.
      #   3. Redirect URIs constructed by Keycloak use https://.
      # KC_PROXY_HEADERS=xforwarded (set in nomad-values.yaml) makes
      # Keycloak trust X-Forwarded-* headers. We hardcode Proto=https
      # rather than forwarding $scheme (which would be http at this hop).
      # ---------------------------------------------------------------
      location /auth/ {
        proxy_pass http://nomad-oasis-keycloak-http/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host nomad.bc-ctrl.internal;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
      }
    }
