#--------------------------------------------------------------
# NOMAD Oasis — ALB Ingress
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# Internal ALB (private subnets only — not internet-facing).
# TLS terminates at the ALB with the wildcard cert for *.bc-ctrl.internal
# (ACM cert ARN substituted by pipeline via sed, same mechanism as
# ${AWS_ACCOUNT_ID}).
#
# group.name: xdr-shared — Hubble UI and other internal services share
# this ALB instance to avoid per-service ALB cost.
#
# target-type: ip — required with Cilium ENI mode. ALB targets pod IPs
# directly (not node IPs) so traffic bypasses kube-proxy/iptables and
# routes to the pod ENI that Cilium manages.
#
# HTTP → HTTPS redirect: ssl-redirect annotation forces all HTTP:80
# traffic to redirect to HTTPS:443 at the ALB (301). The proxy itself
# remains plain HTTP behind the ALB — it never sees a TLS connection.
#
# Health check: / — the NOMAD proxy nginx serves a 200 at /nomad-oasis/gui/
# but the default / also returns a non-error from nginx, which is
# sufficient. If the ALB health check flaps, change to /nomad-oasis/gui/.
#--------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nomad-oasis-ingress
  namespace: nomad-oasis
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERT_ARN}
    alb.ingress.kubernetes.io/group.name: xdr-shared
    alb.ingress.kubernetes.io/healthcheck-path: /
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
spec:
  ingressClassName: alb
  rules:
    - host: nomad.bc-ctrl.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nomad-oasis-proxy
                port:
                  number: 80
