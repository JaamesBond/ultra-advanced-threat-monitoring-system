  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:eks.amazonaws.com/component: coredns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    # Peer discovery (Elasticsearch transport between replicas if scaled)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: nomad-oasis
            app.kubernetes.io/name: elasticsearch
            app.kubernetes.io/instance: nomad-oasis
      toPorts:
        - ports:
            - port: "9300"
              protocol: TCP
    # STS VPC endpoint
    - toCIDRSet:
        - cidr: 10.30.10.209/32
        - cidr: 10.30.11.123/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Image registry (toFQDNs broken in ENI mode)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
