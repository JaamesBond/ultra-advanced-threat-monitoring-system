#--------------------------------------------------------------
# ExternalSecret — nomad-api-secret
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# Source: AWS Secrets Manager path bc/nomad-oasis/api
#   Expected SM secret JSON: { "api_secret": "<value>" }
#   Shell created by Terraform (secrets-nomad.tf); value populated by CI
#   bootstrap (pipeline-engineer) before the NOMAD Helm release runs.
#
# Target K8s Secret: nomad-api-secret
#   Key: password  (matches nomad.secrets.api.key in nomad-values.yaml)
#
# Used by: NOMAD app and worker pods via NOMAD_SERVICES_API_SECRET env var
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nomad-api-secret
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: nomad-api-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: xdr-platform
          app.kubernetes.io/component: nomad-oasis

  data:
    - secretKey: password
      remoteRef:
        key: bc/nomad-oasis/api
        property: api_secret
