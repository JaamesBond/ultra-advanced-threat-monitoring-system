#--------------------------------------------------------------
# ExternalSecret — nomad-keycloak-secret
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# NOTE: Keycloak is DISABLED for v1 (keycloak.enabled=false in nomad-values.yaml).
# This ExternalSecret is deployed regardless so the K8s secret pre-exists
# when Keycloak is enabled in a future phase — avoids a race between ESO
# sync and Helm upgrade applying the new keycloak sub-chart.
#
# Source: AWS Secrets Manager path bc/nomad-oasis/keycloak
#   Expected SM secret JSON:
#     { "client_secret": "<oidc-client-secret>", "password": "<admin-password>" }
#   Shell created by Terraform (secrets-nomad.tf); value populated by CI.
#
# Target K8s Secret: nomad-keycloak-secret
#   Keys used by nomad-values.yaml:
#     client_secret → nomad.secrets.keycloak.clientSecret.key
#     password      → nomad.secrets.keycloak.password.key
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nomad-keycloak-secret
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: nomad-keycloak-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: xdr-platform
          app.kubernetes.io/component: nomad-oasis

  data:
    - secretKey: client_secret
      remoteRef:
        key: bc/nomad-oasis/keycloak
        property: client_secret
    - secretKey: password
      remoteRef:
        key: bc/nomad-oasis/keycloak
        property: password
