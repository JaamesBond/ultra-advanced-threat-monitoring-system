#--------------------------------------------------------------
# ExternalSecret — nomad-keycloak-secret
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# Source: AWS Secrets Manager path bc/nomad-oasis/keycloak
#   Expected SM secret JSON:
#     {
#       "client_secret": "<oidc-client-secret>",
#       "password":      "<keycloak-admin-password>",
#       "db_password":   "<keycloak-postgres-password>"
#     }
#   Shell created by Terraform (secrets-nomad.tf); values populated by CI
#   via seed-nomad-secrets.sh (reads NOMAD_KEYCLOAK_DB_PASSWORD GitHub Secret).
#
# Target K8s Secret: nomad-keycloak-secret
#   Keys used by nomad-values.yaml:
#     client_secret → nomad.secrets.keycloak.clientSecret.key
#     password      → nomad.secrets.keycloak.password.key (KEYCLOAK_ADMIN_PASSWORD)
#     db_password   → keycloak.extraEnv KC_DB_PASSWORD
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nomad-keycloak-secret
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: nomad-keycloak-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: xdr-platform
          app.kubernetes.io/component: nomad-oasis

  data:
    - secretKey: client_secret
      remoteRef:
        key: bc/nomad-oasis/keycloak
        property: client_secret
    - secretKey: password
      remoteRef:
        key: bc/nomad-oasis/keycloak
        property: password
    - secretKey: db_password
      remoteRef:
        key: bc/nomad-oasis/keycloak
        property: db_password
