#--------------------------------------------------------------
# ExternalSecret — nomad-mongo-secret
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# Source: AWS Secrets Manager path bc/nomad-oasis/mongo
#   Expected SM secret JSON: { "root_password": "<value>" }
#   Shell created by Terraform (secrets-nomad.tf); value populated by CI.
#
# Target K8s Secret: nomad-mongo-secret
#   Key: mongodb-root-password
#     CRITICAL: The chart's mongodb deployment template hard-codes the
#     secretKeyRef key as "mongodb-root-password" (see templates/mongodb/deployment.yaml).
#     This key name is NOT configurable — it must match exactly or MongoDB
#     will fail to start with a missing env var.
#
# Cross-ref: mongodb.auth.existingSecret=nomad-mongo-secret in nomad-values.yaml
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nomad-mongo-secret
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: nomad-mongo-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: xdr-platform
          app.kubernetes.io/component: nomad-oasis

  data:
    - secretKey: mongodb-root-password
      remoteRef:
        key: bc/nomad-oasis/mongo
        property: root_password
