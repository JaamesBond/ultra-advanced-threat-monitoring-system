#--------------------------------------------------------------
# ExternalSecret — nomad-mongo-secret
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# Source: AWS Secrets Manager path bc/nomad-oasis/mongo
#   Expected SM secret JSON: { "root_password": "<value>" }
#   Shell created by Terraform (secrets-nomad.tf); value populated by CI.
#
# Target K8s Secret: nomad-oasis-mongodb (NOTE: NOT "nomad-mongo-secret")
#   Key: mongodb-root-password
#
#   CRITICAL: The upstream chart at templates/configmap.yml hard-codes a
#   secret-name lookup to `{{ .Release.Name }}-mongodb` (= "nomad-oasis-mongodb")
#   to read mongodb-root-password and embed it in the rendered NOMAD config
#   as the mongo URI password. The lookup does NOT respect
#   mongodb.auth.existingSecret — that field is only used by the mongodb
#   Deployment template, not the NOMAD app configmap. So the K8s Secret
#   target name MUST be exactly "{release-name}-mongodb" for the NOMAD app
#   to receive the mongo password. With any other name the chart's
#   lookup returns empty, the rendered URI omits credentials, the app
#   starts unauthenticated, mongo rejects, and FastAPI startup hooks hang
#   forever (kubelet liveness-kills the pod after 21 min and the loop
#   repeats — observed 2026-05-10 with the previous "nomad-mongo-secret"
#   name causing hours of cascading "app won't become Ready" failures).
#
# Cross-ref: mongodb.auth.existingSecret=nomad-oasis-mongodb in nomad-values.yaml
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nomad-mongo-secret
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: nomad-oasis-mongodb
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: xdr-platform
          app.kubernetes.io/component: nomad-oasis

  data:
    - secretKey: mongodb-root-password
      remoteRef:
        key: bc/nomad-oasis/mongo
        property: root_password
