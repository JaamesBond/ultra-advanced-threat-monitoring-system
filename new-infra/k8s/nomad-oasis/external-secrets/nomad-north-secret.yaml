#--------------------------------------------------------------
# ExternalSecret — nomad-north-secret
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# NOTE: NORTH (JupyterHub) is DISABLED for v1 (nomad.config.north.enabled=false).
# This ExternalSecret is deployed regardless to pre-populate the K8s secret
# so it exists when NORTH is enabled in a future phase.
#
# Source: AWS Secrets Manager path bc/nomad-oasis/north
#   Expected SM secret JSON: { "hub_service_api_token": "<value>" }
#   Shell created by Terraform (secrets-nomad.tf); value populated by CI.
#
# Target K8s Secret: nomad-north-secret
#   Key: token
#     Matches nomad.secrets.north.hubServiceApiToken.key in nomad-values.yaml
#     and jupyterhub.hub.extraEnv.NOMAD_NORTH_HUB_SERVICE_API_TOKEN.secretKeyRef.key
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nomad-north-secret
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: nomad-north-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: xdr-platform
          app.kubernetes.io/component: nomad-oasis

  data:
    - secretKey: token
      remoteRef:
        key: bc/nomad-oasis/north
        property: hub_service_api_token
