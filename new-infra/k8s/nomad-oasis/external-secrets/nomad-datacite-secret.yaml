#--------------------------------------------------------------
# ExternalSecret — nomad-datacite-secret
#
# DEPLOYED TO: bc-prd EKS, namespace nomad-oasis
#
# NOTE: DataCite DOI minting is disabled for v1 (nomad.config.datacite.enabled=false).
# The shell SM secret (bc/nomad-oasis/datacite) may remain unpopulated by CI
# until Big Chemistry acquires a DataCite membership. ESO will set the
# ExternalSecret status to SecretSyncedError in that case — this is expected
# and will not block the NOMAD Helm release (existingSecret is only read if
# nomad.config.datacite.enabled=true).
#
# Source: AWS Secrets Manager path bc/nomad-oasis/datacite
#   Expected SM secret JSON: { "password": "<value>", "user": "<username>" }
#   Shell created by Terraform (secrets-nomad.tf).
#
# Target K8s Secret: nomad-datacite-secret
#   Keys: password, user
#     Matches nomad.secrets.datacite.key=password in nomad-values.yaml
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nomad-datacite-secret
  namespace: nomad-oasis
  labels:
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/component: nomad-oasis
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: nomad-datacite-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: xdr-platform
          app.kubernetes.io/component: nomad-oasis

  data:
    - secretKey: password
      remoteRef:
        key: bc/nomad-oasis/datacite
        property: password
    - secretKey: user
      remoteRef:
        key: bc/nomad-oasis/datacite
        property: user
