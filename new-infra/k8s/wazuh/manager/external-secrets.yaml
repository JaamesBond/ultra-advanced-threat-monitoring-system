#--------------------------------------------------------------
# Wazuh Manager — ExternalSecret manifests
#
# DEPLOYED TO: bc-ctrl EKS cluster
#
# Creates two objects:
#
# 1. ClusterSecretStore "aws-secrets-manager"
#    Tells the external-secrets operator how to talk to AWS
#    Secrets Manager. The operator pod authenticates via EKS
#    Pod Identity (no static credentials). The IAM role is bound
#    to the "external-secrets" SA in the "external-secrets"
#    namespace by eks_pod_identity_association in eks-addons.tf.
#
# 2. ExternalSecret "wazuh-manager-secrets"
#    Reads bc/wazuh/manager from Secrets Manager (a single JSON
#    blob) and maps every top-level key into the K8s Secret
#    "wazuh-manager-secrets" in the "wazuh" namespace.
#
# Required Secrets Manager secret (seed once):
#   aws secretsmanager create-secret \
#     --name bc/wazuh/manager \
#     --secret-string '{
#       "PLACEHOLDER_CLUSTER_KEY":     "<32-char random hex>",
#       "PLACEHOLDER_AWS_ACCOUNT_ID":  "<12-digit account ID>",
#       "PLACEHOLDER_SHUFFLE_HOOK_ID": "<Shuffle hook UUID>",
#       "PLACEHOLDER_MISP_API_KEY":    "FILL_IN",
#       "INDEXER_USERNAME":            "admin",
#       "INDEXER_PASSWORD":            "<strong password>",
#       "API_USERNAME":                "wazuh-wui",
#       "API_PASSWORD":                "<strong password>"
#     }'
#
# PLACEHOLDER_MISP_API_KEY: fill in after MISP is deployed.
# Run update-fill-in-secrets.sh with MISP_AUTH_KEY=<key from MISP admin UI>
#
# Apply order:
#   1. external-secrets Helm chart (via Terraform)
#   2. This file
#   3. manager/statefulset.yaml
#--------------------------------------------------------------

#--------------------------------------------------------------
# 1. ClusterSecretStore — AWS Secrets Manager (eu-central-1)
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: xdr-platform
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      # Authenticate using the external-secrets operator's own SA,
      # which has an EKS Pod Identity association to the IAM role
      # created in modules/eks-addons/main.tf.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
#--------------------------------------------------------------
# 2. ExternalSecret — wazuh-manager-secrets
#
# Uses dataFrom.extract: pulls the entire JSON object stored at
# bc/wazuh/manager and materialises each top-level key as a
# key/value pair in the resulting K8s Secret. This means:
#   Secrets Manager key → K8s Secret key (1:1, no renaming)
#
# The inject-secrets init container (envsubst) + the main
# container (env.secretKeyRef) both reference this Secret.
# Keys consumed:
#   envsubst  : PLACEHOLDER_CLUSTER_KEY, PLACEHOLDER_AWS_ACCOUNT_ID,
#               PLACEHOLDER_SHUFFLE_HOOK_ID, PLACEHOLDER_MISP_API_KEY
#   env vars  : INDEXER_USERNAME, INDEXER_PASSWORD,
#               API_USERNAME, API_PASSWORD, PLACEHOLDER_CLUSTER_KEY
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wazuh-manager-secrets
  namespace: wazuh
  labels:
    app: wazuh-manager
    app.kubernetes.io/part-of: xdr-platform
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: wazuh-manager-secrets
    creationPolicy: Owner      # ESO owns the Secret; deletes it when this CR is deleted
    deletionPolicy: Retain     # Keep the K8s Secret if ESO is uninstalled (safety net)
    template:
      type: Opaque
      metadata:
        labels:
          app: wazuh-manager
          app.kubernetes.io/part-of: xdr-platform

  # Extract all keys from the bc/wazuh/manager JSON blob in one shot.
  # Add individual `data` entries below if you need to pull from
  # separate secrets (e.g. a separate bc/wazuh/integrations secret).
  dataFrom:
    - extract:
        key: bc/wazuh/manager
