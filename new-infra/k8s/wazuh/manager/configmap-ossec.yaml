#--------------------------------------------------------------
# Wazuh Manager — ossec.conf ConfigMap
#
# Deployed to: bc-ctrl EKS cluster, namespace "wazuh"
# Mounted at:  /wazuh-config-mount/etc/ossec.conf
#
# Secrets (cluster key, API keys, webhooks) use PLACEHOLDER_*
# tokens that are substituted at pod startup by an initContainer
# running `envsubst` against env vars sourced from AWS Secrets
# Manager via the Secrets Store CSI Driver.
#
# Tuning goals: MAXIMUM detection coverage with XDR integration.
# All log levels captured (log_alert_level=1). Noise reduction
# happens at query time in the Indexer/Dashboard, not at collection.
#--------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-manager-config
  namespace: wazuh
  labels:
    app: wazuh-manager
    app.kubernetes.io/component: siem-manager
data:
  ossec.conf: |
    <ossec_config>

      <!--========================================================
           1. GLOBAL SETTINGS
           JSON output is mandatory for Indexer ingestion.
           logall / logall_json capture EVERY event, not just alerts,
           for forensic replay and ML training data.
      =========================================================-->
      <global>
        <jsonout_output>yes</jsonout_output>
        <alerts_log>yes</alerts_log>
        <logall>yes</logall>
        <logall_json>yes</logall_json>
        <email_notification>no</email_notification>
        <smtp_server>localhost</smtp_server>
        <email_from>wazuh@bigchemistry.internal</email_from>
        <email_to>soc@bigchemistry.internal</email_to>
        <email_maxperhour>50</email_maxperhour>
        <email_log_source>alerts.log</email_log_source>
        <agents_disconnection_time>10m</agents_disconnection_time>
        <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
        <update_check>no</update_check>
      </global>

      <!--========================================================
           2. ALERT THRESHOLDS
           log_alert_level=1 logs EVERYTHING (levels 1-15).
           email_alert_level=12 only emails critical events.
      =========================================================-->
      <alerts>
        <log_alert_level>1</log_alert_level>
        <email_alert_level>12</email_alert_level>
      </alerts>

      <logging>
        <log_format>plain,json</log_format>
      </logging>

      <!--========================================================
           3. REMOTE — Agent connection endpoint
           Queue size 131072: handles bursts from ~500 agents.
           Connection threads = 4 for high concurrency.
      =========================================================-->
      <remote>
        <connection>secure</connection>
        <port>1514</port>
        <protocol>tcp</protocol>
        <queue_size>131072</queue_size>
        <allowed-ips>10.30.0.0/16</allowed-ips>
        <allowed-ips>10.0.0.0/16</allowed-ips>
        <allowed-ips>10.11.0.0/16</allowed-ips>
      </remote>

      <!--========================================================
           4. AUTH — Agent enrollment
           Password-based enrollment; password is read from
           /var/ossec/etc/authd.pass which is populated at startup
           from AWS Secrets Manager (secret: bc/wazuh/agent-enrollment-password).
      =========================================================-->
      <auth>
        <disabled>no</disabled>
        <port>1515</port>
        <use_source_ip>no</use_source_ip>
        <purge>yes</purge>
        <use_password>yes</use_password>
        <ciphers>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ciphers>
        <ssl_verify_host>no</ssl_verify_host>
        <ssl_manager_cert>/var/ossec/etc/sslmanager.cert</ssl_manager_cert>
        <ssl_manager_key>/var/ossec/etc/sslmanager.key</ssl_manager_key>
        <ssl_auto_negotiate>no</ssl_auto_negotiate>
      </auth>

      <!--========================================================
           5. CLUSTER — 3-node HA
           Master: wazuh-manager-0  (handles all agent enrollment)
           Workers: wazuh-manager-1, wazuh-manager-2
           Cluster key is substituted at startup from PLACEHOLDER.
      =========================================================-->
      <cluster>
        <name>bc-wazuh-cluster</name>
        <node_name>NODE_NAME_PLACEHOLDER</node_name>
        <node_type>NODE_TYPE_PLACEHOLDER</node_type>
        <key>PLACEHOLDER_CLUSTER_KEY</key>
        <port>1516</port>
        <bind_addr>0.0.0.0</bind_addr>
        <nodes>
          <node>wazuh-manager-0.wazuh-manager-headless.wazuh.svc.cluster.local</node>
          <node>wazuh-manager-1.wazuh-manager-headless.wazuh.svc.cluster.local</node>
          <node>wazuh-manager-2.wazuh-manager-headless.wazuh.svc.cluster.local</node>
        </nodes>
        <hidden>no</hidden>
        <disabled>no</disabled>
      </cluster>

      <!--========================================================
           6. RULESET
           All stock decoders/rules + custom MISP IOC lists
           (pushed by an external cron job from MISP in bc-xdr).
      =========================================================-->
      <ruleset>
        <decoder_dir>ruleset/decoders</decoder_dir>
        <rule_dir>ruleset/rules</rule_dir>
        <rule_exclude>0215-policy_rules.xml</rule_exclude>
        <list>etc/lists/audit-keys</list>
        <list>etc/lists/amazon/aws-eventnames</list>
        <list>etc/lists/security-eventchannel</list>
        <!-- MISP threat-intel CDB lists, refreshed every 15m by sidecar -->
        <list>etc/lists/misp-ioc-ip</list>
        <list>etc/lists/misp-ioc-domain</list>
        <list>etc/lists/misp-ioc-hash-md5</list>
        <list>etc/lists/misp-ioc-hash-sha1</list>
        <list>etc/lists/misp-ioc-hash-sha256</list>
        <list>etc/lists/misp-ioc-url</list>
        <!-- Custom Wazuh rules for bc-specific detection -->
        <decoder_dir>etc/decoders</decoder_dir>
        <rule_dir>etc/rules</rule_dir>
      </ruleset>

      <!--========================================================
           7. SYSCHECK — File Integrity Monitoring
           Realtime on all critical OS dirs. report_changes=yes
           diffs text file contents so we can see WHAT changed,
           not just that something changed. Essential for detecting
           config tampering, webshell drops, binary replacement.
      =========================================================-->
      <syscheck>
        <disabled>no</disabled>
        <frequency>300</frequency>
        <scan_on_start>yes</scan_on_start>
        <alert_new_files>yes</alert_new_files>
        <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

        <!-- OS binaries - any change is suspicious -->
        <directories check_all="yes" realtime="yes" report_changes="yes">/etc,/usr/bin,/usr/sbin</directories>
        <directories check_all="yes" realtime="yes" report_changes="yes">/bin,/sbin,/boot</directories>

        <!-- Web roots - webshell detection -->
        <directories check_all="yes" realtime="yes" report_changes="yes">/var/www,/srv/www</directories>

        <!-- Container runtime state -->
        <directories check_all="yes" realtime="yes">/var/log</directories>
        <directories check_all="yes" realtime="yes">/etc/kubernetes,/etc/cni</directories>

        <!-- Noise reduction: volatile files that change constantly -->
        <ignore>/etc/mtab</ignore>
        <ignore>/etc/hosts.deny</ignore>
        <ignore>/etc/mail/statistics</ignore>
        <ignore>/etc/random-seed</ignore>
        <ignore>/etc/adjtime</ignore>
        <ignore>/etc/httpd/logs</ignore>
        <ignore>/etc/utmpx</ignore>
        <ignore>/etc/wtmpx</ignore>
        <ignore>/etc/cups/certs</ignore>
        <ignore>/etc/dumpdates</ignore>
        <ignore>/etc/svc/volatile</ignore>

        <!-- Never diff private keys — their content is sensitive -->
        <nodiff>/etc/ssl/private.key</nodiff>
        <nodiff>/etc/pki/tls/private</nodiff>

        <skip_nfs>yes</skip_nfs>
        <skip_dev>yes</skip_dev>
        <skip_proc>yes</skip_proc>
        <skip_sys>yes</skip_sys>
        <process_priority>10</process_priority>
        <max_eps>50</max_eps>

        <!-- Sync FIM database with agents every 5m for drift detection -->
        <synchronization>
          <enabled>yes</enabled>
          <interval>5m</interval>
          <max_interval>1h</max_interval>
          <max_eps>10</max_eps>
        </synchronization>
      </syscheck>

      <!--========================================================
           8. ROOTCHECK — Rootkit & hidden process detection
      =========================================================-->
      <rootcheck>
        <disabled>no</disabled>
        <check_files>yes</check_files>
        <check_trojans>yes</check_trojans>
        <check_dev>yes</check_dev>
        <check_sys>yes</check_sys>
        <check_pids>yes</check_pids>
        <check_ports>yes</check_ports>
        <check_if>yes</check_if>
        <frequency>43200</frequency>
        <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
        <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
        <system_audit>etc/shared/system_audit_rcl.txt</system_audit>
        <system_audit>etc/shared/system_audit_ssh.txt</system_audit>
        <system_audit>etc/shared/cis_debian_linux_rcl.txt</system_audit>
        <skip_nfs>yes</skip_nfs>
      </rootcheck>

      <!--========================================================
           9. SCA — Security Configuration Assessment
           CIS benchmarks, PCI-DSS, HIPAA, NIST 800-53 checks.
      =========================================================-->
      <sca>
        <enabled>yes</enabled>
        <scan_on_start>yes</scan_on_start>
        <interval>12h</interval>
        <skip_nfs>yes</skip_nfs>
        <policies>
          <policy>cis_debian10.yml</policy>
          <policy>cis_ubuntu22-04.yml</policy>
          <policy>cis_rhel9_linux.yml</policy>
          <policy>cis_amazon_linux_2.yml</policy>
          <policy>cis_docker.yml</policy>
          <policy>cis_kubernetes.yml</policy>
        </policies>
      </sca>

      <!--========================================================
           10. SYSCOLLECTOR — Inventory for CVE matching
      =========================================================-->
      <wodle name="syscollector">
        <disabled>no</disabled>
        <interval>1h</interval>
        <scan_on_start>yes</scan_on_start>
        <hardware>yes</hardware>
        <os>yes</os>
        <network>yes</network>
        <packages>yes</packages>
        <ports all="yes">yes</ports>
        <processes>yes</processes>
        <hotfixes>yes</hotfixes>
      </wodle>

      <!--========================================================
           11. VULNERABILITY DETECTION
           Matches installed packages against NVD + distro feeds.
      =========================================================-->
      <vulnerability-detection>
        <enabled>yes</enabled>
        <index-status>yes</index-status>
        <feed-update-interval>60m</feed-update-interval>
      </vulnerability-detection>

      <indexer>
        <enabled>yes</enabled>
        <hosts>
          <host>https://wazuh-indexer-0.wazuh-indexer-headless.wazuh.svc.cluster.local:9200</host>
          <host>https://wazuh-indexer-1.wazuh-indexer-headless.wazuh.svc.cluster.local:9200</host>
          <host>https://wazuh-indexer-2.wazuh-indexer-headless.wazuh.svc.cluster.local:9200</host>
        </hosts>
        <ssl>
          <certificate_authorities>
            <ca>/etc/ssl/root-ca.pem</ca>
          </certificate_authorities>
          <certificate>/etc/ssl/filebeat.pem</certificate>
          <key>/etc/ssl/filebeat.key</key>
        </ssl>
      </indexer>

      <!--========================================================
           12. AWS S3 — CloudTrail / GuardDuty / VPC Flow / Config
           Auth via IAM Pod Identity (no static credentials).
           Interval 5m = S3 CloudTrail delivery SLA.
      =========================================================-->
      <wodle name="aws-s3">
        <disabled>no</disabled>
        <interval>5m</interval>
        <run_on_start>yes</run_on_start>
        <skip_on_error>yes</skip_on_error>
        <remove_from_bucket>no</remove_from_bucket>

        <bucket type="cloudtrail">
          <name>bc-cloudtrail-logs</name>
          <aws_account_id>PLACEHOLDER_AWS_ACCOUNT_ID</aws_account_id>
          <aws_account_alias>bc-prod</aws_account_alias>
          <trail_prefix>AWSLogs/</trail_prefix>
          <only_logs_after>2026-JAN-01</only_logs_after>
          <regions>eu-central-1</regions>
        </bucket>

        <bucket type="guardduty">
          <name>bc-guardduty-findings</name>
          <path>guardduty/</path>
          <only_logs_after>2026-JAN-01</only_logs_after>
        </bucket>

        <bucket type="vpcflow">
          <name>bc-vpcflow-logs</name>
          <path>AWSLogs/</path>
          <only_logs_after>2026-JAN-01</only_logs_after>
          <regions>eu-central-1</regions>
        </bucket>

        <bucket type="config">
          <name>bc-config-logs</name>
          <only_logs_after>2026-JAN-01</only_logs_after>
        </bucket>

        <service type="inspector">
          <regions>eu-central-1</regions>
        </service>
      </wodle>

      <!--========================================================
           13. DOCKER LISTENER
           Captures container create/start/die/kill events.
      =========================================================-->
      <wodle name="docker-listener">
        <interval>10m</interval>
        <attempts>5</attempts>
        <run_on_start>yes</run_on_start>
        <disabled>no</disabled>
      </wodle>

      <!--========================================================
           14. COMMAND MONITORING
           Custom probes for Kubernetes state and processes.
      =========================================================-->
      <wodle name="command">
        <disabled>no</disabled>
        <tag>running-containers</tag>
        <command>crictl ps --output json 2>/dev/null || echo "{}"</command>
        <interval>5m</interval>
        <ignore_output>no</ignore_output>
        <run_on_start>yes</run_on_start>
        <timeout>30</timeout>
      </wodle>

      <wodle name="command">
        <disabled>no</disabled>
        <tag>listening-ports</tag>
        <command>ss -tlnp 2>/dev/null</command>
        <interval>5m</interval>
        <ignore_output>no</ignore_output>
        <run_on_start>yes</run_on_start>
        <timeout>10</timeout>
      </wodle>

      <!--========================================================
           15. LOG COLLECTION — System & Kubernetes audit
      =========================================================-->
      <localfile>
        <log_format>syslog</log_format>
        <location>/var/ossec/logs/active-responses.log</location>
      </localfile>

      <localfile>
        <log_format>syslog</log_format>
        <location>/var/log/syslog</location>
      </localfile>

      <localfile>
        <log_format>syslog</log_format>
        <location>/var/log/auth.log</location>
      </localfile>

      <localfile>
        <log_format>syslog</log_format>
        <location>/var/log/kern.log</location>
      </localfile>

      <localfile>
        <log_format>audit</log_format>
        <location>/var/log/audit/audit.log</location>
      </localfile>

      <localfile>
        <log_format>journald</log_format>
        <location>journald</location>
      </localfile>

      <!-- Kubernetes API server audit log (mounted from host) -->
      <localfile>
        <log_format>json</log_format>
        <location>/var/log/kubernetes/audit/audit.log</location>
        <label key="event.module">kubernetes</label>
        <label key="event.dataset">kubernetes.audit</label>
      </localfile>

      <!-- Suricata EVE JSON + Zeek logs are forwarded to this Manager by the
           Wazuh Agent running on bc-xdr-test EC2 (see bc-xdr/eu-central-1/eks.tf).
           No localfile block needed here: the Manager receives them over the
           agent protocol (port 1514) and decodes them with ruleset/decoders. -->

      <!--========================================================
           16. INTEGRATION: Shuffle SOAR
           Level 7+ alerts fire a webhook to Shuffle for playbook
           execution. Shuffle runs on the same bc-ctrl security
           nodegroup alongside Wazuh Manager.
      =========================================================-->
      <integration>
        <name>shuffle</name>
        <hook_url>http://shuffle-frontend.shuffle.svc.cluster.local:3001/api/v1/hooks/PLACEHOLDER_SHUFFLE_HOOK_ID</hook_url>
        <level>7</level>
        <alert_format>json</alert_format>
      </integration>

      <!--========================================================
           17. INTEGRATION: MISP (Threat Intel)
           Reachable via TGW shared-rt → bc-xdr.
           Posts matched IOCs back to MISP for correlation.
      =========================================================-->
      <integration>
        <name>custom-misp</name>
        <hook_url>https://misp.bc-xdr.internal/events/restSearch</hook_url>
        <api_key>PLACEHOLDER_MISP_API_KEY</api_key>
        <alert_format>json</alert_format>
        <level>5</level>
      </integration>

      <!--========================================================
           18. INTEGRATION: Slack (critical alerts only)
      =========================================================-->
      <integration>
        <name>slack</name>
        <hook_url>PLACEHOLDER_SLACK_WEBHOOK_URL</hook_url>
        <alert_format>json</alert_format>
        <level>12</level>
      </integration>

      <!--========================================================
           19. ACTIVE RESPONSE — automated containment
      =========================================================-->
      <active-response>
        <disabled>no</disabled>
        <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
        <ca_verification>yes</ca_verification>
      </active-response>

      <!-- Command: firewall-drop (via iptables on agent) -->
      <command>
        <name>firewall-drop</name>
        <executable>firewall-drop</executable>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <active-response>
        <command>firewall-drop</command>
        <location>local</location>
        <rules_id>5712,5763,40101,40111,31153,31151</rules_id>
        <timeout>3600</timeout>
      </active-response>

      <!-- Command: disable-account (lock Linux user) -->
      <command>
        <name>disable-account</name>
        <executable>disable-account</executable>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <active-response>
        <command>disable-account</command>
        <location>local</location>
        <rules_id>5763,5764</rules_id>
        <timeout>3600</timeout>
      </active-response>

      <!-- XDR: custom enforcement API isolation
           For level 12+ alerts, calls the Enforcement API (FastAPI)
           running in bc-ctrl/platform nodegroup. The API modifies
           AWS Security Groups / NACLs / WAF rules to quarantine
           the source host network-wide via boto3. -->
      <command>
        <name>enforcement-api-isolate</name>
        <executable>enforcement-api-isolate.sh</executable>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <active-response>
        <command>enforcement-api-isolate</command>
        <location>server</location>
        <level>12</level>
        <timeout>0</timeout>
      </active-response>

      <!-- XDR: MISP IOC hit → enforcement API block -->
      <command>
        <name>enforcement-api-block-ioc</name>
        <executable>enforcement-api-block-ioc.sh</executable>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <active-response>
        <command>enforcement-api-block-ioc</command>
        <location>server</location>
        <rules_id>100200,100201,100202</rules_id>
        <timeout>86400</timeout>
      </active-response>

    </ossec_config>
