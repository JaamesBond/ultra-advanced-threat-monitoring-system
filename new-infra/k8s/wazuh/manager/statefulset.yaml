#--------------------------------------------------------------
# Wazuh Manager — 3-node HA StatefulSet
#
# Deployed to: bc-ctrl EKS cluster, namespace "wazuh"
# Nodegroup:   security  (m6a.xlarge, taint: dedicated=security)
# Depends on:
#   - namespace.yaml       (namespace, SA, StorageClass)
#   - configmap-ossec.yaml (mounted at /wazuh-config-mount/etc/ossec.conf)
#   - wazuh-manager-secrets Secret (injected at runtime via external-secrets)
#
# Cluster layout:
#   wazuh-manager-0  → master
#   wazuh-manager-1  → worker
#   wazuh-manager-2  → worker
#
# Each pod gets its own 10Gi gp3 EBS volume for /var/ossec state.
# Pods are spread across 3 AZs via topology constraints.
#--------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager
  namespace: wazuh
  labels:
    app: wazuh-manager
    app.kubernetes.io/component: siem-manager
    app.kubernetes.io/part-of: xdr-platform
spec:
  serviceName: wazuh-manager-headless
  replicas: 3
  podManagementPolicy: OrderedReady   # master (-0) must start before workers
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app: wazuh-manager
  template:
    metadata:
      labels:
        app: wazuh-manager
        app.kubernetes.io/component: siem-manager
      annotations:
        # Rolling restart on config change is handled automatically by
        # configMapGenerator (content-hash suffix in the ConfigMap name).
    spec:
      serviceAccountName: wazuh-manager
      terminationGracePeriodSeconds: 120

      #--------------------------------------------------------------
      # Scheduling: security nodegroup only, 1 per AZ, 1 per node
      #--------------------------------------------------------------
      nodeSelector:
        role: security
      tolerations:
        - key: dedicated
          operator: Equal
          value: security
          effect: NoSchedule

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [wazuh-manager]
              topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: wazuh-manager

      #--------------------------------------------------------------
      # Security context — Wazuh runs as UID 101 (wazuh user)
      #--------------------------------------------------------------
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch

      #--------------------------------------------------------------
      # Init containers
      #
      # 1. set-node-identity  — rewrites NODE_NAME / NODE_TYPE in ossec.conf
      #                          based on pod ordinal (-0=master, rest=worker)
      # 2. inject-secrets     — substitutes PLACEHOLDER_* tokens via envsubst
      # 3. wait-for-indexer   — blocks until Wazuh Indexer is reachable
      #--------------------------------------------------------------
      initContainers:
        - name: set-node-identity
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/library/busybox:1.37.0
          command:
            - sh
            - -c
            - |
              set -e
              POD_ORDINAL=$(echo "$POD_NAME" | awk -F'-' '{print $NF}')
              if [ "$POD_ORDINAL" = "0" ]; then
                NODE_TYPE="master"
              else
                NODE_TYPE="worker"
              fi
              echo "Pod $POD_NAME → node_name=$POD_NAME node_type=$NODE_TYPE"
              cp /configmap-src/ossec.conf /workdir/ossec.conf.stage1
              sed -i "s|NODE_NAME_PLACEHOLDER|${POD_NAME}|g" /workdir/ossec.conf.stage1
              sed -i "s|NODE_TYPE_PLACEHOLDER|${NODE_TYPE}|g" /workdir/ossec.conf.stage1
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: configmap-src
              mountPath: /configmap-src
            - name: config-rendered
              mountPath: /workdir

        - name: inject-secrets
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/library/alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache gettext >/dev/null
              envsubst < /workdir/ossec.conf.stage1 > /workdir/ossec.conf
              rm /workdir/ossec.conf.stage1
              echo "Secret substitution complete"
          envFrom:
            - secretRef:
                name: wazuh-manager-secrets
          volumeMounts:
            - name: config-rendered
              mountPath: /workdir

        - name: wait-for-indexer
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/library/busybox:1.37.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for wazuh-indexer:9200..."
              i=0
              until nc -z wazuh-indexer.wazuh.svc.cluster.local 9200 2>/dev/null; do
                i=$((i+1))
                if [ $i -gt 60 ]; then
                  echo "Indexer not ready after 5m, giving up"
                  exit 1
                fi
                sleep 5
              done
              echo "Indexer reachable"

        #--------------------------------------------------------------
        # initContainer 4: copy-ar-scripts
        # Copies active-response scripts from the ConfigMap into the
        # persistent /var/ossec volume and sets correct permissions.
        # Must run as root (UID 0) then the main container drops to
        # UID 101 (wazuh). Scripts are owned 0:0 mode 0750 so that
        # ossec-execd (runs as root) can execute them.
        #--------------------------------------------------------------
        - name: copy-ar-scripts
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/library/busybox:1.37.0
          command:
            - sh
            - -c
            - |
              set -e
              AR_BIN=/var/ossec/active-response/bin
              mkdir -p "$AR_BIN"
              for script in enforcement-api-isolate.sh enforcement-api-block-ioc.sh; do
                cp /ar-scripts-src/${script} ${AR_BIN}/${script}
                chmod 0750 ${AR_BIN}/${script}
                echo "Installed: ${AR_BIN}/${script}"
              done
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: wazuh-storage
              mountPath: /var/ossec
            - name: ar-scripts-src
              mountPath: /ar-scripts-src
              readOnly: true

      #--------------------------------------------------------------
      # Main container — Wazuh Manager
      #--------------------------------------------------------------
      containers:
        - name: wazuh-manager
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/wazuh/wazuh-manager:4.9.2
          imagePullPolicy: IfNotPresent

          ports:
            - name: agents-tcp
              containerPort: 1514
              protocol: TCP
            - name: enrollment
              containerPort: 1515
              protocol: TCP
            - name: cluster
              containerPort: 1516
              protocol: TCP
            - name: api
              containerPort: 55000
              protocol: TCP
            - name: syslog-udp
              containerPort: 514
              protocol: UDP

          env:
            - name: INDEXER_URL
              value: https://wazuh-indexer.wazuh.svc.cluster.local:9200
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-manager-secrets
                  key: INDEXER_USERNAME
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-manager-secrets
                  key: INDEXER_PASSWORD
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: full
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: /etc/ssl/root-ca.pem
            - name: SSL_CERTIFICATE
              value: /etc/ssl/filebeat.pem
            - name: SSL_KEY
              value: /etc/ssl/filebeat.key
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-manager-secrets
                  key: API_USERNAME
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-manager-secrets
                  key: API_PASSWORD
            - name: WAZUH_CLUSTER_KEY
              valueFrom:
                secretKeyRef:
                  name: wazuh-manager-secrets
                  key: PLACEHOLDER_CLUSTER_KEY

          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "3"
              memory: 12Gi

          volumeMounts:
            - name: config-rendered
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: ossec.conf
              readOnly: true
            - name: wazuh-storage
              mountPath: /var/ossec
            - name: filebeat-certs
              mountPath: /etc/ssl
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: kubernetes-audit
              mountPath: /var/log/kubernetes/audit
              readOnly: true

          startupProbe:
            tcpSocket:
              port: 1514
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30  # 30 * 10s = 5 min cold-start budget

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - /var/ossec/bin/wazuh-control status | grep -q running
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 1514
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - /var/ossec/bin/wazuh-control stop

        #--------------------------------------------------------------
        # Sidecar — MISP IOC list refresher (master pod only)
        #
        # Every 15 min: queries MISP REST API for all published
        # network-type attributes (ip-dst, domain, url, md5, sha1,
        # sha256) and writes them as Wazuh CDB lists under
        # /var/ossec/etc/lists/. After writing, triggers a Manager
        # API reload so the new lists are active immediately.
        #
        # Runs only on wazuh-manager-0 (MASTER_ONLY guard) to avoid
        # N concurrent API calls and concurrent list file writes.
        # Workers pick up the updated lists via cluster sync.
        #--------------------------------------------------------------
        - name: misp-ioc-sync
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/library/alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl jq >/dev/null

              # Only run the sync loop on the master pod (-0).
              # Worker pods just sleep so the container stays running
              # (K8s requires all containers to be healthy).
              POD_ORDINAL=$(echo "$POD_NAME" | awk -F'-' '{print $NF}')
              if [ "$POD_ORDINAL" != "0" ]; then
                echo "Worker pod $POD_NAME — MISP sync disabled, sleeping"
                exec sleep infinity
              fi

              echo "Master pod $POD_NAME — MISP IOC sync starting (interval: 15m)"
              LISTS_DIR=/var/ossec/etc/lists
              mkdir -p "$LISTS_DIR"

              sync_once() {
                echo "[$(date -Iseconds)] Syncing MISP IOCs..."

                # Wazuh CDB format: value:
                # MISP REST /attributes/restSearch returns JSON array of values.
                for type in ip-dst domain url; do
                  out_file="$LISTS_DIR/misp-ioc-$(echo $type | tr '-' '')"
                  curl -sfk \
                    -H "Authorization: ${PLACEHOLDER_MISP_API_KEY}" \
                    -H "Accept: application/json" \
                    -H "Content-Type: application/json" \
                    -d "{\"returnFormat\":\"values\",\"type\":\"${type}\",\"to_ids\":1,\"published\":1}" \
                    "${MISP_URL}/attributes/restSearch" \
                  | jq -r '.response.Attribute[]?.value // empty' \
                  | sort -u \
                  | awk '{print $1":"}' \
                  > "${out_file}.tmp" && mv "${out_file}.tmp" "$out_file" || {
                    echo "MISP query failed for type=${type}, skipping"
                  }
                done

                for hash_type in md5 sha1 sha256; do
                  out_file="$LISTS_DIR/misp-ioc-hash-${hash_type}"
                  curl -sfk \
                    -H "Authorization: ${PLACEHOLDER_MISP_API_KEY}" \
                    -H "Accept: application/json" \
                    -H "Content-Type: application/json" \
                    -d "{\"returnFormat\":\"values\",\"type\":\"${hash_type}\",\"to_ids\":1,\"published\":1}" \
                    "${MISP_URL}/attributes/restSearch" \
                  | jq -r '.response.Attribute[]?.value // empty' \
                  | sort -u \
                  | awk '{print $1":"}' \
                  > "${out_file}.tmp" && mv "${out_file}.tmp" "$out_file" || {
                    echo "MISP query failed for type=${hash_type}, skipping"
                  }
                done

                # Reload Manager via API so new lists are active immediately.
                # Uses the wazuh-wui API credentials (read-write role).
                TOKEN=$(curl -sf -u "${API_USERNAME}:${API_PASSWORD}" \
                  -X GET "https://localhost:55000/security/user/authenticate?raw=true" \
                  -k 2>/dev/null || echo "")
                if [ -n "$TOKEN" ]; then
                  curl -sf -k -H "Authorization: Bearer ${TOKEN}" \
                    -X PUT "https://localhost:55000/manager/configuration?wait_for_complete=false" \
                    >/dev/null && echo "Manager reload triggered" || \
                    echo "Manager reload request failed (non-fatal)"
                else
                  echo "Could not obtain API token for reload (non-fatal)"
                fi

                echo "[$(date -Iseconds)] MISP IOC sync complete"
              }

              # Run once at startup so lists are populated before first alert
              sync_once || echo "Initial sync failed, will retry at next interval"

              while true; do
                sleep 900   # 15 minutes
                sync_once || echo "Sync cycle failed, will retry"
              done

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MISP_URL
              value: "https://misp.bc-ctrl.internal"
            - name: PLACEHOLDER_MISP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wazuh-manager-secrets
                  key: PLACEHOLDER_MISP_API_KEY
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-manager-secrets
                  key: API_USERNAME
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-manager-secrets
                  key: API_PASSWORD

          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

          volumeMounts:
            - name: wazuh-storage
              mountPath: /var/ossec

      #--------------------------------------------------------------
      # Volumes
      #--------------------------------------------------------------
      volumes:
        - name: configmap-src
          configMap:
            name: wazuh-manager-config
            items:
              - key: ossec.conf
                path: ossec.conf
        - name: config-rendered
          emptyDir: {}
        # Projected volume remaps cert-manager key names to the paths
        # Filebeat expects under /etc/ssl/ (set via env vars
        # SSL_CERTIFICATE_AUTHORITIES, SSL_CERTIFICATE, SSL_KEY).
        - name: filebeat-certs
          projected:
            defaultMode: 0400
            sources:
              - secret:
                  name: wazuh-filebeat-cert
                  items:
                    - key: tls.crt
                      path: filebeat.pem
                    - key: tls.key
                      path: filebeat.key
                    - key: ca.crt
                      path: root-ca.pem
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: kubernetes-audit
          hostPath:
            path: /var/log/kubernetes/audit
            type: DirectoryOrCreate
        # Active-response scripts — installed by copy-ar-scripts initContainer
        - name: ar-scripts-src
          configMap:
            name: wazuh-active-response-scripts
            defaultMode: 0550

  #--------------------------------------------------------------
  # Persistent volume claims (one per replica)
  #--------------------------------------------------------------
  volumeClaimTemplates:
    - metadata:
        name: wazuh-storage
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: wazuh-gp3
        resources:
          requests:
            storage: 10Gi
