#--------------------------------------------------------------
# Wazuh Dashboard — Deployment
#
# DEPLOYED TO: bc-ctrl EKS cluster, namespace "wazuh"
# Nodegroup:   platform  (m6a.large, NO taint)
#
# Depends on:
#   - namespace.yaml              (namespace, SA, StorageClass)
#   - configmap.yaml              (opensearch_dashboards.yml static config)
#   - external-secrets.yaml       (wazuh-dashboard-secrets)
#   - wazuh-indexer-certs Secret  (created by cert-manager — see item 1)
#   - Wazuh Indexer StatefulSet   (must be running and green before this)
#   - Wazuh Manager API Service   (wazuh-manager-api ClusterIP :55000)
#--------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
  namespace: wazuh
  labels:
    app: wazuh-dashboard
    app.kubernetes.io/component: siem-dashboard
    app.kubernetes.io/part-of: xdr-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # always keep one pod serving during updates
      maxSurge: 1
  template:
    metadata:
      labels:
        app: wazuh-dashboard
        app.kubernetes.io/component: siem-dashboard
      annotations:
        # Rolling restart on config change handled by configMapGenerator.
    spec:
      serviceAccountName: wazuh-dashboard
      terminationGracePeriodSeconds: 30

      #--------------------------------------------------------------
      # Scheduling: platform nodegroup
      #--------------------------------------------------------------
      nodeSelector:
        role: platform
      # No taint on the platform nodegroup in bc-ctrl — no toleration needed.

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [wazuh-dashboard]
                topologyKey: kubernetes.io/hostname

      #--------------------------------------------------------------
      # Security context
      #--------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: wazuh-dashboard
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/wazuh/wazuh-dashboard:4.9.2
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 5601
              protocol: TCP

          #--------------------------------------------------------------
          # Credentials injected from wazuh-dashboard-secrets Secret.
          # The Wazuh Dashboard image entrypoint reads these env vars
          # and merges them with the mounted opensearch_dashboards.yml.
          #--------------------------------------------------------------
          env:
            - name: INDEXER_URL
              value: "https://wazuh-indexer.wazuh.svc.cluster.local:9200"
            - name: WAZUH_API_URL
              value: "https://wazuh-manager-api.wazuh.svc.cluster.local"
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-dashboard-secrets
                  key: INDEXER_USERNAME
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-dashboard-secrets
                  key: INDEXER_PASSWORD
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-dashboard-secrets
                  key: DASHBOARD_USERNAME
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-dashboard-secrets
                  key: DASHBOARD_PASSWORD
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-dashboard-secrets
                  key: API_USERNAME
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-dashboard-secrets
                  key: API_PASSWORD

          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi

          volumeMounts:
            # Static opensearch_dashboards.yml options
            - name: dashboard-config
              mountPath: /usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml
              readOnly: true
            # Root CA for verifying the Wazuh Indexer TLS cert.
            # This Secret is created by cert-manager (see deployment item 1).
            - name: indexer-certs
              mountPath: /usr/share/wazuh-dashboard/certs/root-ca.pem
              subPath: root-ca.pem
              readOnly: true

          startupProbe:
            httpGet:
              path: /app/wazuh
              port: 5601
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30   # 5-min budget for initial Kibana startup

          livenessProbe:
            httpGet:
              path: /app/wazuh
              port: 5601
              scheme: HTTP
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /app/wazuh
              port: 5601
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: dashboard-config
          configMap:
            name: wazuh-dashboard-config
        # Only the root CA is needed by the Dashboard — it verifies
        # the Indexer's server cert but does not present a client cert.
        - name: indexer-certs
          secret:
            secretName: wazuh-indexer-node-cert
            defaultMode: 0400
            items:
              - key: ca.crt
                path: root-ca.pem
