#--------------------------------------------------------------
# Wazuh Dashboard — Service + Ingress
#
# Access pattern:
#   Analyst browser → internal ALB (HTTPS 443, ACM cert)
#                   → wazuh-dashboard ClusterIP (HTTP 5601)
#                   → Dashboard pod
#
# The ALB is INTERNAL (private subnets only). Analysts reach it
# via the bc-ctrl VPN / bastion or from within the bc-ctrl VPC.
# There is no public endpoint.
#
# ACM certificate:
#   The ALB needs a certificate for the hostname analysts use,
#   e.g. wazuh.bc-ctrl.internal. Provision it in ACM then replace
#   PLACEHOLDER_ACM_CERT_ARN below. For a private CA use
#   AWS Private CA + ACM; for a self-managed CA use cert-manager
#   and the AWS Load Balancer Controller's certificate discovery.
#--------------------------------------------------------------

#--------------------------------------------------------------
# ClusterIP — internal service target for the ALB
#--------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: wazuh-dashboard
  namespace: wazuh
  labels:
    app: wazuh-dashboard
    app.kubernetes.io/component: siem-dashboard
    app.kubernetes.io/part-of: xdr-platform
spec:
  type: ClusterIP
  selector:
    app: wazuh-dashboard
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      protocol: TCP
---
#--------------------------------------------------------------
# Ingress — internal ALB, HTTPS 443
#
# Managed by the AWS Load Balancer Controller (installed via
# eks-addons module). The Controller creates and manages the ALB
# from this Ingress resource.
#--------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wazuh-dashboard
  namespace: wazuh
  labels:
    app: wazuh-dashboard
    app.kubernetes.io/component: siem-dashboard
    app.kubernetes.io/part-of: xdr-platform
  annotations:
    # --- ALB configuration ---
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ip-address-type: ipv4

    # --- HTTPS ---
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "${WAZUH_DASHBOARD_CERT_ARN}"
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"

    # --- Health check ---
    alb.ingress.kubernetes.io/healthcheck-path: "/app/wazuh"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200,302"

    # --- Source restriction (allow only bc-ctrl + bc-prd CIDRs) ---
    alb.ingress.kubernetes.io/inbound-cidrs: "10.0.0.0/16,10.30.0.0/16"

    # --- Tagging ---
    alb.ingress.kubernetes.io/tags: >-
      Customer=Big Chemistry,
      Environment=ctrl,
      Component=wazuh-dashboard,
      Confidential=yes

    # --- external-dns: write wazuh.bc-ctrl.internal → ALB DNS ---
    external-dns.alpha.kubernetes.io/hostname: "wazuh.bc-ctrl.internal"
spec:
  rules:
    - host: wazuh.bc-ctrl.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wazuh-dashboard
                port:
                  number: 5601
