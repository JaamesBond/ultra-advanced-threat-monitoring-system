#--------------------------------------------------------------
# Wazuh Dashboard — ExternalSecret
#
# DEPLOYED TO: bc-ctrl EKS cluster
#
# Syncs bc/wazuh/dashboard from Secrets Manager into the
# wazuh-dashboard-secrets K8s Secret consumed by deployment.yaml.
#
# Uses the ClusterSecretStore created in manager/external-secrets.yaml.
# Apply manager/external-secrets.yaml first (ClusterSecretStore must
# exist before this ExternalSecret is created).
#
# Required Secrets Manager secret (seed once):
#   aws secretsmanager create-secret \
#     --name bc/wazuh/dashboard \
#     --secret-string '{
#       "INDEXER_USERNAME":   "admin",
#       "INDEXER_PASSWORD":   "<same as bc/wazuh/manager INDEXER_PASSWORD>",
#       "DASHBOARD_USERNAME": "kibanaserver",
#       "DASHBOARD_PASSWORD": "<strong password — different from admin>",
#       "API_USERNAME":       "wazuh-wui",
#       "API_PASSWORD":       "<same as bc/wazuh/manager API_PASSWORD>"
#     }'
#
# Note: INDEXER_PASSWORD and API_PASSWORD must match the values
# in bc/wazuh/manager exactly — they authenticate to the same
# Indexer and Manager API.
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wazuh-dashboard-secrets
  namespace: wazuh
  labels:
    app: wazuh-dashboard
    app.kubernetes.io/part-of: xdr-platform
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: wazuh-dashboard-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: wazuh-dashboard
          app.kubernetes.io/part-of: xdr-platform

  dataFrom:
    - extract:
        key: bc/wazuh/dashboard
