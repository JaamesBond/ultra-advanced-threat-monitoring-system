#--------------------------------------------------------------
# Wazuh — Kustomize root (bc-ctrl)
#
# Flux reconciles this path: new-infra/k8s/wazuh/
# All resources are listed in dependency order:
#   1. namespace + StorageClass + ServiceAccounts
#   2. TLS certificates (cert-manager Issues via certs.yaml)
#   3. Indexer (OpenSearch) — must be Ready before Manager starts
#   4. Manager (waits for Indexer in initContainer)
#   5. Dashboard
#
# Flux postBuild substitutes ${AWS_ACCOUNT_ID} before apply.
#
# configMapGenerator hashes the content of manager/ossec.conf and
# appends it to the ConfigMap name (e.g. wazuh-manager-config-7f9d4b).
# Kustomize rewrites all volume references automatically, so any
# change to ossec.conf triggers a rolling restart without any
# manual checksum annotation.
#--------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Foundation
  - namespace.yaml
  - certs.yaml
  # Indexer (OpenSearch)
  - indexer/external-secrets.yaml
  - indexer/configmap.yaml
  - indexer/service.yaml
  - indexer/statefulset.yaml
  - indexer/ism-bootstrap-job.yaml
  # Manager (waits for indexer via initContainer)
  - manager/external-secrets.yaml
  - manager/configmap-active-response.yaml
  - manager/service.yaml
  - manager/statefulset.yaml
  # Dashboard
  - dashboard/external-secrets.yaml
  - dashboard/service.yaml
  - dashboard/deployment.yaml

# configMapGenerator appends a content hash to each ConfigMap name.
# Kustomize rewrites all volume/env references in the same kustomization,
# so any config file change triggers a rolling restart automatically.
configMapGenerator:
  - name: wazuh-manager-config
    files:
      - ossec.conf=manager/ossec.conf
  - name: wazuh-dashboard-config
    files:
      - opensearch_dashboards.yml=dashboard/opensearch_dashboards.yml

generatorOptions:
  disableNameSuffixHash: false
  annotations:
    app.kubernetes.io/managed-by: kustomize
