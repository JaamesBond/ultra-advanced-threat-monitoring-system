#--------------------------------------------------------------
# Wazuh Agent — ExternalSecret manifests
#
# DEPLOYED TO: bc-prd EKS cluster
#
# Before applying, the wazuh namespace must exist in bc-prd.
# Apply a stripped-down copy of k8s/wazuh/namespace.yaml (just
# the Namespace + wazuh-agent ServiceAccount).
#
# Required Secrets Manager secret (seed once, same account):
#   aws secretsmanager create-secret \
#     --name bc/wazuh/agent \
#     --secret-string '{
#       "WAZUH_AUTH_PASSWORD": "<enrollment password — must match
#                               Manager ossec.conf <auth><use_password>yes>"
#     }'
#
# Apply order:
#   1. external-secrets Helm chart in bc-prd (via Terraform)
#   2. This file
#   3. agent/daemonset.yaml
#--------------------------------------------------------------

#--------------------------------------------------------------
# 1. ClusterSecretStore — AWS Secrets Manager (eu-central-1)
#
# Same store name as bc-ctrl so that any copy-pasted manifests
# work without changes. ClusterSecretStore is cluster-scoped so
# there is no naming conflict between clusters.
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: xdr-platform
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
#--------------------------------------------------------------
# 2. ExternalSecret — wazuh-agent-secrets
#
# Pulls WAZUH_AUTH_PASSWORD from bc/wazuh/agent in Secrets
# Manager and puts it in the "wazuh-agent-secrets" K8s Secret
# in the wazuh namespace.
#
# The agent DaemonSet init container reads:
#   secretKeyRef:
#     name: wazuh-agent-secrets
#     key: WAZUH_AUTH_PASSWORD
# and writes it to /var/ossec/etc/authd.pass on each node.
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wazuh-agent-secrets
  namespace: wazuh
  labels:
    app: wazuh-agent
    app.kubernetes.io/part-of: xdr-platform
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: wazuh-agent-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: wazuh-agent
          app.kubernetes.io/part-of: xdr-platform

  data:
    - secretKey: WAZUH_AUTH_PASSWORD
      remoteRef:
        key: bc/wazuh/agent
        property: WAZUH_AUTH_PASSWORD
