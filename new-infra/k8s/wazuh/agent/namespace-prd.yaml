#--------------------------------------------------------------
# Wazuh — Namespace + ServiceAccount for bc-prd
#
# The bc-prd cluster hosts only the Wazuh Agent DaemonSet.
# This is a minimal namespace definition — no StorageClass,
# no Manager/Indexer/Dashboard objects.
#
# The ServiceAccount name must match:
#   - aws_eks_pod_identity_association.wazuh_agent in bc-prd/eks-addons.tf
#   - spec.serviceAccountName in the DaemonSet
#--------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: wazuh
  labels:
    name: wazuh
    app.kubernetes.io/part-of: xdr-platform
    customer: big-chemistry
    environment: prd
    vpc-role: production-spoke
  annotations:
    description: "Wazuh Agent DaemonSet — bc-prd (agents only, Manager is in bc-ctrl)"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wazuh-agent
  namespace: wazuh
  labels:
    app: wazuh-agent
    app.kubernetes.io/component: siem-agent
