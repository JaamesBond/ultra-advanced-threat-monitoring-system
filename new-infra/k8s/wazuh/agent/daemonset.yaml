#--------------------------------------------------------------
# Wazuh Agent — DaemonSet (one pod per node)
#
# ⚠️  DEPLOYED TO: bc-prd EKS cluster (NOT bc-ctrl).
#     Switch kubectl context before applying.
#
# Depends on:
#   - namespace "wazuh" in the bc-prd cluster (create manually
#     or apply a minimal copy of k8s/wazuh/namespace.yaml first)
#   - configmap-agent.yaml (same directory)
#   - Secret "wazuh-agent-secrets" with:
#       WAZUH_AUTH_PASSWORD  (matches Manager's authd.pass)
#   - ECR pull-through cache rule "docker-hub" in the AWS account
#     pointing at registry-1.docker.io, or a manually mirrored
#     image in a private ECR repo.
#
# The agent runs with hostPID + hostNetwork + hostIPC and
# privileged=true because it must:
#   - Read /var/log, /etc, /boot, /usr/bin, /usr/sbin at host level
#   - See all host processes for rootcheck + syscollector
#   - Access auditd netlink sockets for <log_format>audit</log_format>
#   - Use the host network stack for ss / ip a / iptables
#
# These are the standard, minimum-viable privileges for a
# host-based IDS. Any tighter and detection coverage drops.
#--------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wazuh-agent
  namespace: wazuh
  labels:
    app: wazuh-agent
    app.kubernetes.io/component: siem-agent
    app.kubernetes.io/part-of: xdr-platform
spec:
  selector:
    matchLabels:
      app: wazuh-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: wazuh-agent
        app.kubernetes.io/component: siem-agent
      annotations:
        # Rolling restart on config change handled by configMapGenerator.
    spec:
      serviceAccountName: wazuh-agent
      terminationGracePeriodSeconds: 60

      #--------------------------------------------------------------
      # Host namespace sharing — required for host-level IDS
      #--------------------------------------------------------------
      hostNetwork: true
      hostPID: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet

      #--------------------------------------------------------------
      # Run on EVERY node, including taints
      #--------------------------------------------------------------
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: PreferNoSchedule

      #--------------------------------------------------------------
      # Init container: set node identity labels in ossec.conf
      # Uses Downward API to read pod spec.nodeName and status.hostIP,
      # and the AWS IMDS to read availability zone.
      #--------------------------------------------------------------
      initContainers:
        - name: set-node-identity
          # Pull-through cache path — swap to a direct docker.io
          # reference only for testing in a cluster with internet.
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/library/busybox:1.37.0
          command:
            - sh
            - -c
            - |
              set -e
              # Read AZ from AWS IMDSv2
              TOKEN=$(wget -q -O - --method=PUT --header='X-aws-ec2-metadata-token-ttl-seconds: 60' http://169.254.169.254/latest/api/token 2>/dev/null || echo "")
              if [ -n "$TOKEN" ]; then
                AZ=$(wget -q -O - --header="X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone 2>/dev/null || echo "unknown")
              else
                AZ="unknown"
              fi
              echo "node=$NODE_NAME ip=$NODE_IP az=$AZ"
              cp /configmap-src/ossec.conf /workdir/ossec.conf
              sed -i "s|NODE_NAME_PLACEHOLDER|${NODE_NAME}|g" /workdir/ossec.conf
              sed -i "s|NODE_IP_PLACEHOLDER|${NODE_IP}|g" /workdir/ossec.conf
              sed -i "s|AZ_PLACEHOLDER|${AZ}|g" /workdir/ossec.conf
              # Write the enrollment password to authd.pass
              echo "${WAZUH_AUTH_PASSWORD}" > /workdir/authd.pass
              chmod 0640 /workdir/authd.pass
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: WAZUH_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-agent-secrets
                  key: WAZUH_AUTH_PASSWORD
          volumeMounts:
            - name: configmap-src
              mountPath: /configmap-src
            - name: config-rendered
              mountPath: /workdir

      #--------------------------------------------------------------
      # Main container — Wazuh Agent
      #--------------------------------------------------------------
      containers:
        - name: wazuh-agent
          # Via ECR pull-through cache (first pull must come from a
          # host with internet egress — see /new-infra/guide.md).
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/wazuh/wazuh-agent:4.9.2
          imagePullPolicy: IfNotPresent

          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add:
                - SYS_PTRACE        # rootcheck process walk
                - NET_ADMIN         # iptables-save, ip a
                - NET_RAW           # raw packet read for some checks
                - AUDIT_CONTROL     # auditd netlink
                - AUDIT_READ
                - SYS_ADMIN         # mount namespace inspection
                - DAC_READ_SEARCH   # bypass DAC to read /etc/shadow-like paths

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            # Rendered ossec.conf (with node identity substituted)
            - name: config-rendered
              mountPath: /var/ossec/etc/ossec.conf
              subPath: ossec.conf
            - name: config-rendered
              mountPath: /var/ossec/etc/authd.pass
              subPath: authd.pass

            # Agent queue/state — hostPath so it survives pod restarts
            - name: wazuh-state
              mountPath: /var/ossec/queue
            - name: wazuh-logs
              mountPath: /var/ossec/logs

            # Host filesystem mounts (read-only where possible)
            - name: host-var-log
              mountPath: /hostfs/var/log
              readOnly: true
            - name: host-etc
              mountPath: /hostfs/etc
              readOnly: true
            - name: host-usr-bin
              mountPath: /hostfs/usr/bin
              readOnly: true
            - name: host-usr-sbin
              mountPath: /hostfs/usr/sbin
              readOnly: true
            - name: host-bin
              mountPath: /hostfs/bin
              readOnly: true
            - name: host-sbin
              mountPath: /hostfs/sbin
              readOnly: true
            - name: host-boot
              mountPath: /hostfs/boot
              readOnly: true
            - name: host-root
              mountPath: /hostfs/root
              readOnly: true
            - name: host-home
              mountPath: /hostfs/home
              readOnly: true
            - name: host-run
              mountPath: /hostfs/run
              readOnly: true
            - name: host-lib-systemd
              mountPath: /hostfs/lib/systemd
              readOnly: true
            - name: host-proc
              mountPath: /hostfs/proc
              readOnly: true
            - name: containerd-sock
              mountPath: /hostfs/run/containerd/containerd.sock

          startupProbe:
            exec:
              command:
                - sh
                - -c
                - /var/ossec/bin/wazuh-control status 2>/dev/null | grep -q "is running"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30   # 30 × 10s = 5 min for enrollment

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - /var/ossec/bin/wazuh-control status 2>/dev/null | grep -q "wazuh-agentd.*is running"
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - /var/ossec/bin/wazuh-control status 2>/dev/null | grep -q "wazuh-agentd.*is running"
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - /var/ossec/bin/wazuh-control stop

      #--------------------------------------------------------------
      # Volumes
      #--------------------------------------------------------------
      volumes:
        - name: configmap-src
          configMap:
            name: wazuh-agent-config
            items:
              - key: ossec.conf
                path: ossec.conf
        - name: config-rendered
          emptyDir: {}

        # Agent state survives pod restarts via hostPath on the node
        - name: wazuh-state
          hostPath:
            path: /var/lib/wazuh-agent/queue
            type: DirectoryOrCreate
        - name: wazuh-logs
          hostPath:
            path: /var/lib/wazuh-agent/logs
            type: DirectoryOrCreate

        # Host paths mounted read-only for inspection
        - name: host-var-log
          hostPath: { path: /var/log, type: Directory }
        - name: host-etc
          hostPath: { path: /etc, type: Directory }
        - name: host-usr-bin
          hostPath: { path: /usr/bin, type: Directory }
        - name: host-usr-sbin
          hostPath: { path: /usr/sbin, type: Directory }
        - name: host-bin
          hostPath: { path: /bin, type: Directory }
        - name: host-sbin
          hostPath: { path: /sbin, type: Directory }
        - name: host-boot
          hostPath: { path: /boot, type: DirectoryOrCreate }
        - name: host-root
          hostPath: { path: /root, type: DirectoryOrCreate }
        - name: host-home
          hostPath: { path: /home, type: DirectoryOrCreate }
        - name: host-run
          hostPath: { path: /run, type: Directory }
        - name: host-lib-systemd
          hostPath: { path: /lib/systemd, type: DirectoryOrCreate }
        - name: host-proc
          hostPath: { path: /proc, type: Directory }
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
