#--------------------------------------------------------------
# Wazuh Agent — Kustomize root (bc-prd)
#
# Flux reconciles this path: new-infra/k8s/wazuh/agent/
# Order: namespace first, then secrets, then configmap, then DaemonSet.
# Flux postBuild substitutes ${AWS_ACCOUNT_ID} in image references.
#
# configMapGenerator appends a content hash to the ConfigMap name.
# Any change to agent/ossec.conf produces a new name, which
# forces a DaemonSet rolling restart automatically.
#--------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace-prd.yaml
  - external-secrets.yaml
  - daemonset.yaml

configMapGenerator:
  - name: wazuh-agent-config
    files:
      - ossec.conf=ossec.conf

generatorOptions:
  disableNameSuffixHash: false
  annotations:
    app.kubernetes.io/managed-by: kustomize
