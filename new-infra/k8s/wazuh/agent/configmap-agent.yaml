#--------------------------------------------------------------
# Wazuh Agent — ossec.conf ConfigMap
#
# ⚠️  DEPLOYED TO: bc-prd EKS cluster, namespace "wazuh"
#     NOT bc-ctrl. Switch kubectl context before applying.
#
# Mounted at: /var/ossec/etc/ossec.conf
#
# Agent reports back to Wazuh Manager in bc-ctrl via:
#   wazuh-manager.bc-ctrl.internal:1514   (events, TLS)
#   wazuh-manager.bc-ctrl.internal:1515   (enrollment, TLS)
#
# The NLB DNS name above is the internal AWS NLB created by
# k8s/wazuh/manager/service.yaml in bc-ctrl. Routing works
# because bc-prd → TGW → bc-ctrl is already wired in Terraform
# (ctrl/vpc.tf private_to_prd + spoke-rt propagation).
#
# Tuning goals: MAXIMUM host-level telemetry.
# All system logs, audit, journald, container runtime, FIM,
# rootcheck, SCA, syscollector, custom commands.
#--------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-agent-config
  namespace: wazuh
  labels:
    app: wazuh-agent
    app.kubernetes.io/component: siem-agent
    app.kubernetes.io/part-of: xdr-platform
data:
  ossec.conf: |
    <ossec_config>

      <!--========================================================
           1. CLIENT — Connection back to Manager (bc-ctrl NLB)
      =========================================================-->
      <client>
        <server>
          <address>wazuh-manager.bc-ctrl.internal</address>
          <port>1514</port>
          <protocol>tcp</protocol>
        </server>
        <config-profile>ubuntu, ubuntu22, ubuntu22.04</config-profile>
        <notify_time>10</notify_time>
        <time-reconnect>60</time-reconnect>
        <auto_restart>yes</auto_restart>
        <crypto_method>aes</crypto_method>
        <enrollment>
          <enabled>yes</enabled>
          <manager_address>wazuh-manager.bc-ctrl.internal</manager_address>
          <port>1515</port>
          <agent_name>NODE_NAME_PLACEHOLDER</agent_name>
          <groups>bc-prd,eks-worker,AZ_PLACEHOLDER</groups>
          <authorization_pass_path>/var/ossec/etc/authd.pass</authorization_pass_path>
          <ssl_cipher>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ssl_cipher>
          <auto_method>no</auto_method>
          <delay_after_enrollment>20</delay_after_enrollment>
        </enrollment>
      </client>

      <!--========================================================
           2. LABELS — Injected via Downward API at startup
           Every alert from this agent is tagged with these.
      =========================================================-->
      <labels>
        <label key="node.name">NODE_NAME_PLACEHOLDER</label>
        <label key="node.ip">NODE_IP_PLACEHOLDER</label>
        <label key="node.az">AZ_PLACEHOLDER</label>
        <label key="cluster.name">bc-prd-eks</label>
        <label key="vpc">bc-prd</label>
        <label key="customer">big-chemistry</label>
        <label key="environment">production</label>
      </labels>

      <!--========================================================
           3. CLIENT BUFFER — prevent event loss during spikes
      =========================================================-->
      <client_buffer>
        <disabled>no</disabled>
        <queue_size>20000</queue_size>
        <events_per_second>2500</events_per_second>
      </client_buffer>

      <!--========================================================
           4. LOGGING
      =========================================================-->
      <logging>
        <log_format>plain,json</log_format>
      </logging>

      <!--========================================================
           5. SYSCHECK — Realtime FIM on host paths
           hostPath mounted in DaemonSet.
      =========================================================-->
      <syscheck>
        <disabled>no</disabled>
        <frequency>300</frequency>
        <scan_on_start>yes</scan_on_start>
        <alert_new_files>yes</alert_new_files>

        <!-- OS binaries - any change is suspicious -->
        <directories check_all="yes" realtime="yes" report_changes="yes">/hostfs/etc,/hostfs/usr/bin,/hostfs/usr/sbin</directories>
        <directories check_all="yes" realtime="yes" report_changes="yes">/hostfs/bin,/hostfs/sbin,/hostfs/boot</directories>

        <!-- K8s/CNI config -->
        <directories check_all="yes" realtime="yes" report_changes="yes">/hostfs/etc/kubernetes,/hostfs/etc/cni</directories>

        <!-- Container runtime config -->
        <directories check_all="yes" realtime="yes" report_changes="yes">/hostfs/etc/containerd,/hostfs/etc/crio</directories>

        <!-- Cron dirs - persistence mechanism -->
        <directories check_all="yes" realtime="yes" report_changes="yes">/hostfs/etc/cron.d,/hostfs/etc/cron.hourly,/hostfs/etc/cron.daily,/hostfs/etc/cron.weekly,/hostfs/etc/cron.monthly</directories>

        <!-- Systemd unit files - persistence mechanism -->
        <directories check_all="yes" realtime="yes" report_changes="yes">/hostfs/etc/systemd/system,/hostfs/lib/systemd/system</directories>

        <!-- SSH config + authorized_keys - lateral movement vector -->
        <directories check_all="yes" realtime="yes" report_changes="yes">/hostfs/etc/ssh,/hostfs/root/.ssh,/hostfs/home</directories>

        <ignore>/hostfs/etc/mtab</ignore>
        <ignore>/hostfs/etc/random-seed</ignore>
        <ignore>/hostfs/etc/adjtime</ignore>
        <ignore>/hostfs/etc/resolv.conf</ignore>  <!-- EKS rewrites this frequently -->
        <ignore type="sregex">.log$|.swp$|.tmp$</ignore>

        <nodiff>/hostfs/etc/ssl/private</nodiff>
        <nodiff>/hostfs/etc/pki/tls/private</nodiff>

        <skip_nfs>yes</skip_nfs>
        <skip_dev>yes</skip_dev>
        <skip_proc>yes</skip_proc>
        <skip_sys>yes</skip_sys>
        <process_priority>10</process_priority>
        <max_eps>100</max_eps>

        <synchronization>
          <enabled>yes</enabled>
          <interval>5m</interval>
          <max_interval>1h</max_interval>
          <max_eps>10</max_eps>
        </synchronization>
      </syscheck>

      <!--========================================================
           6. ROOTCHECK
      =========================================================-->
      <rootcheck>
        <disabled>no</disabled>
        <check_files>yes</check_files>
        <check_trojans>yes</check_trojans>
        <check_dev>yes</check_dev>
        <check_sys>yes</check_sys>
        <check_pids>yes</check_pids>
        <check_ports>yes</check_ports>
        <check_if>yes</check_if>
        <frequency>43200</frequency>
        <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
        <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
        <skip_nfs>yes</skip_nfs>
      </rootcheck>

      <!--========================================================
           7. SCA — Security Configuration Assessment
      =========================================================-->
      <sca>
        <enabled>yes</enabled>
        <scan_on_start>yes</scan_on_start>
        <interval>12h</interval>
        <skip_nfs>yes</skip_nfs>
      </sca>

      <!--========================================================
           8. SYSCOLLECTOR — Inventory (faster than manager: 30m)
      =========================================================-->
      <wodle name="syscollector">
        <disabled>no</disabled>
        <interval>30m</interval>
        <scan_on_start>yes</scan_on_start>
        <hardware>yes</hardware>
        <os>yes</os>
        <network>yes</network>
        <packages>yes</packages>
        <ports all="yes">yes</ports>
        <processes>yes</processes>
        <hotfixes>yes</hotfixes>
      </wodle>

      <!--========================================================
           9. COMMAND MONITORING — Kubernetes + network state
      =========================================================-->
      <wodle name="command">
        <disabled>no</disabled>
        <tag>running-containers</tag>
        <command>crictl --runtime-endpoint unix:///hostfs/run/containerd/containerd.sock ps --output json 2>/dev/null || echo "{}"</command>
        <interval>5m</interval>
        <ignore_output>no</ignore_output>
        <run_on_start>yes</run_on_start>
        <timeout>30</timeout>
      </wodle>

      <wodle name="command">
        <disabled>no</disabled>
        <tag>listening-ports</tag>
        <command>ss -tlnp 2>/dev/null</command>
        <interval>5m</interval>
        <ignore_output>no</ignore_output>
        <run_on_start>yes</run_on_start>
        <timeout>10</timeout>
      </wodle>

      <wodle name="command">
        <disabled>no</disabled>
        <tag>active-network</tag>
        <command>ip a</command>
        <interval>10m</interval>
        <ignore_output>no</ignore_output>
        <run_on_start>yes</run_on_start>
        <timeout>10</timeout>
      </wodle>

      <wodle name="command">
        <disabled>no</disabled>
        <tag>iptables-rules</tag>
        <command>iptables-save 2>/dev/null || echo "unavailable"</command>
        <interval>10m</interval>
        <ignore_output>no</ignore_output>
        <run_on_start>yes</run_on_start>
        <timeout>10</timeout>
      </wodle>

      <wodle name="command">
        <disabled>no</disabled>
        <tag>loaded-kernel-modules</tag>
        <command>lsmod | awk 'NR>1 {print $1}' | sort</command>
        <interval>10m</interval>
        <ignore_output>no</ignore_output>
        <run_on_start>yes</run_on_start>
        <timeout>10</timeout>
      </wodle>

      <!--========================================================
           10. LOG COLLECTION — Host logs
      =========================================================-->
      <localfile>
        <log_format>syslog</log_format>
        <location>/hostfs/var/log/syslog</location>
      </localfile>

      <localfile>
        <log_format>syslog</log_format>
        <location>/hostfs/var/log/auth.log</location>
      </localfile>

      <localfile>
        <log_format>syslog</log_format>
        <location>/hostfs/var/log/kern.log</location>
      </localfile>

      <localfile>
        <log_format>syslog</log_format>
        <location>/hostfs/var/log/dpkg.log</location>
      </localfile>

      <localfile>
        <log_format>audit</log_format>
        <location>/hostfs/var/log/audit/audit.log</location>
      </localfile>

      <localfile>
        <log_format>journald</log_format>
        <location>journald</location>
      </localfile>

      <!--========================================================
           11. LOG COLLECTION — Kubernetes container stdout
           /var/log/containers/*.log are symlinks to
           /var/log/pods/<namespace>_<pod>_<uid>/<container>/*.log
           which are themselves symlinks to containerd's
           /var/lib/containerd/.../. We mount /var/log.
      =========================================================-->
      <localfile>
        <log_format>json</log_format>
        <location>/hostfs/var/log/containers/*.log</location>
        <label key="event.module">kubernetes</label>
        <label key="event.dataset">kubernetes.container</label>
      </localfile>

      <!--========================================================
           12. LOG COLLECTION — Kubernetes API audit log
           Emitted by kube-apiserver if audit policy is configured.
      =========================================================-->
      <localfile>
        <log_format>json</log_format>
        <location>/hostfs/var/log/kubernetes/audit/audit.log</location>
        <label key="event.module">kubernetes</label>
        <label key="event.dataset">kubernetes.audit</label>
      </localfile>

      <!--========================================================
           13. ACTIVE RESPONSE — Accept commands from Manager
      =========================================================-->
      <active-response>
        <disabled>no</disabled>
        <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
        <ca_verification>yes</ca_verification>
      </active-response>

    </ossec_config>
