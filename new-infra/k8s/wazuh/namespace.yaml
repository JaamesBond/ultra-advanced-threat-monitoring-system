#--------------------------------------------------------------
# Wazuh — Namespace, ServiceAccounts
#
# Deployed to: bc-ctrl EKS cluster (eu-central-1)
# Storage:     local-path-provisioner (Rancher) — no EBS CSI required.
#              Installed by the pipeline before this manifest is applied.
#
# This file creates ONLY cluster-level foundation objects.
# It does not install Wazuh itself — see:
#   - manager/statefulset.yaml
#   - indexer/statefulset.yaml
#   - agent/daemonset.yaml   (applied to bc-prd cluster)
#--------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: wazuh
  labels:
    name: wazuh
    app.kubernetes.io/part-of: xdr-platform
    app.kubernetes.io/managed-by: kubectl
    customer: big-chemistry
    environment: ctrl
    vpc-role: control-plane
  annotations:
    description: "Wazuh SIEM — Manager, Indexer, Dashboard (bc-ctrl). Agents run in bc-prd."
---
#--------------------------------------------------------------
# ServiceAccount: wazuh-manager
#
# Pod Identity grants this SA the following AWS permissions
# (IAM role created by Terraform, ARN injected post-apply):
#
#   - s3:GetObject, s3:ListBucket on:
#       bc-cloudtrail-logs, bc-guardduty-findings,
#       bc-vpcflow-logs, bc-config-logs
#   - secretsmanager:GetSecretValue on:
#       bc/wazuh/cluster-key
#       bc/wazuh/agent-enrollment-password
#       bc/wazuh/api-credentials
#       bc/wazuh/indexer-credentials
#   - logs:CreateLogStream, logs:PutLogEvents on:
#       /aws/wazuh/manager/*
#   - ec2:DescribeInstances, ec2:DescribeTags
#       (for agent → EC2 metadata correlation)
#--------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wazuh-manager
  namespace: wazuh
  labels:
    app: wazuh-manager
    app.kubernetes.io/component: siem-manager
  annotations:
    # Filled in by Terraform aws_eks_pod_identity_association
    # eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/bc-ctrl-wazuh-manager
    pod-identity.eks.amazonaws.com/association: "pending-terraform"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wazuh-indexer
  namespace: wazuh
  labels:
    app: wazuh-indexer
    app.kubernetes.io/component: siem-indexer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wazuh-dashboard
  namespace: wazuh
  labels:
    app: wazuh-dashboard
    app.kubernetes.io/component: siem-dashboard
# StorageClass local-path is installed by the pipeline via local-path-provisioner.
# No StorageClass manifest needed here.
