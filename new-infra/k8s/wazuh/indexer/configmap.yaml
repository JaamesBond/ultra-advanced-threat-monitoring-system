#--------------------------------------------------------------
# Wazuh Indexer — Configuration ConfigMap
#
# Holds 4 config artifacts for the OpenSearch-based Indexer:
#   - opensearch.yml       cluster, security, TLS, network
#   - jvm.options          JVM heap + GC tuning
#   - internal_users.yml   security plugin seed users
#   - wazuh-alerts-ism.json  Index State Management policy
#                           (hot 7d → warm 21d → delete 30d)
#
# TLS certificates are provided separately via the Secret
# "wazuh-indexer-certs" (mounted at /usr/share/wazuh-indexer/certs).
#--------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-indexer-config
  namespace: wazuh
  labels:
    app: wazuh-indexer
    app.kubernetes.io/component: siem-indexer
data:
  opensearch.yml: |
    #--------------------------------------------------------
    # Cluster
    #--------------------------------------------------------
    cluster.name: bc-wazuh-indexer
    node.name: ${HOSTNAME}
    node.master: true
    node.data: true
    node.ingest: true

    #--------------------------------------------------------
    # Network
    #--------------------------------------------------------
    network.host: 0.0.0.0
    http.port: 9200
    transport.port: 9300

    #--------------------------------------------------------
    # Discovery — via headless Service DNS
    #--------------------------------------------------------
    discovery.seed_hosts:
      - wazuh-indexer-0.wazuh-indexer-headless.wazuh.svc.cluster.local
      - wazuh-indexer-1.wazuh-indexer-headless.wazuh.svc.cluster.local
      - wazuh-indexer-2.wazuh-indexer-headless.wazuh.svc.cluster.local
    cluster.initial_master_nodes:
      - wazuh-indexer-0
      - wazuh-indexer-1
      - wazuh-indexer-2

    #--------------------------------------------------------
    # Paths
    #--------------------------------------------------------
    path.data: /var/lib/wazuh-indexer
    path.logs: /var/log/wazuh-indexer

    #--------------------------------------------------------
    # Memory — disable swap for performance
    #--------------------------------------------------------
    bootstrap.memory_lock: true

    #--------------------------------------------------------
    # Indices — compression + limits
    #--------------------------------------------------------
    indices.query.bool.max_clause_count: 8192
    indices.fielddata.cache.size: 20%
    indices.memory.index_buffer_size: 25%
    action.auto_create_index: true
    action.destructive_requires_name: true

    #--------------------------------------------------------
    # Security plugin — TLS + RBAC
    #--------------------------------------------------------
    plugins.security.disabled: false
    plugins.security.ssl.transport.pemcert_filepath: certs/node.pem
    plugins.security.ssl.transport.pemkey_filepath: certs/node-key.pem
    plugins.security.ssl.transport.pemtrustedcas_filepath: certs/root-ca.pem
    plugins.security.ssl.transport.enforce_hostname_verification: false
    plugins.security.ssl.transport.resolve_hostname: false
    plugins.security.ssl.http.enabled: true
    plugins.security.ssl.http.pemcert_filepath: certs/node.pem
    plugins.security.ssl.http.pemkey_filepath: certs/node-key.pem
    plugins.security.ssl.http.pemtrustedcas_filepath: certs/root-ca.pem
    plugins.security.allow_default_init_securityindex: true
    plugins.security.authcz.admin_dn:
      - "CN=admin,OU=wazuh,O=big-chemistry,L=Frankfurt,C=DE"
    plugins.security.nodes_dn:
      - "CN=wazuh-indexer,OU=wazuh,O=big-chemistry,L=Frankfurt,C=DE"
    plugins.security.check_snapshot_restore_write_privileges: true
    plugins.security.enable_snapshot_restore_privilege: true
    plugins.security.restapi.roles_enabled:
      - all_access
      - security_rest_api_access
    plugins.security.system_indices.enabled: true
    plugins.security.system_indices.indices:
      - ".opendistro-alerting-config"
      - ".opendistro-alerting-alert*"
      - ".opendistro-anomaly-results*"
      - ".opendistro-anomaly-detector*"
      - ".opendistro-anomaly-checkpoints"
      - ".opendistro-anomaly-detection-state"
      - ".opendistro-reports-*"
      - ".opendistro-notifications-*"
      - ".opendistro-notebooks"
      - ".opensearch-observability"
      - ".opendistro-asynchronous-search-response*"
      - ".replication-metadata-store"

    #--------------------------------------------------------
    # Logging audit — who queried what
    #--------------------------------------------------------
    plugins.security.audit.type: internal_opensearch
    plugins.security.audit.config.disabled_rest_categories:
      - AUTHENTICATED
      - GRANTED_PRIVILEGES
    plugins.security.audit.config.disabled_transport_categories:
      - AUTHENTICATED
      - GRANTED_PRIVILEGES

    #--------------------------------------------------------
    # Compatibility with Wazuh 4.x Filebeat module
    #--------------------------------------------------------
    compatibility.override_main_response_version: true

  jvm.options: |
    -Xms8g
    -Xmx8g

    -XX:+UseG1GC
    -XX:G1ReservePercent=25
    -XX:InitiatingHeapOccupancyPercent=30

    -Djava.io.tmpdir=${OPENSEARCH_TMPDIR}
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/var/lib/wazuh-indexer
    -XX:ErrorFile=/var/log/wazuh-indexer/hs_err_pid%p.log

    -Xlog:gc*,gc+age=trace,safepoint:file=/var/log/wazuh-indexer/gc.log:utctime,pid,tags:filecount=32,filesize=64m

    -Dlog4j2.formatMsgNoLookups=true
    -Djava.locale.providers=SPI,COMPAT
    -Djna.nosys=true
    -Dio.netty.allocator.numDirectArenas=0
    -Dio.netty.noUnsafe=true
    -Dio.netty.noKeySetOptimization=true
    -Dio.netty.recycler.maxCapacityPerThread=0

  internal_users.yml: |
    _meta:
      type: "internalusers"
      config_version: 2

    admin:
      hash: "PLACEHOLDER_ADMIN_BCRYPT_HASH"
      reserved: true
      backend_roles:
        - "admin"
      description: "Admin user — full cluster access"

    kibanaserver:
      hash: "PLACEHOLDER_KIBANASERVER_BCRYPT_HASH"
      reserved: true
      description: "Wazuh Dashboard service account"

    kibanaro:
      hash: "PLACEHOLDER_KIBANARO_BCRYPT_HASH"
      reserved: false
      backend_roles:
        - "kibanauser"
        - "readall"
      description: "Kibana read-only user"

    wazuh_manager:
      hash: "PLACEHOLDER_WAZUH_MANAGER_BCRYPT_HASH"
      reserved: true
      backend_roles:
        - "admin"
      description: "Wazuh Manager Filebeat writer"

  wazuh-alerts-ism.json: |
    {
      "policy": {
        "description": "Wazuh alerts ILM — hot 7d, warm 21d, delete 30d",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [
              {
                "rollover": {
                  "min_index_age": "1d",
                  "min_size": "50gb"
                }
              }
            ],
            "transitions": [
              {
                "state_name": "warm",
                "conditions": { "min_index_age": "7d" }
              }
            ]
          },
          {
            "name": "warm",
            "actions": [
              { "replica_count": { "number_of_replicas": 0 } },
              { "force_merge": { "max_num_segments": 1 } },
              { "read_only": {} }
            ],
            "transitions": [
              {
                "state_name": "delete",
                "conditions": { "min_index_age": "30d" }
              }
            ]
          },
          {
            "name": "delete",
            "actions": [ { "delete": {} } ]
          }
        ],
        "ism_template": [
          {
            "index_patterns": ["wazuh-alerts-*", "wazuh-archives-*"],
            "priority": 100
          }
        ]
      }
    }
