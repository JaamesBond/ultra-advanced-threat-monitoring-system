#--------------------------------------------------------------
# Wazuh Indexer — 3-node StatefulSet
#
# Deployed to: bc-ctrl EKS cluster, namespace "wazuh"
# Nodegroup:   security (m6a.xlarge, taint dedicated=security)
# Storage:     50 Gi gp3 encrypted per replica (wazuh-gp3 SC)
#
# Notes:
# - vm.max_map_count=262144 is set by a privileged init container
#   on the host node (required by Lucene for mmap'd segments).
# - JVM heap pinned at 8g (Xms=Xmx) on 16 Gi pod; the rest is
#   reserved for the OS page cache used by Lucene.
# - bootstrap.memory_lock=true → container needs IPC_LOCK capability.
#--------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-indexer
  namespace: wazuh
  labels:
    app: wazuh-indexer
    app.kubernetes.io/component: siem-indexer
    app.kubernetes.io/part-of: xdr-platform
spec:
  serviceName: wazuh-indexer-headless
  replicas: 3
  podManagementPolicy: Parallel        # OpenSearch bootstraps faster in parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: wazuh-indexer
  template:
    metadata:
      labels:
        app: wazuh-indexer
        app.kubernetes.io/component: siem-indexer
      annotations:
        # Rolling restart on config change handled by configMapGenerator.
    spec:
      serviceAccountName: wazuh-indexer
      terminationGracePeriodSeconds: 180

      nodeSelector:
        role: security
      tolerations:
        - key: dedicated
          operator: Equal
          value: security
          effect: NoSchedule

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [wazuh-indexer]
              topologyKey: kubernetes.io/hostname

      # topologySpreadConstraints removed — bc-ctrl is single-AZ (eu-central-1a).
      # podAntiAffinity per-hostname is sufficient for node-level HA.

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      #--------------------------------------------------------------
      # Init containers
      #
      # 1. set-sysctl           — privileged, sets vm.max_map_count on host
      # 2. fix-permissions      — chown /var/lib/wazuh-indexer to UID 1000
      # 3. wait-dns             — ensures headless DNS is resolvable
      #--------------------------------------------------------------
      initContainers:
        - name: set-sysctl
          image: public.ecr.aws/docker/library/busybox:1.37.0
          securityContext:
            privileged: true
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              sysctl -w vm.max_map_count=262144
              sysctl -w fs.file-max=65536
              ulimit -n 65536 || true

        - name: fix-permissions
          image: public.ecr.aws/docker/library/busybox:1.37.0
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /var/lib/wazuh-indexer
              chown -R 1000:1000 /var/log/wazuh-indexer
          volumeMounts:
            - name: wazuh-indexer-data
              mountPath: /var/lib/wazuh-indexer
            - name: log-dir
              mountPath: /var/log/wazuh-indexer

        - name: wait-dns
          image: public.ecr.aws/docker/library/busybox:1.37.0
          command:
            - sh
            - -c
            - |
              echo "Waiting for headless DNS to stabilise..."
              sleep 5
              nslookup wazuh-indexer-headless.wazuh.svc.cluster.local || true

        #--------------------------------------------------------------
        # inject-secrets — substitutes PLACEHOLDER_*_BCRYPT_HASH in
        # internal_users.yml with hashed passwords from Secrets Manager.
        #
        # The wazuh-indexer-secrets Secret (created by ExternalSecret
        # indexer/external-secrets.yaml) must contain pre-hashed bcrypt
        # values for each user. Generate them once with:
        #   python3 -c "import bcrypt; print(bcrypt.hashpw(b'<password>',bcrypt.gensalt(12)).decode())"
        # and store in bc/wazuh/indexer in Secrets Manager.
        #
        # The rendered internal_users.yml is written to an emptyDir
        # (/workdir/internal_users.yml) and then bind-mounted by the
        # main container at the OpenSearch security config path.
        #--------------------------------------------------------------
        - name: inject-secrets
          image: public.ecr.aws/docker/library/alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache gettext >/dev/null
              envsubst < /configmap-src/internal_users.yml > /workdir/internal_users.yml
              echo "internal_users.yml rendered"
          envFrom:
            - secretRef:
                name: wazuh-indexer-secrets
          volumeMounts:
            - name: config
              mountPath: /configmap-src
            - name: config-rendered
              mountPath: /workdir

      #--------------------------------------------------------------
      # Main container — Wazuh Indexer (OpenSearch fork)
      #--------------------------------------------------------------
      containers:
        - name: wazuh-indexer
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/wazuh/wazuh-indexer:4.9.2
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP

          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms8g -Xmx8g"
            - name: OPENSEARCH_PATH_CONF
              value: /usr/share/wazuh-indexer/config
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            # OPENSEARCH_INITIAL_ADMIN_PASSWORD is read by the Wazuh 4.9
            # indexer entrypoint on first boot to set the admin user's
            # password (hashed automatically). Must match INDEXER_PASSWORD
            # in bc/wazuh/manager and bc/wazuh/dashboard.
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-indexer-secrets
                  key: INDEXER_PASSWORD
            # ADMIN_PASSWORD is consumed by the readinessProbe curl command.
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-indexer-secrets
                  key: INDEXER_PASSWORD

          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 16Gi

          securityContext:
            capabilities:
              add: [IPC_LOCK, SYS_RESOURCE]
            allowPrivilegeEscalation: false

          volumeMounts:
            - name: wazuh-indexer-data
              mountPath: /var/lib/wazuh-indexer
            - name: log-dir
              mountPath: /var/log/wazuh-indexer
            - name: config
              mountPath: /usr/share/wazuh-indexer/config/opensearch.yml
              subPath: opensearch.yml
            - name: config
              mountPath: /usr/share/wazuh-indexer/config/jvm.options
              subPath: jvm.options
            # Rendered internal_users.yml (PLACEHOLDER hashes substituted by
            # inject-secrets initContainer). The ConfigMap version is
            # source-only; the rendered one contains real bcrypt hashes.
            - name: config-rendered
              mountPath: /usr/share/wazuh-indexer/opensearch-security/internal_users.yml
              subPath: internal_users.yml
            - name: certs
              mountPath: /usr/share/wazuh-indexer/certs
              readOnly: true

          startupProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 30  # 30 × 15s = 7.5 min cold-start budget

          livenessProbe:
            tcpSocket:
              port: 9300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  curl -sk -u "admin:${ADMIN_PASSWORD:-admin}" \
                       https://localhost:9200/_cluster/health?local=true \
                       | grep -qE '"status":"(green|yellow)"'
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5

      volumes:
        - name: config
          configMap:
            name: wazuh-indexer-config
        # emptyDir receives the rendered internal_users.yml from inject-secrets
        - name: config-rendered
          emptyDir: {}
        # Projected volume merges two cert-manager Secrets into one
        # directory, remapping cert-manager's standard key names to
        # the paths opensearch.yml expects under /usr/share/wazuh-indexer/certs/.
        - name: certs
          projected:
            defaultMode: 0400
            sources:
              - secret:
                  name: wazuh-indexer-node-cert
                  items:
                    - key: tls.crt
                      path: node.pem
                    - key: tls.key
                      path: node-key.pem
                    - key: ca.crt
                      path: root-ca.pem
              - secret:
                  name: wazuh-indexer-admin-cert
                  items:
                    - key: tls.crt
                      path: admin.pem
                    - key: tls.key
                      path: admin-key.pem
        - name: log-dir
          emptyDir: {}

  #--------------------------------------------------------------
  # PVCs — one 50 Gi gp3 volume per replica, retained on delete
  #--------------------------------------------------------------
  volumeClaimTemplates:
    - metadata:
        name: wazuh-indexer-data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: wazuh-gp3
        resources:
          requests:
            storage: 50Gi
