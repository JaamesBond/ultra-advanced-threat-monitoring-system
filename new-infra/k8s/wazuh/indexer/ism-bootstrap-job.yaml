#--------------------------------------------------------------
# Wazuh Indexer — ISM Policy Bootstrap Job
#
# DEPLOYED TO: bc-ctrl EKS cluster, namespace "wazuh"
#
# Applies the wazuh-alerts-ism.json Index State Management policy
# to the Wazuh Indexer after it reaches a healthy state.
#
# The policy enforces:
#   hot  (0-7d)  → rollover at 1d age or 50 Gi
#   warm (7-30d) → 0 replicas, force-merge to 1 segment, read-only
#   delete (30d) → delete index
#
# The Job is idempotent — the ISM PUT API is a create-or-update.
# Re-applying this manifest after the Job completed is safe.
#
# backoffLimit=10 and restartPolicy=OnFailure give a ~5-min
# window for the Indexer to finish its security init before
# the Job gives up.
#--------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: wazuh-indexer-ism-bootstrap
  namespace: wazuh
  labels:
    app: wazuh-indexer
    app.kubernetes.io/component: siem-indexer
    app.kubernetes.io/part-of: xdr-platform
  annotations:
    # Flux: re-run this Job every time the ISM JSON changes.
    # Without this annotation Flux will not recreate a completed Job.
    kustomize.toolkit.fluxcd.io/ssa: merge
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400   # auto-clean after 24h
  template:
    metadata:
      labels:
        app: wazuh-indexer
        app.kubernetes.io/component: ism-bootstrap
    spec:
      serviceAccountName: wazuh-indexer
      restartPolicy: OnFailure

      nodeSelector:
        role: security
      tolerations:
        - key: dedicated
          operator: Equal
          value: security
          effect: NoSchedule

      containers:
        - name: ism-apply
          image: public.ecr.aws/docker/library/alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl >/dev/null

              INDEXER="https://wazuh-indexer.wazuh.svc.cluster.local:9200"

              # Wait until the Indexer cluster health is green or yellow
              echo "Waiting for Indexer to be healthy..."
              for i in $(seq 1 60); do
                STATUS=$(curl -sk -u "admin:${ADMIN_PASSWORD}" \
                  "${INDEXER}/_cluster/health?local=true" \
                  | grep -oE '"status":"(green|yellow)"' || echo "")
                if [ -n "$STATUS" ]; then
                  echo "Indexer healthy ($STATUS) after ${i}x5s"
                  break
                fi
                sleep 5
              done

              if [ -z "$STATUS" ]; then
                echo "ERROR: Indexer not healthy after 5 min, giving up"
                exit 1
              fi

              # Apply the ISM policy (create-or-update)
              echo "Applying wazuh-alerts ISM policy..."
              HTTP_CODE=$(curl -sk -o /tmp/ism-response.json -w "%{http_code}" \
                -X PUT "${INDEXER}/_plugins/_ism/policies/wazuh-alerts-ism" \
                -H "Content-Type: application/json" \
                -u "admin:${ADMIN_PASSWORD}" \
                --data-binary @/config/wazuh-alerts-ism.json)

              echo "ISM API response (HTTP $HTTP_CODE):"
              cat /tmp/ism-response.json
              echo ""

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "ISM policy applied successfully"
              else
                echo "ERROR: ISM apply returned HTTP $HTTP_CODE"
                exit 1
              fi

          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-indexer-secrets
                  key: INDEXER_PASSWORD

          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi

          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: certs
              mountPath: /etc/ssl/indexer-ca.pem
              subPath: root-ca.pem
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: wazuh-indexer-config
        - name: certs
          projected:
            defaultMode: 0400
            sources:
              - secret:
                  name: wazuh-indexer-node-cert
                  items:
                    - key: ca.crt
                      path: root-ca.pem
