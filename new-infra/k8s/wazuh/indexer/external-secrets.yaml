#--------------------------------------------------------------
# Wazuh Indexer — ExternalSecret
#
# DEPLOYED TO: bc-ctrl EKS cluster
#
# Syncs bc/wazuh/indexer from Secrets Manager into
# "wazuh-indexer-secrets" K8s Secret, consumed by:
#   - inject-secrets initContainer (envsubst on internal_users.yml)
#   - Main container env vars:
#       OPENSEARCH_INITIAL_ADMIN_PASSWORD  — first-boot admin setup
#       ADMIN_PASSWORD                     — readiness probe curl
#
# Required Secrets Manager secret (seed once):
#   aws secretsmanager create-secret \
#     --name bc/wazuh/indexer \
#     --secret-string '{
#       "INDEXER_PASSWORD":                    "<strong password>",
#       "PLACEHOLDER_ADMIN_BCRYPT_HASH":       "$(python3 -c \"import bcrypt; print(bcrypt.hashpw(b'<INDEXER_PASSWORD>',bcrypt.gensalt(12)).decode())\")",
#       "PLACEHOLDER_KIBANASERVER_BCRYPT_HASH": "$(python3 -c \"import bcrypt; print(bcrypt.hashpw(b'<DASHBOARD_PASSWORD>',bcrypt.gensalt(12)).decode())\")",
#       "PLACEHOLDER_KIBANARO_BCRYPT_HASH":     "$(python3 -c \"import bcrypt; print(bcrypt.hashpw(b'<KIBANARO_PASSWORD>',bcrypt.gensalt(12)).decode())\")",
#       "PLACEHOLDER_WAZUH_MANAGER_BCRYPT_HASH": "$(python3 -c \"import bcrypt; print(bcrypt.hashpw(b'<INDEXER_PASSWORD>',bcrypt.gensalt(12)).decode())\")"
#     }'
#
# INDEXER_PASSWORD must match the value in bc/wazuh/manager and
# bc/wazuh/dashboard.
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wazuh-indexer-secrets
  namespace: wazuh
  labels:
    app: wazuh-indexer
    app.kubernetes.io/part-of: xdr-platform
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: wazuh-indexer-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: wazuh-indexer
          app.kubernetes.io/part-of: xdr-platform

  dataFrom:
    - extract:
        key: bc/wazuh/indexer
