title: Kubernetes Privileged Pod Created
id: a1b2c3d4-0001-0001-0002-000000000002
status: stable
description: >
  A privileged pod has full access to the host kernel.
  This is a well-known container escape technique.
author: bc-security-team
date: 2026/04/17
tags:
  - attack.privilege_escalation
  - attack.t1611
logsource:
  product: kubernetes
  service: audit
detection:
  selection:
    verb: create
    objectRef.resource: pods
    requestObject.spec.containers[*].securityContext.privileged: "true"
  condition: selection
falsepositives:
  - Suricata DaemonSet itself (needs NET_ADMIN — check namespace)
  - Wazuh agent DaemonSet
level: critical
