title: AWS Root Account Used
id: a1b2c3d4-0001-0001-0001-000000000002
status: stable
description: >
  The root account must never be used for daily operations.
  Any root login is a critical security incident.
author: bc-security-team
date: 2026/04/17
tags:
  - attack.privilege_escalation
  - attack.t1078.004
logsource:
  product: aws
  service: cloudtrail
detection:
  selection:
    userIdentity.type: Root
    eventType: AwsConsoleSignIn
  filter_support:
    eventType: AwsServiceEvent
  condition: selection and not filter_support
falsepositives:
  - AWS Support cases that require root access
level: critical
