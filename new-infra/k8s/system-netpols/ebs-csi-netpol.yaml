# CiliumNetworkPolicy — ebs-csi-controller (kube-system)
# Fixes: CrashLoopBackOff with "dial tcp: lookup sts.eu-central-1.amazonaws.com: i/o timeout"
# under policyEnforcementMode=always default-deny.
# toFQDNs is broken in this Cilium ENI deployment (ipcache not populated for resolved IPs);
# STS uses toEntities:world (public path via fck-nat). STS VPC endpoint CIDR rule was removed
# because VPC endpoint IPs change on every cluster rebuild.
# EC2 VPC endpoint IPs (10.30.10.136/32, 10.30.11.101/32) are retained.
# See: new-infra/k8s/system-netpols/external-secrets-netpol.yaml (working precedent).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ebs-csi-controller-netpol
  namespace: kube-system
spec:
  # Match BOTH the controller Deployment and the node DaemonSet -- both call
  # EC2 API (controller for AttachVolume, node for NodeStageVolume IRSA refresh).
  # The narrower app=ebs-csi-controller selector misses the DaemonSet pods,
  # which then CrashLoop with the same STS lookup timeout.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: aws-ebs-csi-driver
  egress:
    # CoreDNS — in-cluster DNS resolution (kube-system pods use toEntities:cluster)
    - toEntities:
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # kube-apiserver — EBS CSI watches PVCs, PVs, StorageClasses, VolumeAttachments.
    # cluster entity added alongside kube-apiserver: when kubeProxyReplacement=true Cilium
    # DNAT rewrites 172.20.0.1 to the actual API server ENI IPs before policy evaluation.
    # In EKS ENI mode, these IPs carry identity 16777217 (reserved:world).
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # STS — IRSA token exchange (AssumeRoleWithWebIdentity) via public endpoint + fck-nat.
    # STS VPC endpoint CIDR rule removed (IPs change on every cluster rebuild; world rule suffices).
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # EC2 VPC endpoint — DescribeAvailabilityZones, AttachVolume, etc.
    # IPs are stable ENI addresses; toFQDNs cannot be used (see header comment).
    # Verify with: aws ec2 describe-network-interfaces --query "NetworkInterfaces[*].PrivateIpAddress"
    #              --filters "Name=description,Values=*ec2*" --region eu-central-1
    - toCIDRSet:
        - cidr: 10.30.10.136/32
        - cidr: 10.30.11.101/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # IMDS (instance metadata service) on the link-local address.
    # ebs-csi-node uses IMDS to discover the instance's region, AZ, and instance type
    # before falling back to the Kubernetes API. Without this rule the node pods
    # CrashLoopBackOff with "could not get IMDS metadata: ... context deadline exceeded".
    # Port 80 covers IMDSv1; IMDSv2 uses the same port with a token handshake.
    - toCIDR:
        - 169.254.169.254/32
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
