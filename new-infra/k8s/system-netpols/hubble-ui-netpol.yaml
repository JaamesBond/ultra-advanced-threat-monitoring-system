apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hubble-ui-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      k8s-app: hubble-ui
  ingress:
    # frontend port — accessed via port-forward or future ingress
    - fromEntities:
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
    # kubelet health probes
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
  egress:
    # DNS: same kubeProxyReplacement DNAT issue — add toCIDRSet for bc-prd VPC pod IPs.
    - toCIDRSet:
        - cidr: 10.30.0.0/16
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    - toEntities:
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
            - port: "4245"
              protocol: TCP
    # kube-apiserver: kubeProxyReplacement=true DNAT's 172.20.0.1 to API server ENI IPs which
    # carry identity reserved:world (16777217) in EKS ENI mode — not kube-apiserver/remote-node.
    # Must include "world" to match post-DNAT identity. See coredns-netpol.yaml comment.
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
