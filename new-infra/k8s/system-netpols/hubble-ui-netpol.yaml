apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hubble-ui-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      k8s-app: hubble-ui
  ingress:
    # frontend port — accessed via port-forward or future ingress
    - fromEntities:
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
    # kubelet health probes
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
  egress:
    - toEntities:
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
            - port: "4245"
              protocol: TCP
    # kube-apiserver + cluster: kubeProxyReplacement=true causes Cilium to DNAT 172.20.0.1 to
    # API server ENI IPs with remote-node identities before policy evaluation; "cluster" covers
    # those IPs. See external-secrets-netpol.yaml for the full explanation and ipcache evidence.
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
