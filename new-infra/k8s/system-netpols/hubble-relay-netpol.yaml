apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hubble-relay-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      k8s-app: hubble-relay
  ingress:
    - fromEntities:
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "4245"
              protocol: TCP
  egress:
    # Connect to Cilium agent on each node (observer port)
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "4244"
              protocol: TCP
    # DNS to CoreDNS via standard label.
    # host added for NodeLocal DNSCache: cache binds 172.20.0.10 as hostNetwork=true;
    # DNS queries to that IP hit the host identity on the local node.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
