apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cert-controller-netpol
  namespace: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-cert-controller
  ingress:
    - fromEntities:
        - host
  egress:
    # kube-apiserver — cert-controller manages CertificateRequest lifecycle.
    # cluster entity added: when kubeProxyReplacement=true Cilium DNAT rewrites 172.20.0.1 to
    # API server ENI IPs with remote-node identities, not identity 7. See external-secrets-netpol.yaml.
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS — cluster/remote-node covers CoreDNS pod IPs directly.
    # host added for NodeLocal DNSCache: cache binds 172.20.0.10 as
    # hostNetwork=true; pod DNS queries to that IP hit the host identity.
    - toEntities:
        - cluster
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
