apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-netpol
  namespace: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  ingress: []
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:eks.amazonaws.com/component: coredns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    # STS VPC endpoint IPs (FQDN ipcache not populated for VPC-internal IPs in ENI mode)
    - toCIDRSet:
        - cidr: 10.30.10.209/32
        - cidr: 10.30.11.123/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Secrets Manager + other AWS APIs (no VPC endpoint, resolves via fck-nat to public IPs)
    # toFQDNs broken in Cilium ENI mode — CIDR identities never inserted into ipcache
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
