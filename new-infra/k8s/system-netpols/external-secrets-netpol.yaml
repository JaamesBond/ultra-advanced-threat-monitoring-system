apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-netpol
  namespace: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  ingress: []
  egress:
    # kube-apiserver — TokenRequest API (IRSA ServiceAccount token exchange) and watches.
    # Two entities required:
    #   - kube-apiserver: matches the reserved Cilium entity (identity 7). Covers the case
    #     where Cilium kubeProxyReplacement is NOT active and the API server endpoint IP is
    #     tagged as kube-apiserver in the ipcache.
    #   - cluster: covers the post-DNAT destination when kubeProxyReplacement=true. Cilium
    #     rewrites 172.20.0.1:443 → {10.30.10.135,10.30.11.26}:443 in the BPF LB map before
    #     the policy lookup. Those backend IPs carry remote-node identities (16777223/16777224)
    #     which fall under the "cluster" entity, not "kube-apiserver". Without this rule the
    #     packet is dropped even though kube-apiserver is allowed — the post-DNAT IP does not
    #     carry identity 7 in the ipcache. Verified via `cilium bpf ipcache list` on the nomad
    #     node (2026-05-09): 10.30.10.135 → identity=16777224, 10.30.11.26 → identity=16777223.
    - toEntities:
        - kube-apiserver
        - cluster
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:eks.amazonaws.com/component: coredns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    # STS + Secrets Manager + all AWS APIs → public endpoints via fck-nat.
    # toFQDNs broken in Cilium ENI mode (CIDR identities never inserted into ipcache).
    # STS VPC endpoint CIDR rule removed — VPC endpoint IPs change on every cluster rebuild
    # and the world rule already covers the public STS path with no loss of function.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
