apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: falco-netpol
  namespace: falco
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: falco
  ingress:
    # kubelet health probes (/healthz on 8765)
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8765"
              protocol: TCP
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEntities:
        - cluster
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
