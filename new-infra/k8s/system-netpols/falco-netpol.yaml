apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: falco-netpol
  namespace: falco
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: falco
  ingress:
    # kubelet health probes (/healthz on 8765)
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8765"
              protocol: TCP
  egress:
    # kube-apiserver + cluster: kubeProxyReplacement=true causes Cilium to DNAT 172.20.0.1 to
    # API server ENI IPs with remote-node identities before policy evaluation; "cluster" covers
    # those IPs. See external-secrets-netpol.yaml for the full explanation and ipcache evidence.
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEntities:
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
