apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: coredns-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      k8s-app: kube-dns
  ingress:
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
  egress:
    # Upstream DNS forwarding — VPC resolver at 169.254.169.253 is reachable via host
    - toEntities:
        - all
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
