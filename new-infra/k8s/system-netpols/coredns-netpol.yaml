apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: coredns-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      k8s-app: kube-dns
  ingress:
    - fromEntities:
        - all
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    # NodeLocal DNSCache forwards cluster.local misses from the host network
    # stack (identity reserved:host) to CoreDNS pods. Without this rule Cilium
    # drops cache→CoreDNS TCP 53 with "Policy denied" because the cache runs
    # as hostNetwork=true and is seen as the host identity at the endpoint.
    # fromEntities:all above already covers host, but this explicit rule
    # documents the NodeLocal DNSCache dependency and survives any future
    # tightening of the all entity.
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
  egress:
    # Upstream DNS forwarding — VPC resolver at 169.254.169.253 is reachable via host
    - toEntities:
        - all
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    # kube-apiserver + cluster + world: kubeProxyReplacement=true causes Cilium to DNAT 172.20.0.1 to
    # API server ENI IPs. In EKS ENI mode, these IPs carry identity 16777217 (reserved:world),
    # not identity 7 (kube-apiserver) or 6 (remote-node). "world" covers these IPs.
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
