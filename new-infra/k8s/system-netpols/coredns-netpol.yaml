apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: coredns-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      k8s-app: kube-dns
  ingress:
    - fromEntities:
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
  egress:
    # Upstream DNS forwarding — VPC resolver at 169.254.169.253 is reachable via host
    - toEntities:
        - all
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    # kube-apiserver + cluster: kubeProxyReplacement=true causes Cilium to DNAT 172.20.0.1 to
    # API server ENI IPs with remote-node identities before policy evaluation; "cluster" covers
    # those IPs. See external-secrets-netpol.yaml for the full explanation and ipcache evidence.
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
