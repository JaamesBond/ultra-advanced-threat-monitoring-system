apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: coredns-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      k8s-app: kube-dns
  ingress:
    - fromEntities:
        - all
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
  egress:
    # Upstream DNS forwarding — VPC resolver at 169.254.169.253 is reachable via host
    - toEntities:
        - all
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    # kube-apiserver + cluster + world: kubeProxyReplacement=true causes Cilium to DNAT 172.20.0.1 to
    # API server ENI IPs. In EKS ENI mode, these IPs carry identity 16777217 (reserved:world),
    # not identity 7 (kube-apiserver) or 6 (remote-node). "world" covers these IPs.
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
