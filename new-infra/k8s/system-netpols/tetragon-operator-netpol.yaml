apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tetragon-operator-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tetragon-operator
  ingress:
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # kube-apiserver + cluster: kubeProxyReplacement=true causes Cilium to DNAT 172.20.0.1 to
    # API server ENI IPs with remote-node identities before policy evaluation; "cluster" covers
    # those IPs. See external-secrets-netpol.yaml for the full explanation and ipcache evidence.
    - toEntities:
        - kube-apiserver
        - cluster
        - remote-node
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS — cluster/remote-node covers CoreDNS pod IPs directly.
    # host added for NodeLocal DNSCache: cache binds 172.20.0.10 as
    # hostNetwork=true; pod DNS queries to that IP hit the host identity.
    - toEntities:
        - cluster
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
