# CiliumNetworkPolicy — aws-load-balancer-controller (kube-system)
# Fixes: default-deny egress blocking STS/ELBv2/EC2/ACM API calls under
# policyEnforcementMode=always. Also opens webhook ingress on TCP 9443 so the
# kube-apiserver can reach the mutating/validating admission webhooks the controller registers.
# toFQDNs is broken in this Cilium ENI deployment (ipcache not populated for resolved IPs);
# all AWS APIs (STS, ELBv2, ACM, EC2) use toEntities:world (public path via fck-nat).
# STS VPC endpoint CIDR rule was removed — VPC endpoint IPs change on every cluster rebuild.
# See: new-infra/k8s/system-netpols/external-secrets-netpol.yaml (working precedent).
# endpointSelector label: app.kubernetes.io/name=aws-load-balancer-controller
# (stamped by the aws-load-balancer-controller Helm chart — matches SA and Deployment labels).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: alb-controller-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: aws-load-balancer-controller
  ingress:
    # kube-apiserver calls the controller's admission webhooks on TCP 9443
    # (ValidatingWebhookConfiguration + MutatingWebhookConfiguration).
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
  egress:
    # CoreDNS — in-cluster DNS resolution (kube-system pods use toEntities:cluster)
    - toEntities:
        - cluster
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # kube-apiserver — controller watches Services, Ingresses, TargetGroupBindings
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # STS (IRSA), ELBv2, ACM, EC2, WAFv2, Shield APIs — all public endpoints via fck-nat.
    # No VPC endpoints for these services in bc-prd; STS VPC endpoint CIDR rule removed (IPs change on rebuild).
    # toFQDNs cannot be used — toEntities:world is required.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
