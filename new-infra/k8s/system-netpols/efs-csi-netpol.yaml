# CiliumNetworkPolicy — efs-csi-controller (kube-system)
# Fixes: CrashLoopBackOff with "dial tcp: lookup sts.eu-central-1.amazonaws.com: i/o timeout"
# under policyEnforcementMode=always default-deny.
# toFQDNs is broken in this Cilium ENI deployment (ipcache not populated for resolved IPs);
# STS and EFS API both use toEntities:world (public path via fck-nat). STS VPC endpoint CIDR
# rule was removed — VPC endpoint IPs change on every cluster rebuild.
# See: new-infra/k8s/system-netpols/external-secrets-netpol.yaml (working precedent).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: efs-csi-controller-netpol
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      app: efs-csi-controller
  egress:
    # CoreDNS — in-cluster DNS resolution (kube-system pods use toEntities:cluster)
    - toEntities:
        - cluster
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # kube-apiserver — EFS CSI watches PVCs, PVs, StorageClasses, VolumeAttachments.
    # cluster entity added alongside kube-apiserver: when kubeProxyReplacement=true Cilium
    # DNAT rewrites 172.20.0.1 to the actual API server ENI IPs before policy evaluation;
    # those IPs carry remote-node identities under "cluster", not identity 7 (kube-apiserver).
    # See external-secrets-netpol.yaml for the full explanation and ipcache evidence.
    - toEntities:
        - kube-apiserver
        - cluster
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # STS (IRSA) + EFS API + EC2 API — all public endpoints via fck-nat.
    # No VPC endpoints for EFS in bc-prd; STS VPC endpoint CIDR rule removed (IPs change on rebuild).
    # toFQDNs cannot be used — toEntities:world is required.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
