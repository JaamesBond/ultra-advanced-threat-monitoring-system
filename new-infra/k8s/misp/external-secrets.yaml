#--------------------------------------------------------------
# MISP — ExternalSecret
#
# Syncs bc/misp from AWS Secrets Manager into the K8s Secret
# "misp-secrets" in the "misp" namespace.
#
# Seed this secret ONCE before deploying:
#   aws secretsmanager create-secret \
#     --region eu-central-1 \
#     --name bc/misp \
#     --secret-string '{
#       "MYSQL_ROOT_PASSWORD":   "<strong-password>",
#       "MYSQL_PASSWORD":        "<strong-password>",
#       "MISP_ADMIN_EMAIL":      "admin@bigchemistry.internal",
#       "MISP_ADMIN_PASSPHRASE": "<strong-password>",
#       "SECURITY_SALT":         "<32-char random hex>",
#       "MISP_AUTH_KEY":         "FILL_IN"
#     }'
#
# MISP_AUTH_KEY: generated by MISP after first login.
# Go to Administration → List Auth Keys → add key, then:
#   Run update-fill-in-secrets.sh to push the key to:
#     bc/misp.MISP_AUTH_KEY
#     bc/wazuh/manager.PLACEHOLDER_MISP_API_KEY
#     bc/suricata/misp.MISP_API_KEY
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: misp-secrets
  namespace: misp
  labels:
    app: misp
    app.kubernetes.io/part-of: xdr-platform
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: misp-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: misp
          app.kubernetes.io/part-of: xdr-platform

  dataFrom:
    - extract:
        key: bc/misp
