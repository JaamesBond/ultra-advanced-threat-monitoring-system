#--------------------------------------------------------------
# MISP — Kustomize root (bc-ctrl)
#
# Flux reconciles this path: new-infra/k8s/misp/
# Deploy order:
#   1. Namespace
#   2. ExternalSecret (misp-secrets — synced from bc/misp in Secrets Manager)
#   3. MySQL StatefulSet + Service
#   4. Redis Deployment + Service
#   5. MISP Core PVC + Deployment + Service (NLB)
#
# After first deployment:
#   1. Wait for misp-core pod to be Ready (~5 min first boot)
#   2. Log in at https://misp.bc-ctrl.internal
#      Email: value of MISP_ADMIN_EMAIL in bc/misp secret
#      Password: value of MISP_ADMIN_PASSPHRASE in bc/misp secret
#   3. Administration → List Auth Keys → Add Authentication Key
#   4. Copy the key and run update-fill-in-secrets.sh with MISP_AUTH_KEY=<key>
#      This propagates the key to bc/misp, bc/wazuh/manager, and bc/suricata/misp
#--------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - external-secrets.yaml
  - mysql/service.yaml
  - mysql/statefulset.yaml
  - redis/service.yaml
  - redis/deployment.yaml
  - misp-core/pvc.yaml
  - misp-core/service.yaml
  - misp-core/deployment.yaml
