apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: wazuh-agent-netpol
  namespace: wazuh
spec:
  endpointSelector:
    matchLabels:
      app: wazuh-agent
  ingress: []
  egress:
    # Allow DNS — toEntities:all covers both kube-dns (cluster) and
    # VPC DNS at 169.254.169.253 (used by hostNetwork pods)
    - toPorts:
        - ports:
            - port: "53"
              protocol: ANY
      toEntities:
        - all
    # Allow Wazuh event forwarding (1514) and enrollment (1515) to
    # Wazuh EC2 in bc-ctrl private subnets over VPC peering
    - toCIDRSet:
        - cidr: 10.0.10.0/24
        - cidr: 10.0.11.0/24
      toPorts:
        - ports:
            - port: "1514"
              protocol: TCP
            - port: "1515"
              protocol: TCP
