#--------------------------------------------------------------
# PriorityClass: bc-security-node-critical
#
# Assigned to security DaemonSets (wazuh-agent, suricata) that
# MUST run on every node for XDR coverage.  Value is set to the
# MAXIMUM allowed user-defined priority (1000000000) — Kubernetes
# forbids user PriorityClasses above 1e9 and reserves higher values
# for system-* classes (system-cluster-critical=2e9,
# system-node-critical=2000001000), so those still take absolute
# precedence, while security telemetry beats every application
# workload (which default to priority 0).
#
# Consequence: when a node is at the VPC-CNI pod-count cap (17
# on t3.medium) the scheduler will preempt the lowest-priority
# running pod to free a slot for a pod using this class.  On
# the dedicated=nomad node (ip-10-30-10-201) that means one
# nomad-oasis pod will be evicted and rescheduled elsewhere.
# This is intentional — security telemetry coverage takes
# priority over application scheduling.
#
# globalDefault: false — only assigned explicitly, never silently
# inherited by new workloads.
#--------------------------------------------------------------
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: bc-security-node-critical
value: 1000000000
globalDefault: false
description: >
  High-priority class for bc-prd XDR security DaemonSets
  (wazuh-agent, suricata).  Value is the maximum allowed
  user-defined priority (1000000000); system-* classes
  (>= 2e9) still outrank it, but security telemetry preempts
  all application workloads.  Assign only to security
  DaemonSets that must achieve full node coverage.
preemptionPolicy: PreemptLowerPriority
