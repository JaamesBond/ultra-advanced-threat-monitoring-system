apiVersion: v1
kind: ConfigMap
metadata:
  name: wazuh-agent-config
  namespace: wazuh
data:
  ossec.conf: |
    <ossec_config>
      <client>
        <server>
          <address>wazuh-manager.bc-ctrl.internal</address>
          <port>1514</port>
          <protocol>tcp</protocol>
        </server>
        <enrollment>
          <enabled>yes</enabled>
          <manager_address>wazuh-manager.bc-ctrl.internal</manager_address>
        </enrollment>
      </client>

      <client_buffer>
        <disabled>no</disabled>
        <queue_size>5000</queue_size>
        <events_per_second>500</events_per_second>
      </client_buffer>

      <!-- Suricata EVE JSON — Wazuh has built-in decoders for this format -->
      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/suricata/eve.json</location>
        <label key="source">suricata</label>
      </localfile>

      <!-- Zeek logs — conn, dns, http, weird, notice shipped as JSON -->
      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/zeek/conn.log</location>
        <label key="source">zeek-conn</label>
      </localfile>

      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/zeek/dns.log</location>
        <label key="source">zeek-dns</label>
      </localfile>

      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/zeek/http.log</location>
        <label key="source">zeek-http</label>
      </localfile>

      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/zeek/notice.log</location>
        <label key="source">zeek-notice</label>
      </localfile>

      <!-- Zeek Intel framework hits (MISP IOC matches via the misp-intel-sync
           sidecar land here). Previously NOT shipped — added 2026-06-02 so the
           MISP -> Zeek -> Wazuh detection chain reaches the SIEM. -->
      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/zeek/intel.log</location>
        <label key="source">zeek-intel</label>
      </localfile>

      <!-- Falco alerts from the host -->
      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/falco/falco.json</location>
        <label key="source">falco</label>
      </localfile>

      <!-- Tetragon eBPF runtime events (process_exec, process_kprobe, etc.)
           Written by the Tetragon DaemonSet to /var/log/tetragon/tetragon.json
           on the node (exportDirectory=/var/log/tetragon in helm-security.tf).
           Reaches this container via the existing /host/var/log hostPath mount. -->
      <localfile>
        <log_format>json</log_format>
        <location>/host/var/log/tetragon/tetragon.json</location>
        <label key="source">tetragon</label>
      </localfile>

      <!-- CoreDNS query log (F-05: DNS exfil / tunneling visibility).
           CoreDNS `log` plugin writes every query to the pod stdout, which
           containerd records under /var/log/pods/.../coredns/*.log in CRI
           text format. Read the REAL pod-log path, NOT
           /host/var/log/containers/coredns-*.log — those are symlinks to the
           host-absolute /var/log/pods path that do not resolve inside this
           container's mount namespace. The glob only matches on nodes
           currently running a coredns pod (harmless no-op elsewhere; the
           DaemonSet follows the pod if it reschedules).
           Rules: bc-coredns-dns.xml (100720-100722). -->
      <localfile>
        <log_format>syslog</log_format>
        <location>/host/var/log/pods/kube-system_coredns-*/coredns/*.log</location>
        <label key="source">coredns</label>
      </localfile>

      <!-- Host syslog -->
      <localfile>
        <log_format>syslog</log_format>
        <location>/host/var/log/messages</location>
      </localfile>

      <localfile>
        <log_format>syslog</log_format>
        <location>/host/var/log/secure</location>
      </localfile>

      <rootcheck>
        <disabled>yes</disabled>
      </rootcheck>

      <syscheck>
        <disabled>yes</disabled>
      </syscheck>

      <wodle name="syscollector">
        <disabled>no</disabled>
        <interval>1h</interval>
        <packages>yes</packages>
        <processes>yes</processes>
        <network>yes</network>
      </wodle>

      <logging>
        <log_format>plain</log_format>
      </logging>
    </ossec_config>
