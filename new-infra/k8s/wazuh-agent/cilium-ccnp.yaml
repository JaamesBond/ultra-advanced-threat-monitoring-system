#--------------------------------------------------------------
# Phase D.5 fallback — apply ONLY if D.9 Hubble check shows
# that hostNetwork: true pods are assigned reserved:host identity
# instead of their pod-label identity. If applied, delete the
# namespaced CNP (wazuh-agent-netpol) to avoid conflict.
#--------------------------------------------------------------
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: wazuh-agent-node-egress
spec:
  nodeSelector:
    matchLabels:
      role: workload
  egress:
    - toPorts:
        - ports:
            - port: "53"
              protocol: ANY
      toEntities:
        - all
    - toCIDRSet:
        - cidr: 10.0.10.0/24
        - cidr: 10.0.11.0/24
      toPorts:
        - ports:
            - port: "1514"
              protocol: TCP
            - port: "1515"
              protocol: TCP
