#--------------------------------------------------------------
# Suricata — ExternalSecret manifests
#
# DEPLOYED TO: bc-prd EKS cluster
#
# Pulls the MISP API key from AWS Secrets Manager and creates
# the "suricata-misp-secret" K8s Secret in the suricata namespace.
# Consumed by the misp-rule-sync sidecar container.
#
# Required Secrets Manager secret (seed once):
#   aws secretsmanager create-secret \
#     --name bc/suricata/misp \
#     --secret-string '{"MISP_API_KEY": "<your-misp-auth-key>"}'
#
# NOTE: The ClusterSecretStore "aws-secrets-manager" was previously
# defined in this file. It has been moved to k8s/system-secretstore/
# so it can be applied before any consumer (NOMAD, suricata, zeek)
# regardless of which kustomize runs first.
#--------------------------------------------------------------

#--------------------------------------------------------------
# ExternalSecret — suricata-misp-secret
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: suricata-misp-secret
  namespace: suricata
  labels:
    app: suricata
    app.kubernetes.io/part-of: xdr-platform
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: suricata-misp-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: suricata
          app.kubernetes.io/part-of: xdr-platform

  data:
    - secretKey: MISP_API_KEY
      remoteRef:
        key: bc/suricata/misp
        property: MISP_API_KEY
