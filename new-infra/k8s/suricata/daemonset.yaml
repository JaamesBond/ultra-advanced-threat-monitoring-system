#--------------------------------------------------------------
# Suricata — Namespace + ServiceAccount + DaemonSet
#
# Deployed to: bc-prd EKS cluster, namespace "suricata"
# Nodegroup:   workload
#
# Depends on:
#   - configmap-suricata.yaml       (mounted at /etc/suricata/*)
#   - ECR pull-through cache rule "docker-hub" (same as Wazuh agent)
#
# Pod structure:
#   initContainer rule-updater   — pulls ET Open rules on boot
#   main       suricata          — AF_PACKET IDS/IPS engine
#   sidecar    rule-refresher    — cron: refresh rules every 6h
#                                  then SIGUSR2 → live reload
#
# PACKET VISIBILITY NOTES
# ----------------------------------------------------------------
# Phase 1 (current vpc.tf):
#   Suricata only sees traffic hitting the collector node's own
#   ENI. bc-prd egress passes through TGW attachment ENIs in the
#   /28 intra subnets — not the /24 private subnets where this
#   DaemonSet lands. For full bc-prd visibility add VPC Traffic
#   Mirroring in Terraform (bc-prd ENIs → NLB → this DaemonSet).
#
# Phase 2 (inline IPS — separate architecture):
#   Dedicated inspection-subnet EC2 pair with two NICs,
#   appliance-mode TGW routes traffic through them. See
#   bc-xdr/vpc.tf comments for the planned design. That pair
#   would NOT be a DaemonSet — it would be a pair of dedicated
#   instances managed by Terraform.
#
# This DaemonSet is the Phase 1 tuning/testing baseline and the
# receive-side for future traffic mirroring.
#--------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: suricata
  labels:
    name: suricata
    app.kubernetes.io/part-of: xdr-platform
    customer: big-chemistry
    environment: xdr
    vpc-role: xdr-infrastructure
  annotations:
    description: "Suricata NIDS/NIPS — bc-xdr collector nodegroup"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: suricata
  namespace: suricata
  labels:
    app: suricata
    app.kubernetes.io/component: nids
---
#--------------------------------------------------------------
# DaemonSet
#--------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: suricata
  namespace: suricata
  labels:
    app: suricata
    app.kubernetes.io/component: nids
    app.kubernetes.io/part-of: xdr-platform
spec:
  selector:
    matchLabels:
      app: suricata
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: suricata
        app.kubernetes.io/component: nids
      annotations:
        # Rolling restart on config change handled by configMapGenerator.
        # Scrape Suricata stats via promtail/prometheus if later added
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: suricata
      terminationGracePeriodSeconds: 60

      # Land on the workload nodegroup in bc-prd
      nodeSelector:
        role: workload

      # Collector nodegroup has no taints — no tolerations needed
      tolerations: []

      #--------------------------------------------------------------
      # Host namespace sharing — required for packet capture
      #--------------------------------------------------------------
      hostNetwork: true
      hostPID: false
      dnsPolicy: ClusterFirstWithHostNet

      securityContext:
        runAsUser: 0
        runAsGroup: 0

      #--------------------------------------------------------------
      # Init container: pull ET Open rules into shared volume
      #--------------------------------------------------------------
      initContainers:
        - name: rule-updater
          image: jasonish/suricata:7.0.7
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /var/lib/suricata/rules /var/lib/suricata/update
              suricata-update update-sources
              suricata-update enable-source et/open
              suricata-update \
                --data-dir /var/lib/suricata \
                --suricata-conf /etc/suricata/suricata.yaml \
                --output /var/lib/suricata/rules \
                --no-test \
                --force
              # Stub files — Suricata will error on startup if any
              # rule-file listed in suricata.yaml is missing.
              # misp.rules is populated by the misp-rule-sync sidecar.
              # bc-custom.rules and bc-k8s.rules are managed manually.
              for f in misp.rules bc-custom.rules bc-k8s.rules; do
                [ -f /var/lib/suricata/rules/$f ] || \
                  touch /var/lib/suricata/rules/$f && \
                  echo "Created stub: $f"
              done
              echo "Rules loaded:"
              ls -la /var/lib/suricata/rules/
          volumeMounts:
            - name: rules
              mountPath: /var/lib/suricata
            - name: config
              mountPath: /etc/suricata/suricata.yaml
              subPath: suricata.yaml
              readOnly: true
            - name: config
              mountPath: /etc/suricata/classification.config
              subPath: classification.config
              readOnly: true
            - name: config
              mountPath: /etc/suricata/threshold.config
              subPath: threshold.config
              readOnly: true

      containers:
        #--------------------------------------------------------------
        # Main container — Suricata IDS/IPS
        #--------------------------------------------------------------
        - name: suricata
          image: jasonish/suricata:7.0.7
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              IFACE=$(ls /sys/class/net/ | grep -E '^(eth|ens|enp)' | head -1)
              echo "Using interface: $IFACE"
              exec /usr/bin/suricata -c /etc/suricata/suricata.yaml --af-packet=$IFACE -v --set magic-file= --set outputs.1.eve-log.filename=eve.json

          securityContext:
            privileged: false
            runAsUser: 0
            capabilities:
              drop: [ALL]
              add:
                - NET_ADMIN        # put eth0 in promisc mode
                - NET_RAW          # raw packet capture
                - SYS_NICE         # CPU affinity / RT priority
                - IPC_LOCK         # mmap-locked AF_PACKET ring buffer
                - SYS_RESOURCE     # bump mmap limits
                - DAC_OVERRIDE     # write to /var/log/suricata

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 6Gi

          volumeMounts:
            # Config (read-only)
            - name: config
              mountPath: /etc/suricata/suricata.yaml
              subPath: suricata.yaml
              readOnly: true
            - name: config
              mountPath: /etc/suricata/classification.config
              subPath: classification.config
              readOnly: true
            - name: config
              mountPath: /etc/suricata/threshold.config
              subPath: threshold.config
              readOnly: true

            # Rules — shared with rule-updater and rule-refresher
            - name: rules
              mountPath: /var/lib/suricata

            # Logs — hostPath so Vector (same nodegroup) can tail eve.json
            - name: suricata-logs
              mountPath: /var/log/suricata

            # Unix socket dir for suricatasc (live reload signalling)
            - name: run
              mountPath: /var/run/suricata

          startupProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  # Startup takes a while on cold boot (rule compile)
                  test -S /var/run/suricata/suricata-command.socket && \
                  suricatasc -c uptime /var/run/suricata/suricata-command.socket 2>/dev/null | grep -q message
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 40   # 40 × 15s = 10 min for rule compile

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  suricatasc -c uptime /var/run/suricata/suricata-command.socket 2>/dev/null | grep -q message
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  IFACE=$(ls /sys/class/net/ | grep -E '^(eth|ens|enp)' | head -1); suricatasc -c iface-stat $IFACE /var/run/suricata/suricata-command.socket 2>/dev/null | grep -q pkts
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    suricatasc -c shutdown /var/run/suricata/suricata-command.socket 2>/dev/null || \
                    kill -TERM 1

        #--------------------------------------------------------------
        # Sidecar — MISP IOC → Suricata rules (every 1h)
        #
        # Queries MISP for published network IOCs (ip-dst, domain,
        # url, md5, sha1, sha256) and converts them to Suricata rules
        # written to /var/lib/suricata/rules/misp.rules.
        # After writing, sends reload-rules via suricatasc so the new
        # rules are active without restarting the engine.
        #
        # SID block 9000000–9999999 is reserved for MISP-generated
        # rules so they never collide with ET Open (1–2999999) or
        # custom bc rules (10000000+).
        #--------------------------------------------------------------
        - name: misp-rule-sync
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl jq >/dev/null

              echo "MISP rule sync sidecar started (interval: 1h)"
              RULES_FILE=/var/lib/suricata/rules/misp.rules
              SOCKET=/var/run/suricata/suricata-command.socket

              # Install suricatasc if not present in this image
              # (shared rules volume; suricatasc binary from main container not available here)
              # Use socket directly with a raw JSON command instead.
              reload_rules() {
                if [ -S "$SOCKET" ]; then
                  # suricatasc protocol: send JSON command, read response
                  echo '{"command":"reload-rules"}' | \
                    nc -U "$SOCKET" 2>/dev/null | grep -q '"return":"OK"' && \
                    echo "Suricata rules reloaded" || \
                    echo "reload-rules command failed (non-fatal)"
                else
                  echo "Suricata command socket not found, skipping reload"
                fi
              }

              generate_rules() {
                SID=9000001
                TMP=$(mktemp)

                # ip-dst → drop/alert rule
                curl -sfk \
                  -H "Authorization: ${MISP_API_KEY}" \
                  -H "Accept: application/json" \
                  -H "Content-Type: application/json" \
                  -d '{"returnFormat":"values","type":"ip-dst","to_ids":1,"published":1}' \
                  "${MISP_URL}/attributes/restSearch" \
                | jq -r '.response.Attribute[]?.value // empty' \
                | sort -u \
                | while read -r ip; do
                    echo "alert ip any any -> ${ip} any (msg:\"MISP IOC match - dst IP ${ip}\"; sid:${SID}; rev:1; classtype:domain-c2;)"
                    SID=$((SID+1))
                  done >> "$TMP"

                # domain → DNS query rule
                curl -sfk \
                  -H "Authorization: ${MISP_API_KEY}" \
                  -H "Accept: application/json" \
                  -H "Content-Type: application/json" \
                  -d '{"returnFormat":"values","type":"domain","to_ids":1,"published":1}' \
                  "${MISP_URL}/attributes/restSearch" \
                | jq -r '.response.Attribute[]?.value // empty' \
                | sort -u \
                | while read -r dom; do
                    safe=$(echo "$dom" | sed 's/\./\\./g')
                    echo "alert dns any any -> any 53 (msg:\"MISP IOC match - domain ${dom}\"; dns.query; content:\"${dom}\"; nocase; sid:${SID}; rev:1; classtype:domain-c2;)"
                    SID=$((SID+1))
                  done >> "$TMP"

                # file hashes → filedata rules
                for htype in md5 sha1 sha256; do
                  curl -sfk \
                    -H "Authorization: ${MISP_API_KEY}" \
                    -H "Accept: application/json" \
                    -H "Content-Type: application/json" \
                    -d "{\"returnFormat\":\"values\",\"type\":\"${htype}\",\"to_ids\":1,\"published\":1}" \
                    "${MISP_URL}/attributes/restSearch" \
                  | jq -r '.response.Attribute[]?.value // empty' \
                  | sort -u \
                  | while read -r hash; do
                      echo "alert http any any -> any any (msg:\"MISP IOC match - ${htype} ${hash}\"; filemd5:${hash}; sid:${SID}; rev:1; classtype:credential-theft;)"
                      SID=$((SID+1))
                    done >> "$TMP"
                done

                mv "$TMP" "$RULES_FILE"
                echo "[$(date -Iseconds)] MISP rules written: $(wc -l < "$RULES_FILE") rules"
              }

              # Initial generation at startup
              generate_rules || echo "Initial MISP rule generation failed, empty file retained"
              reload_rules

              while true; do
                sleep 3600  # 1h
                generate_rules || echo "MISP rule generation failed, keeping previous rules"
                reload_rules
              done

          env:
            - name: MISP_URL
              value: "https://misp.bc-ctrl.internal"
            - name: MISP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: suricata-misp-secret
                  key: MISP_API_KEY

          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

          volumeMounts:
            - name: rules
              mountPath: /var/lib/suricata
            - name: run
              mountPath: /var/run/suricata

        #--------------------------------------------------------------
        # Sidecar — rule refresher
        # Every 6h: suricata-update, then SIGUSR2 to main container for
        # live reload without dropping packets.
        #--------------------------------------------------------------
        - name: rule-refresher
          image: jasonish/suricata:7.0.7
          command:
            - sh
            - -c
            - |
              set -e
              echo "Rule refresher started (interval: 6h)"
              while true; do
                sleep 21600   # 6h
                echo "[$(date -Iseconds)] Refreshing rules..."
                suricata-update \
                  --data-dir /var/lib/suricata \
                  --suricata-conf /etc/suricata/suricata.yaml \
                  --output /var/lib/suricata/rules \
                  --no-test \
                  --force || {
                    echo "suricata-update failed, will retry next cycle"
                    continue
                  }
                echo "[$(date -Iseconds)] Signalling main container for live reload"
                if [ -S /var/run/suricata/suricata-command.socket ]; then
                  suricatasc -c reload-rules /var/run/suricata/suricata-command.socket || true
                else
                  echo "Command socket not found, skipping reload"
                fi
              done

          securityContext:
            runAsUser: 0
            capabilities:
              drop: [ALL]
              add:
                - DAC_OVERRIDE

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

          volumeMounts:
            - name: rules
              mountPath: /var/lib/suricata
            - name: config
              mountPath: /etc/suricata/suricata.yaml
              subPath: suricata.yaml
              readOnly: true
            - name: run
              mountPath: /var/run/suricata

      #--------------------------------------------------------------
      # Volumes
      #--------------------------------------------------------------
      volumes:
        - name: config
          configMap:
            name: suricata-config
            items:
              - key: suricata.yaml
                path: suricata.yaml
              - key: classification.config
                path: classification.config
              - key: threshold.config
                path: threshold.config

        # Shared emptyDir for rules — survives init→main→sidecar
        - name: rules
          emptyDir:
            medium: ""
            sizeLimit: 1Gi

        # hostPath logs — Vector tails eve.json from here
        - name: suricata-logs
          hostPath:
            path: /var/log/suricata
            type: DirectoryOrCreate

        # Unix socket dir
        - name: run
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
