apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "sigkill-malicious-tools"
spec:
  # ---------------------------------------------------------------------------
  # SIGKILL enforcement — genuinely-malicious recon/exploitation binaries.
  #
  # Hook: sys_execve kprobe (syscall: true).
  #   Tetragon intercepts at execve entry, evaluates selectors, and issues
  #   SIGKILL before the new image gains control. The killed process generates
  #   a PROCESS_KPROBE event with action="SIGKILL", which passes the
  #   exportAllowList {"event_set":["PROCESS_KPROBE"]} and fires Wazuh rule
  #   100700 (level 14 critical).
  #
  # Selector mechanism — matchArgs index 0 (the execve FILENAME), Postfix:
  #   FIXED 2026-06-10 (purple-team F-01). The previous version used
  #   `matchBinaries` here. That was INERT: on a sys_execve *syscall-entry*
  #   kprobe the new binprm is not yet resolved, so matchBinaries evaluates the
  #   CALLER's binary (the shell, e.g. /bin/sh) — never the about-to-exec target.
  #   Empirically `nmap` launched from a shell ran to completion (exit 0) and was
  #   never killed. The kprobe already captures arg index 0 = the execve
  #   `filename` (the first argument to execve(2), i.e. the pathname being
  #   executed). Matching THAT with matchArgs Postfix fires SIGKILL on the caller
  #   before the new image gains control, so the target never runs.
  #
  #   Note: execve's `filename` argument is NOT argv[0]. argv[0] is spoofable
  #   (execve allows argv[0] != filename); the `filename` pathname is the real
  #   resolved target, so matchArgs index 0 is not argv[0]-spoofable.
  #   Postfix "/nc" catches /bin/nc, /usr/bin/nc, /usr/local/bin/nc, /tmp/nc —
  #   any install prefix or staged copy retaining the original basename.
  #
  # Residual bypass (known limitation, by design):
  #   A binary copied AND renamed (e.g. `cp /usr/bin/nc /tmp/x && /tmp/x`)
  #   cannot be caught by path/basename matching — the filename is /tmp/x, which
  #   matches no Postfix entry. Hash/content-based detection is out of scope for
  #   this TracingPolicy; Falco rules cover the detection-only layer.
  #
  # Tool selection rationale:
  #   IN scope (SIGKILL) — attack-only binaries with no legitimate container use:
  #     nc, ncat   — netcat variants; used for reverse shells, port forwarding
  #     nmap       — network scanner; no legitimate use inside a production pod
  #     masscan    — high-speed port scanner; attack tooling only
  #     socat      — Swiss-army relay; reverse shells, tunnels, port pivoting
  #   OUT of scope (detection-only via Wazuh rule 100704 + PROCESS_EXEC):
  #     curl, wget, ss, netstat, dig, nslookup, host — have legitimate uses in
  #     init containers, health probes, and operator tooling. Killing them would
  #     break normal cluster operation. Wazuh rule 100704 (level 12) alerts on
  #     their execution; Splunk SOAR handles response.
  # ---------------------------------------------------------------------------
  kprobes:
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string" # execve filename = the pathname being executed
    selectors:
    - matchArgs:
      - index: 0
        operator: "Postfix"
        values:
        # netcat variants — reverse shells, port forwarding, listener setup
        - "/nc"
        - "/ncat"
        # network scanners — no legitimate production pod use
        - "/nmap"
        - "/masscan"
        # socat — bidirectional relay; reverse shells, tunnel pivoting
        - "/socat"
      matchActions:
      - action: Sigkill
