apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: zeek-netpol
  namespace: zeek
spec:
  endpointSelector:
    matchLabels:
      app: zeek
  ingress: []
  egress:
    # Allow DNS — toEntities:all covers both kube-dns (cluster) and
    # VPC DNS at 169.254.169.253 (used by hostNetwork pods)
    - toPorts:
        - ports:
            - port: "53"
              protocol: ANY
      toEntities:
        - all
    # Allow MISP intel sync sidecar to reach MISP EC2
    # in bc-ctrl private subnets over VPC peering
    - toCIDRSet:
        - cidr: 10.0.10.0/24
        - cidr: 10.0.11.0/24
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
