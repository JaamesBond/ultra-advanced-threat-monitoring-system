apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: zeek-netpol
  namespace: zeek
spec:
  endpointSelector:
    matchLabels:
      app: zeek
  ingress: []
  egress:
    # Allow DNS — toEntities:all covers both kube-dns (cluster) and
    # VPC DNS at 169.254.169.253 (used by hostNetwork pods).
    # The explicit host/remote-node rule below is additive: it documents
    # the NodeLocal DNSCache dependency (cache binds 172.20.0.10 as
    # hostNetwork=true; queries hit reserved:host / reserved:remote-node).
    # toEntities:all already covers host, so this does not change enforcement.
    - toPorts:
        - ports:
            - port: "53"
              protocol: ANY
      toEntities:
        - all
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow HTTPS and HTTP to internet for apk add in sidecar
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
    # Allow MISP intel sync sidecar to reach MISP EC2
    # in bc-ctrl private subnets over VPC peering
    - toCIDRSet:
        - cidr: 10.0.10.0/24
        - cidr: 10.0.11.0/24
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
