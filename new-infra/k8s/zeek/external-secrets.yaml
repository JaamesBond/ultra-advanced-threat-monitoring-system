#--------------------------------------------------------------
# Zeek — ExternalSecret manifest
#
# DEPLOYED TO: bc-prd EKS cluster
#
# Pulls the MISP API key from AWS Secrets Manager and creates
# the "zeek-misp-secret" K8s Secret in the zeek namespace.
# Consumed by the misp-intel-sync sidecar container.
#
# Required Secrets Manager secret (seed once):
#   aws secretsmanager create-secret \
#     --name bc/zeek/misp \
#     --secret-string '{"MISP_API_KEY": "<your-misp-auth-key>"}'
#--------------------------------------------------------------

#--------------------------------------------------------------
# ExternalSecret — zeek-misp-secret
# Uses the cluster-scoped aws-secrets-manager ClusterSecretStore
# defined in new-infra/k8s/suricata/external-secrets.yaml
#--------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zeek-misp-secret
  namespace: zeek
  labels:
    app: zeek
    app.kubernetes.io/part-of: xdr-platform
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: zeek-misp-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: zeek
          app.kubernetes.io/part-of: xdr-platform

  data:
    - secretKey: MISP_API_KEY
      remoteRef:
        key: bc/zeek/misp
        property: MISP_API_KEY
